body:
  text: 演繁露續集卷五宋程大昌撰談助漢馬負重趙充國傳辛武賢欲引萬騎出張掖充國曰一馬自他駝負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐案此而言若使一馬所負衣裝兵器之外别有米麥一十石四斗馬力已恐難勝雖漢斗差小然不可更容有人騎之而行也予甞以此問軍帥帥曰馬皆牽行至交戰時缷下他負乃始騎以接戰也漢奏報疾趙充國在金城奏邊事以六月戊申上七月甲寅得璽書報從所奏案金城距長安一千五百里七日之間一徃一返中間又須付朝臣奏擬畧計其奏一日葢行五百餘里也今赦書雖有日行五百里之文實不及數漢法之於邊事必加重於他事也哉貢禹年七十一生子貢禹為光禄大夫乞骸骨曰臣犬馬之齒八十一凡有一子年十二以年計之是年七十有一而生此子也武王之壽九十三嵗當成王嗣位時十餘嵗是武王八十而生成王也皷樓警盜元魏李崇令鄉保各置鼓及樓每一處有盜雙槌亂擊四面傳聲皆遮路收捕盜發輒得此亦善策然漢時已有其制矣張敞守京兆尹史書其政曰枹鼓稀鳴市無偷盜後又書其去職而盜起則曰敞罷數月京師吏民解㢮枹鼓數起然則此時京兆已用擊鼓為捕逐之節矣至哀帝時鮑宣上書曰今民凡有七亡其六曰部落鼓鳴男女遮迣亦其一也師古曰言無枹鼓之聲以為有盜賊皆當遮列而追捕然則擊鼓追賊尚矣崇特舉而行之焉耳彭祖無八百嵗史記楚世家帝嚳誅重黎以其弟陸終呉囘生六子三曰彭祖彭祖氏商之時甞為侯伯商之末世滅彭祖氏予以年數計之若呉回自帝嚳時已生彭祖至商末之世而彭祖猶在則彭祖之壽不啻八百年矣然予詳其文既曰彭祖氏則不專指彭祖一身并其子孫皆包舉矣或其族壽數皆長不止一人也此如誤讀桃源記謂漁父所見者猶是初來避秦之人也王介父詩曰種桃食實枝為薪世上紛紛經㡬秦則食實薪桃者避秦之子孫也夷亭平江甞有䜟語曰水到夷亭出狀元傳聞日久莫知所起而夷亭本是港浦水到之説亦不可曉淳熙庚子浙西大旱河港皆涸海潮因得專𣲖捷上直過夷亭來年辛丑黄由果魁多士由平江人也人謂此䜟已應矣至甲午年衛涇薦魁焉人大異之予問夷亭何以名夷雖其土人不能知也偶閲陸廣微呉地記而得其説葢呉闔閭時名之也闔閭甞思海魚而難於生致迺令人即此地治生魚鹽清而日乾之故名為鮝其讀如想又玉篇説文無鮝字唐韻始收入也鮝即魚身矣而其腸胃别名逐夷為此亭之甞製此魚也故以夷名之呉地志仍有注釋云夷即鮝之逐夷也熙寧四年郟亶奏言平江水利所記崑山支港有夷亭即其地矣但以夷為停當是傳訛耳湖州東門外上塘路梅聖俞集九送胡武平解湖州詩曰始時繞郊郭水不通蹄輪公來作新塘直抵呉松垠詳此即今城東堤路武平始築也佛師老子通典天竺門云浮圖所載與中國老子經相出入蓋皆老子西出闗過西域之天竺教其人為浮圖徒屬諸家紀天竺事多録僧法明道安之徒傳記疑皆恢詭不經不復纂也曹丕不為侯必為太子御覽載魏武令有告子文曰沙等悉為侯子桓獨不封而為五官中郎將此是太子可知矣案觀志魏文帝丕操之長子字子桓沙恐是它王小名也此言兄弟皆侯而子桓不侯可以知其必為太子也將毋同王戎問老莊孔子同異阮瞻曰將毋同不直云同而云將毋同者晉人語度自爾也庾亮辟孟嘉為從事亮髙選儒官正旦大㑹褚裒問嘉何在亮曰但自覔之裒歴觀指嘉曰將毋是乎將毋者猶言殆是此人也意以為是而未敢自主也其指孔老為同亦此義也桑無附枝蠶月條桑釋者曰斫取其條而擷葉以用也今浙桑則然嵗生嵗伐率皆稠行低榦無有高及二丈者吾徽之桑則髙矣必得梯葉乃可采不剪其條也春每氣應土脈欲動木津未上則相與腰刀相其良盬凡柯枝繁宻而相翳者倒垂亂行而不上達者或又半枯半萎不善茁葉者率皆刪剟棄之不使分其正力俗語謂之剃桑言能剪惡存好也張堪守漁陽勸民耕種百姓歌曰桑無附枝麥穗兩岐夫桑枝以無所附著為貴則是甞加刪剪而無有交戛相妨者矣古親蠶法有皇后采桑鈎若并條列剥之則何所用鈎也左傳晉重耳與從者謀於桑下蠶妾在上而重耳不知也列女傳秋胡子見婦人采桑下車願託䕃桑下凡若此者皆是采葉不劙其枝也若并枝劙去則何縁有蔭也故剃桑之來古也泉冽酒香歐陽文忠公醉翁亭記曰酒冽而泉香及蘇文忠書其文於石乃曰泉冽而酒香若循泉酒本性求之則歐公本語恐是采用月令以出奇健也况泉清者無穢濁也無穢濁則酒清冽殆别自一理也不颺昭二十八年騣蔑惡注貌醜也叔向舉賈大夫射雉以方之而曰今子少不颺子若不言吾㡬失子注顔貌不揚顯也漢田蚡傳蚡貌侵侵讀如寢寢即不颺也後漢正書貌侵作寢裴度自贊曰爾材不長爾貌不揚蓋本此陛下戰國䇿秦語曰太子楚曰陛下甞軔車於趙矣注陛下孝文王也即此時已有謂人君為陛下者矣而陛下之稱乃對他人亦可用無嫌也韓退之詩曰曷不薦賢陛下聖亦其比也杜君司馬遷父名談故袁盎傳曰同子驂乘同子者趙談也以其名與父同故避談書同也郭林宗本名泰范曄之父名泰故書其名為郭太孔頴達疏書凡孔安國所注悉言孔君而杜佑通典杜預事言悉曰杜君五嶽真君開元九年司馬承禎言今五嶽神祠是山林之神非正真之神也敕五嶽各置真君祠一所㑹要四十六武后税浮屠張廷珪傳武后税天下浮屠錢營佛祠於白馬坂廷珪諫曰僧尼乞丐自贍而州縣督輸星火迫切鬻賣以充非浮屠所謂隨喜者案此雖非鬻度亦計人數敷斂矣史記自牴牾朱建傳曰平原君建不預黥布謀反得不誅語在黥布傳中崔駰曰案布傳無此語小小倉王莽末鄧曄開武闗迎漢莽將九虎中三虎保守京師倉曄攻之未下曄謂京師小小倉尚未下何況長安城警枕呉越王錢鏐在軍中夜未甞寢倦極則就圓木小枕或枕大鈴寐熟則欹而寤名曰警枕粉盤錢鏐置粉盤臥内有所記則書于中南祖珽傳以銅筯浸醋中令青有見即睡中書記之蠟茶建茶名蠟茶為其乳泛湯面與鎔蠟相似故名蠟面茶也楊文公談苑曰江左方有蠟面之號是也今人多書蠟為臘云取先春為義失其本矣攝官奉使本朝遣使而適外國多越班攝官如庶官借從官之類慮其體輕而假借使重也然亦有古文公六年晉使先蔑如秦逆公子雍荀林父止之使以疾辭且曰攝卿以往可也何必子弗聴及晉不納雍先蔑奔秦果如林父之言夫先蔑卿也林父勸其以攝卿代行是此時甞有位未至卿而攝卿以使者矣信晉人書問凡言信至或遣信者皆指信為使人也今人以信為書誤矣文十七年鄭子家使執訊而與之書以告趙宣子杜預曰執訊問之官為書與宣子也則訊之與書明為二事晉人之言有本矣兵交使在其間故詩亦曰執訊獲醜也逐鹿秦失其鹿天下共逐以天下喻鹿語雖出於漢世然春秋有其語矣襄四年戎子支駒曰殽之師秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之則其語尚矣不獨是也六韜太公謂文王曰取天下若逐野鹿而天下共分其肉則逐鹿之説久矣不在漢世也浮橋橋必有柱浮橋以舟為柱詩云造舟是也李巡注爾雅云比其船而度也郭云併舟為橋六經釋文左氏昭元年大葷湖州人事廣德張王者不食猪肉言張王曽現身為猪故并剛鬛一牲避之不敢以祭亦不敢食陸德明曰鯀為黄熊東海人祭禹廟不用熊白及鱉亦此意也笠澤越伐呉軍于江南注呉子禦之笠澤江松江也内子楚語司馬子期欲以其妾為内子注卿之適妻曰内子桐油桐子之可為油者一名荏桐見本草衍義予在浙東漆工稱當用荏油予問荏油何種工不能知取油視之乃桐油也烏桕油可作燭者是衍義槵子數珠佛家貫患子為數珠俗書患為槵衍義云名無患子則當書為患子複名單書一字今人有複名而單書一字者劉韶美名儀鳯守蜀郡甞有公牘至省部單書一儀字予在禮部見之以語同舎皆笑之定三年祝駝舉踐土之盟其在書曰王若曰晉重衛武注重文公也武叔武也則複名而單書其一亦有古也壻之父為姻晉荀寅之子娶范吉射之女故左氏定十三年曰荀寅范吉射之姻也注壻父為姻彌甥從母對父之舅氏自稱彌甥彌遠也哀二十三年亦仍昆之義也從母即姨母也言於母為從從孫甥姊妹之孫為從孫甥言與孫同也哀二十五年硯晉人最重書學然未甞擇硯故石林曰晉之善書者不自研墨使人研之成漿乃以斗供其説不知何出北齊試士其惡濫者飲墨水一升在試而有墨水可及一升則石林之言信矣故東坡詩曰麻衣如再著墨水真可飲用此事也唐以前多用瓦研今天下通用石研而猶槩言研瓦也至李肇國史補曰端溪之紫石硯天下通用則其時已用端石矣歙之龍尾硯乃江南李主剏為唐世未之見也見王中舎研譜漢酒薄王莽時酒一釀用麄米二斛麴一斛得成酒六斛六斗此酤賣之齊也用此數計之米麴通用三斛取酒三斛不啻也故漢世通米酒計之其米多而酒少者為上尊也税契晉自過江至於梁陳凡貨賣奴婢馬牛田宅有文劵率錢一萬輸估四百入官賣者三百買者一百名為散估即今田宅報劵輸錢之數也建炎時每劵之直及一千則其税四十今為百餘殆十一矣方滋建増也騙馬甞見藥肆鬻脚藥者榜曰騙馬丹歸檢字書其音為匹轉且曰躍而上馬已又見唐人武懿宗將兵遇敵而遁人為之語曰長弓度短箭蜀馬臨堦騙言蜀馬既已低小而又臨堦為髙乃能躍上始悟騙之為義通典曰武舉制土木馬於里閭間教人習騙下官通典封爵門曰凡郡縣内史相並於國主稱臣宋孝武孝建中始革此制不得稱臣宜云下官而已演繁露續集卷五
