body:
  text: 演繁露卷十一宋程大昌撰左右史螭陛侍立本朝置左右史正沿唐制而近者二史更日入侍槩立殿上東南偏不執筆則皆不與唐合按唐志天子御正殿則郎舍人分左右立有命則俯陛以聽退而書之若仗在紫宸內閣則夾香案分立殿下直第二螭首和墨濡筆皆即拗處時號螭頭李肇國史補兩省謔起居即為螭頭以其立近石螭首也鄭覃傳曰記注操筆在赤墀下楊嗣復言故事正衙起居注在前張次宗傳文宗始詔左右史立螭頭下則今立殿上東南偏非唐制也既曰郎舍人分立左右操筆則今更日入侍又不執筆皆非也唐去今雖不逺而殿螭位置史無詳制顧雜載中時有可以參考者耳王仁裕入洛記記含元殿所見甚詳曰玉階三級第一級可髙二丈許每間引出一石螭頭東西鱗次而排一一皆存猶不傾墊第二三級各髙五尺許蓮花石頂亦存階兩面龍尾道各上六七十步方達第一級皆花磚微有虧損賈黃中談録含元殿前龍道自平地凡詰曲七轉由丹鳳門北望宛如龍尾下垂於地兩垠欄悉以青石為之至今石柱猶有存者仁裕所見後唐時也黃中所見本朝初也合二說驗之則龍尾道夾殿階旁上而玉階正在道中階凡三大層每層又自疏為小級其下二大層兩旁雖皆設扶欄欄柱之上但刻為蓮花形無壓頂橫石其上一大層者每小級固皆有欄欄柱頂更有橫石通亘壓之而刻其端為螭頭溢出柱外是其殿陛所謂螭首者也然唐之大內有二太極西內也含元東內也髙宗别營大明宫於故宫為東南偏是名南內自髙宗後纍朝多居其地故凡唐史所載朝㑹多大明制也宫據龍首山趾而高自丹鳳門入第一重為含元殿殿陛從平地直上四十餘尺方與殿平王賈所見階陛皆含元制而唐志記二史所立螭陛則非含元也含元第次甲於諸殿惟元正冬至受朝始出御之他朝㑹否也含元直北方得宣政宣政者正殿亦名正衙蓋朔望受朝之地宣政之左則為東上閣右為西上閣而宣政又北始為紫宸自開元後每遇朔望薦獻宗廟天子謙避正殿輒虛宣政不御而退御紫宸紫宸無仗則從宣政喚仗自東西二閣而入百官隨之所謂入閣也唐志言在正殿則俯陛聽命者謂宣政也言仗在內閣而夾香案分立第二螭者謂紫宸也是唐志二史所立皆不在含元殿故王賈所記螭陛第可因之以想他殿而不可憑之以證定唐志也宣政紫宸相為南北合大明一宫俱在龍首東麓凡殿以次退而之北則址亦以次北而加髙每殿必為峻道乃始可升則宣政紫宸每陛每級壓欄悉應有螭故有第二螭首也是二史所立下乎赤墀而髙乎前庭故在宣政則俯陛乃可聽命在紫宸則正直次二螭首其地其制皆相應也和墨濡筆皆即坳處坳陛石之窪曲而可以受墨者也今人用螭坳則可謂立殿坳則誤矣唐志宣政殿朝日殿上設黼扆躡席熏罏香案而宰相兩省官對班于香案前百官班于殿庭人主既御黼坐宰相兩省官拜訖乃始升殿則是香案也者正在殿上而對班案前者乃從殿下凖望言之其曰拜已升殿即可見已及其入閣而夾侍香案亦從左右凖望而言非真夾並香案也白樂天和元稹霓裳羽衣歌曰舞時寒食春風天玉欄干下香案前案前舞者顔如玉推此言也則香案似在玉欄干之下而實不然也欄出庭上則舞庭者自在欄下庭在案南則在庭者孰非香案之前豈其欄楯之下别設香案也耶元稹自言我是玉皇香案吏其亦凖望而為之言歟宋景文筆記曰豫領門下省㑹天子排正仗吏供洞案設於前殿兩螭首間案上設燎罏修注官夾案立則此時二史已誤立殿上矣然猶在御座前而分左右夾侍也王容季叙事記國朝駕坐則修起居注立於御座後慶厯中歐陽修以諫官修注始立上前北面以視上閣門用故事諭之使退修曰起居注非殿中祗候人不當立於座後閣門疑其有故事不敢彈奏修既罷其後修注者乃復退立於座後歐文忠所執其殆唐制乎然猶立殿上者國朝殿陛之制不與唐同也唐殿據龍首而髙故降殿而立直二螭其立者之首猶微出殿墀故俯陛而聽於事為宜汴京大內正在平地殿級不越尋丈自上達下欄頂壓石通竟止用一螭若降殿而立使直第一螭首則立處已在殿庭不能俯陛聽事其勢不容不與唐異也徽宗朝李誡營造法式有殿陛螭首圖繪載極詳其言曰螭首施之對柱及殿四角隨階斜出其長七尺然則宋景文記洞案直兩螭間其對柱之螭歟今二史更直而皆立東南偏其並殿角隨階之螭歟以其皆有石螭壓之因遂認以為唐螭而實非其地也螭頭所施雖異其處而又因誤生誤故二史更侍皆立東南偏全與唐異也然慶厯間雖不立御座之前而立於其後於今又不同特不知今立東南偏復起於何時也罘罳前世載罘罳之制凡五出鄭康成引漢闕以明古屏而謂其上刻為雲氣蟲獸者是禮疏屏天子之廟飾也鄭之釋曰屏謂之樹今浮思也刻之為雲氣蟲獸如今闕上之為矣此其一也顔師古正本鄭說兼屏闕言之而於闕閣加詳漢書文帝七年未央宫東闕罘罳災顔釋之曰罘罳謂連屏曲閣也以覆重刻垣墉之處其形罘罳一曰屏也罘音浮此其二也漢人釋罘為復釋罳為思雖無其制而特附之義曰臣朝君至罘罳下而復思至王莽劚去漢陵之罘罳曰使人無復思漢也此其三也崔豹古今注依放鄭義而不能審知其詳遂析以為二也闕自闕罘罳自罘罳其言曰漢西京罘罳合板為之亦築土為之詳豹之意以築土者為闕以合板者為屏也至其釋闕又曰其上皆丹堊其下皆畫雲氣仙靈竒禽異獸以昭示四方此其四也唐蘇鶚謂為網户其演義之言曰罘罳字象形罘浮也罳絲也謂織絲之文輕疏浮虛之貌蓋宫殿窗户之間網也此其五也凡此五者雖參差不齊而其制其義互相發明皆不可廢也罘罳云者刻鏤物象著之板上取其疏通連綴之狀而罘罳然故曰浮思也以此刻鏤施於朝屏則其屏為疏屏施諸宫禁之門則為某門罘罳而在屏則為某屏罘罳覆諸宫寢闕閣之上則為某闕之罘罳非其别有一物元無附著而獨名罘罳也至其不用合板鏤刻而結網代之以䝉冒戶牖使雀蟲不得穿入則别名絲網凡此數者雖施置之地不同而其罘罳之所以為罘罳則未始或異也鄭康成所引雲氣蟲獸刻鏤以明古之疏屏者蓋本其所見漢制而為之言而子於先秦有考也宋玉之語曰髙堂邃宇檻層軒層臺纍榭臨髙山網戶朱綴刻方連此之謂網户者時雖未以罘罳名之而實罘罳之制也釋者曰織網於戶上以朱色綴之又刻鏤橫木為文章連於上使之方好此誤也網户朱綴刻方連者以木為户其上刻為方文互相連綴朱其色也網其狀也若真謂此户以網不以木則其下文之謂刻者施之何地而亦何義也以網户綴刻之語而想像其制則罘罳形狀如在目前矣宋玉之謂網綴漢人以為罘罳其義一也世有一事絶相類者夕郎入拜之門名為青瑣取其門扉之上刻為交瑣以青塗之事見王后傳注故以為名稱謂既熟後人不綴門闥單言青瑣世亦知其為禁中之門此正遺屏闕不言而獨取罘罳為稱義例同也然鄭能指漢闕以明古屏而不能明指屏闕之上孰者之為罘罳故崔豹不能曉解而析以為二顔師古又不敢堅决兩著而兼存之所以起議者之疑也且豹謂合板為之則是以刻綴而應罘罳之義矣若謂築土所成直繪物象其上安得有輕疏罘罳之象乎況文帝時東闕罘罳嘗災矣若果畫諸實土之上火安得而災之也於是乃知顔師古謂為連屏曲閣以覆垣墉者其說可據也崔豹曰闕亦名觀謂其上可以觀覽則是顔謂闕之有閣者審而可信闕既有閣則户牖之有罘罳其制又已明矣杜甫曰毁廟天飛雨焚宫夜徹明罘罳朝共落棆桷夜同傾正與漢闕之災罘罳者相應也蘇鶚引子虛賦罘網彌山因證罘當為網且引文宗甘露之變出殿北門裂斷罘罳而去又引溫庭筠補陳武帝書曰罘罳晝捲閶闔夜開遂斷謂古來罘罳皆為網此誤以唐制一偏而臆度古事者也杜寶大業雜記乾陽殿南軒垂以朱絲網絡下不至地七尺以防飛鳥則真置網於牖而可捲可裂也此唐制之所因放也非古來屏闕刻鏤之制也唐雖借古罘罳語以名網户然罘罳二字因其借喻而形狀益以著明也上林賦亡是公賦上林蓋該四海言之其叙分界則曰左蒼桐右西極其舉四方則曰日出東沼入乎西陂南則隆冬生長涌水躍波北則盛夏含凍裂地涉水揭河至論獵之所及則曰江河為阹泰山為櫓此言環四海皆天子園囿使齊楚所誇俱在包籠中彼於日月所照霜露所墜凡土毛川珍孰非園囿中物叙而置之何一非實後世顧以長安上林核其有無所謂癡人前不得說夢者也秦皇作離宫關內三百關外四百立石東海上朐界中為秦東門此即相如上林所從祖效以該括齊楚者也自班固已不能曉曰亡是公言上林廣大山谷水泉萬物多過其實且非義理所止故刪取其要歸正道而論之由是言之後世何責焉萬年枝謝詩有風動萬年枝之句凡宫詞多承用之然莫知其為何種木也或云冬青木長不凋謝即萬年之謂亦無明據而世間植物如櫧松檜柏皆經冬不凋何獨冬青之枝得名萬年也按西京雜記初修上林苑羣臣逺方各獻名果異木亦自製為美名以標竒麗其品有萬年長生樹千年長生樹各十株雖有異名亦不解何物越石氏藏書中有吳興方勺所著泊宅編者曰徽宗興畫學同試諸生以萬年枝上太平雀為題在試無能識其何木遂皆黜不取或密以叩中貴中貴曰萬年枝冬青木也太平雀頻伽鳥也惟此書指冬青為萬年枝又不知何所本也啐酒乾道丙戌內燕既酌百官酒已樂師自殿上折檻間抗聲索樂不言何曲其聲但云􅟜酒􅟜音作素回反朝士多莫能解中燕更相質問亦無知者豫後閲李涪刋誤則知唐世已有此語暨淳熙乙未再來預燕則樂師但索曲子不復抗言􅟜酒當是教坊亦聞士大夫疑語而刋去不用也豫按李涪刋誤之言􅟜酒三十拍促曲名三臺􅟜合作啐啐馳送酒聲音碎今訛以平聲李正文資暇録所言亦與涪同豫又以字書驗之􅟜屈破也啐音蒼憒反啐吮聲也今既呼樂侑飲則於啐吸有理於屈破無理則自唐至今皆訛啐為􅟜者索樂之聲貴於發揚逺聞以平聲則便非有他也況又有可驗者丙戌所見燕樂上自至尊下至宰執每酌曲皆異奏而惟侑飲百官者不問初終純奏三臺一曲其所謂三臺者衆樂未作樂部首一人舉板連拍三聲然後管色以次振作即三臺曲度也夫其􅟜酒之語三臺之奏與李涪所傳皆合知啐訛為􅟜素回翻審也後暨乙未再與內燕則樂皆異名雖三臺亦不復奏矣名賢詩話閒適門載王仁裕詩曰淑景即隨風雨去芳尊每命管絃嗺後押朝烏夜􅊵催則嗺酒也以侑酒為義唐人熟語也又趙協交趾事迹下匏笙項下以匏為笙上安十簧雅合律吕嗺酒逐歌極有能者協本朝人其言嗺酒即國初猶用唐語也唐宫人引駕出殿上唐㑹要天祐二年敕今後每遇延英坐朝日只令小黃門祗候引從宫人不得擅出內乃知杜詩户外昭容紫袖垂雙瞻御座引朝儀者真出殿引坐而鄭谷入閣詩亦言導引出宫鈿蓋至天祐始罷臚岱班固叙傳於郊祀志曰大夫臚岱鄭氏曰季氏旅於泰山是也師古曰旅陳也臚亦陳也臚旅聲相近其義一耳按班固即臚代旅與儀禮合革甲吳子謂魏文侯曰今君四時使人斬離皮革掩以朱漆畫以丹青爍以犀象則知戰國時但以革為甲未用鐵也吳子紫荷通典尚書令僕射尚書銅印墨綬朝服佩水蒼玉腰劔紫荷執笏梁制也山𤣥玉水蒼玉通典周制也天子白玉山𤣥水蒼者視之文色所似也玉振管子曰玉有九德叩之其音清専徹逺純而不殺亂也按此諸家之言孔子玉振者曰其謂終條理者為其叩之其聲首尾如一不比金之始洪終殺是為終條理繡衣使所始史記六十二武帝時盜羣起遣中丞丞相長史督之弗能禁乃使范昆張德等衣繡衣持節虎符發兵以擊之五王桃李狄梁公既立中宗薦張柬之袁恕已桓彥範崔元暐敬暉五公咸出門下皆自州縣拔居顯名外以為五公為一代之盛桃李也徐浩廬陵王傳帖職劉禹錫集九荆門縣記云禹錫方以即位帖職于計臺子所見帖職字此為先然未知帖是否爊韓文十三衛造微曰我聞南方多水銀丹砂雜他竒藥爊為黃金可餌以不死鎰趙與蘇秦黃金百鎰注二十兩為一鎰戰國策三一金公孫閈使人操十金卜於市注二十兩為一金䇿八荼與鬱雷東海中有山名度朔上有大桃其卑枝間東北曰鬼門上有二神人一曰荼與一曰鬱雷主治害鬼故世刋此桃梗畫荼與鬱雷首正嵗以置門户蘇秦土偶桃梗國䇿十犀毗趙武靈王賜周紹胡服衣冠具帶黃金師比注云史記胸奴傳漢遣單于有黃金飾具帶一飾漢書要義曰腰即腰中大帶黃金咠紕一徐廣曰或作犀毗注引戰國䇿趙武靈王賜周紹具帶黃金師比延篤云胡苸帶鈎也則帶鈎亦名師比則咠犀與師並相近而說各異耳䇿十九鼓角節將入界每州縣須起節樓本道亦至界首衙仗前引旌􅓚中行大將打珂金鉦鼓角隨後右出李商隱所撰使範在臺儀後夾纈元宗時栁婕好妹適趙氏性巧慧使工鏤板為雜花象之而為夾纈因婕妤生日獻王皇后上見而賞之因敕宫中依樣製之當時甚祕後漸出遍於天下唐語林四珧字書珧蜃甲可飾物則江瑶之用瑶誤矣爾雅釋弓曰弓有緣者為弓以金者謂之銑以蜃者謂之珧則江珧不當為瑶明矣太平御覽三百四十七鹽如方印唐㑹要祥瑞門武德七年長安古城鹽渠水生鹽色紅白而味甘狀如方印按今鹽已成鹵水者暴烈日中數日即成方印潔白可愛初小漸大或十數印纍纍相連則知廣瑞所傳非為虛也銅葉盞東坡後集二從駕景靈宫詩云病貪賜茗浮銅葉按今御前賜茶皆不用建盞用大湯􅜔色正白但其制樣似銅葉湯􅜔耳銅葉色黃褐色也七秩樂天集三十一卷元日對酒曰衆老憂添嵗余衰喜入春年開第七秩屈指幾多人又同日一首云夢得君知否俱過本命年注曰余與蘇州劉郎中同壬子嵗今年六十二金扣器續漢書桓帝祠老子用純金扣器揚雄蜀都賦曰雕鐫扣器百伎千工八蠶吳録曰南陽郡一嵗蠶八績御覽八百十五馬乳蒲萄唐平髙昌得馬乳蒲萄造酒京師始識此酒之味御覽八百四十四疊酉陽雜俎劉録事食鱠數疊今俗書楪字誤以其可疊故名為疊也然牒字乃疊札為之則以疊為楪亦有理也演繁露卷十一
