body:
  text: 演繁露續集卷四宋程大昌撰詩事蝶粉蜂黃嘗有問豫周美成詞曰蝶粉蜂黃都過了用何事豫曰記得李義山集有之李酬崔八早梅曰何處拂胸資蝶粉幾時墮額藉蜂黃又贈子直花下曰屏緣蝶留粉窗油蜂印黃周蓋用李語也取日虞淵吕溫贊狄仁傑曰取日虞淵洗光咸池淮南子天文訓第三曰日出于暘谷浴于咸池拂于扶桑是謂晨明至於悲谷是為晡時至於虞淵是謂黃昏溫蓋言仁傑復辟如取夜日而復諸晨朝也斬無極坡詩曰屬鏤無服不識人楚國何曽斬無極無極費無極也蓋言譖死伍奢者無極也而屬鏤之劒乃不能以及無極案昭十七年楚令尹子常殺無極則無極終遂不免也吳越分境唐僧詩曰到江吳地盡對岸越山多陳後山曰聲言隨地改吳越到江分善謔者曰此杭越堠子詩也其謔亦有理然以後山之博而於杭越二州分境亦隨世傳言之似未諦審也案國語越雖為吳所侵棲之會稽然其國境北至禦兒禦兒今嘉興縣禦兒鄉亦曰語兒也勾踐伐吳用禦兒人涉江駐此江松江也襲吳勝之夫禦兒之人越王得以為用則禦兒之人素𨽻越籍審矣則吳境何嘗抵江也耶蒲萄緑李白詩遙看漢水鴨頭緑恰似蒲萄初醱醅錢希白南部新書曰太宗破髙昌收馬乳蒲萄種於苑中并得酒法仍自損益之造酒緑色長安始識其味太白命蒲萄之色以為緑者本此也蒲萄酒西域古已有之而中國未見故漢人一斗可博涼州也水落魚龍夜水經汧水出小龍山歷澗注以成淵潭漲不測出五色魚俗以為靈莫敢采因謂龍魚水自下亦通名龍魚川山空鳥鼠秋杜詩渭水出隴西首陽縣鳥鼠山禹貢謂導渭自鳥鼠同穴者也水經荆州為南京上元元年九月置南都於荆州以荆州為江陵府二年九月停四宫及江陵南都之號寶應元年復為南都老杜詩曰南京犀浦道四月熟黃梅東坡用杜詩東坡謝賜御詩敘陜西戰勝曰已覺談笑無西戎老杜觀安西兵曰十卷談笑無河北張籍後不盲韓愈贈張十八助教云喜君眸子重清徹携手城南歷舊遊則張之目疾後嘗復舊也火齊天竺有火齊如雲母而色紫裂之則薄如蟬翼積之則紗縠之重據此即老杜謂火齊堆金盤誤以火齊為珠也太平寰宇記木難木難出翅鳥口中結沫所成碧色珠也曹子建詩曰珊瑚間木難酒浮蟻曹子建七啓注曰釋名曰酒有沉齊浮蟻在上泛泛然文選三十四評詩詩思豐狹自其胸中來若思同而句韻殊者皆象其人不可強求也張祜送人遊雲南固嘗張大其境矣曰江連萬里海峽入一條天至老杜則曰窗含西嶺千峯雪門泊東吳萬里船又曰路經灧澦雙蓬鬢天入滄浪一鈞舟以較祜語雄偉而又優裕矣莫射鴈牧之獵詩曰憑君莫射南來鴈恐有家書寄遠人沈存中用之作拱辰樂府曰彎弓不射雲中鴈歸鴈而今不寄書春風不度玉門關唐王之渙與王昌齡髙適飲于旗亭有伶人唱兩詞皆昌齡詞也昌齡夸其同遊遂書壁以記曰二絶句矣渙之指雙鬟令唱曰脫是吾詩子等當拜牀下鬟唱曰羌笛何須怨楊栁春風不度玉門關渙之辭也渙擨歈二子東坡詩曰固知無定河邊栁得共中原雪絮春豈采其意耶然點換精巧踰渙之矣王渙之語出薛用弱集異記在諸家雜説中會意陶詩把菊東籬下悠然見南山本只賞菊而山忽在眼故為可喜也池塘生春草若只就句説句有何佳處惟謝公久病起見新嵗發生故可樂耳栁惲南史傳十八詩曰亭臯木葉下隴首秋雲飛蓋亭臯常時逺望木常遮山今秋至木葉皆脫而又有飛雲焉其思致恢遠故可喜也王融少所許可特愛此句因云可以行遠此非為其語工也意到也天闕象緯逼杜詩天闕象緯逼王介父曰闕當為閲非也水經紀穀水曰漢官典職曰偃師去洛西四十五里望朱雀闕其上鬱然與天連明其峻極之至也白虎通曰今閶闔門外夾建巨闕以應天宿唐史記杜甫死誤本傳云杜以永泰二年卒於耒陽詩中乃云大厯二年調玉燭案代宗永泰二年十一月改元大厯以厯求之則永泰二年嵗在丙午而大厯二年嵗在丁未是子美不卒於永泰二年也蘇子美集末亦嘗言之劉禹錫蘇子瞻用孔子履事東坡跋歐公家書曰仲尼之存人削其迹夢奠之後履藏千載劉禹錫佛衣銘曰尼父之生土無一里夢奠之後履存千祀東坡語意或因劉耶然其作開處不如東坡脈貫也思古刺今寧戚飯牛歌曰生不逢堯與舜禪則太斥言矣杜牧曰清時有味是無能間愛孤雲淡愛僧擬把一麾江海去樂遊原上望昭陵一麾而出獨望昭陵此意婉矣沙河塘潘洞浙江論云胥山西北舊皆鑿石以為棧道景龍四年沙岸北漲地漸平坦桑麻植焉州司馬李珣始開沙河水陸成路事見杭州龍興寺圖經胥山者今吳山也吳山有廟相傳其神伍子胥故也又州圖經云塘在縣南五里此時河流去青山未甚遠故李紳詩曰猶瞻伍相青山廟又曰伍相廟前多白浪也景龍沙漲之後至于錢氏隨沙移岸漸至鐵幢今新岸去青山已逾三里皆為通衢居民甚衆此圖經之言也及今紹興間紅亭沙漲其沙又逺在青山西南矣鳯池鵝晏丞相嘗籠生鵝餉梅聖俞聖俞以詩謝之曰昔居鳯池上曾食鳯池萍乞與江湖客從教養素翎丞相得詩不悅其後有宣州司理者以鵝餉梅蓋蒸而致之故梅詩曰昔年相國籠之贈今日參軍餉以蒸一咀肥甘酬短句定應無復謗言興詳其意趣是先一詩去時有摘語以間者故追言興謗也梅集四十五玉魚葬地杜詩曰昨日玉魚蒙葬地韋述兩京記含元殿成每夜有鬼云我是漢王戊太子葬於此死時天子斂我以玉魚一雙改葬果得玉魚端午飛白扇坡詩曰一扇清風灑面寒應緣飛白在毫端唐會要三十五曰正觀十八年太宗為飛白書作鸞鳯蝶龍等筆勢驚絶謂長孫無忌等曰五日舊俗必用服玩相賀朕今反是賜君白羽扇二枚庶對清風以增美德竹批雙耳峻杜甫詩云會要貞觀二十一年骨利幹貢良馬太宗名為十驥仍敘其奇曰耳根纖鋭杉竹難方筍根雉子杜詩二十二筍根雉子無人見沙上鳬雛旁母眠雉子雉雛也見者現也言筍根草密雉雛可以藏伏候無人時乃始出現蓋以有人無人為出沒之候也説者乃以雉為稚則是以人屬言之而為稚幼也矣稚兒須人扶將何為自藏竹根無人乃見也此全無意味也若用下句儷而求之則鳬雛恃母而安睡與雉雛畏人而不輕出其理一也又如杜之别章曰共醉終同卧竹根言傾銀注瓦瓦銀之奢窶固不侔矣然闕則飲期於醉耳初飲時用器固有瓦銀之異及其醉也固有闕竹而眠不復知其始時銀瓦之别也或者謂以竹根為飲器則上下文皆不貫乞為奴杜詩不敢長語臨交衢但道困苦乞為奴南史齊武子真明帝遣殺之子真走入牀下叩頭乞為奴贖死不許本傳有鞭不施安用蒲崔景真為平昌太守有惠政常垂一蒲鞭而未嘗用東坡送彭州詩曰有鞭不施安用蒲祖思傳早時金碗出人間杜詩早時金碗出人間南史沈詗行經漢武通天臺為表奏之曰甲帳朱簾一朝零落茂陵玉碗遂出人間半夜鐘夜半鐘聲到客船或疑半夜非鳴鐘之時非也南史丘仲孚傳好讀書常以中宵鐘為限僧語亦云分夜小却置之白玉堂後山上蘇公詩曰小却置之白玉堂宋武帝疾戒太子曰謝晦常從征伐頗識機變若有異同必此人也小却可以會稽江州處之出南紀蹄間三丈杜詩曰蹄間三丈是徐行史記陳軫曰秦馬蹄間三尋玉衣晨自舉杜詩玉衣晨自舉平帝紀乙未義陵寢神衣柙中丙申旦衣在外牀上寢令以急變聞村古無村名今之村即古之鄙野也凡地在國中邑中則名之為都都美也言其人物衣製皆雅麗也凡言美者曰都曰子都都人士車騎甚都是也及在郊外則名之為野為鄙言其朴拙無文也曰鄙者如列子自謂鄭之鄙人是也故古語謂美好為都粗陋為鄙本此為義也隋世已有村名唐令在田野者為村别置村正一人則村之為義著矣故世之鄙陋者人因以村名之東坡詩王定國曰連車載酒來不飲外酒嫌其村騎白鳯東坡雪詩鵝毛垂馬騣自怪騎白鳯北夢瑣言五卷曰沈詢侍郎除山北節使誦曹唐遊仙詩云不知今夜遊何處自怪身騎白鳯凰橫海鱗謝世基與謝晦謀叛被收世基為詩曰偉哉橫海鱗壯矣垂天翼一旦失風水翻為螻蟻食東坡送劉貢父詩曰安得北溟池養此橫海鱣冰柱雪車劉叉聞韓愈接後進步歸之吟冰柱雪車二詩出盧同孟郊右叉自有集此二詩正為集首冰柱者謂雪凍而有冰如柱也其語曰簷間冰柱若削出交加終篇之意皆譏成壞無常也至落句則曰我願天子回造化藏之韞櫝玩之生光華雪車詩大意曰官家不知民餒寒盡驅牛馬盈道載屑玉載載欲何之祕藏深宫以御炎酷徒能自衛九重間豈信車轍血點點盡是農夫哭盧同茶詩盧同謝惠茶詩歷敘一碗至六碗皆有功用蓋淺深不同耳其誇茶力至曰既覺兩腋習習清風生蓬萊山在何處玉川子乘此欲歸去案溫庭筠採茶録天台記丹丘出大茶服之生羽翼又茶譜記蒙山中頂茶效曰若獲四兩服其一則袪疾二即無病三即换骨四兩即為地仙有僧信其言僅獲一兩服之病差容貌若三十許人眉髮緑色然則謂茶能輕身可為飛仙唐世通有其傳非同出意自為怪奇也使君公東坡離徐州詩曰父老拜馬前請壽使君公君即公也語似重出今見白樂天集十五卷送劉江州曰遙見朱輪來出郭相迎勞動使君公坡蓋用白語云帕頭讀道書張津為交州刺史好鬼神事嘗著絳帕鼓琴燒香讀道書故東坡詩曰絳帕蒙頭讀道書三句一韻元結浯溪頌每三句一更韻此秦皇會稽頌德之體也其體少有用者元好古特法之其辭亦瑰傑相稱也嚏氣逆而噴涕則為嚏詩願言則嚏是也續詩事天子呼來不上船范傳正作李白墓碑云玄宗泛白蓮池白不在宴皇歡既洽召作序白已被酒於翰苑中命髙力士扶以登舟案此即杜詩謂天子呼來不上船者也或者謂方言以衣襟為船誤矣本集羅趙三輔決録趙襲羅暉能草張伯英與襲同郡太僕朱賜書曰上比崔杜不足下方羅趙有餘東坡詩羅趙前頭敢炫書萬壽白雲杯李義山集中漢南書事云陛下好生千萬壽玉樓長御白雲杯半段鎗唐傳十六哥舒翰吐蕃犯苦拔海哥舒翰持半段鎗迎擊所向披靡東坡譏集句曰路旁拾得半段鎗桃李喻所薦士趙簡子謂陽虎曰惟賢者為能報恩不肖者不能矣夫植桃李者夏得休息秋得其食植蒺藜者夏不得休息秋得其刺焉今子之所得者蒺藜也今世通以所薦士為桃李者説皆本此唐人刺裴度詩曰不栽桃李種薔薇荆棘滿庭君始知用此為據也壻乘龍桓焉兩女嫁李元禮孫雋時人謂桓氏兩女俱乘龍言得壻如龍也金叉十二行梁劉孝綽莫愁詩莫愁十五嫁為盧家婦盧家蘭室桂為梁頭上金叉十二行人生富貴何所望愧不嫁與東家王詳此金叉十二行乃排插十二叉也唐制命婦以花樹多少為髙下曰花叉若干也婁豬艾衛南子召子朝於宋太子蒯瞶過宋野人歌之曰既定爾婁豬盍歸吾艾猳注婁豬求子豬也喻南子艾猳喻宋朝艾老也太子羞之因是欲殺南子不果出奔麻沒橐駝種麻以夏至十日前為上時諺曰夏至後不沒狗或答曰但雨多沒橐駝魯直書其學子課帙曰大雨若懸河禾深沒橐駝用此何遜梅花詩初學記梅門載梁何遜早梅詩其警句曰枝橫却月觀花繞凌風臺金斗顧渚茶録唐張文規為湖守詩寄劉環中秀才云待醉烏程酒思斟平望羮煙雲金斗暗苔蘚石尊平萬壽三元梁沈約上皇太子壽酒奏分雅詩一曲曰百福四象初萬壽三元始拜獻惟衮職同心協卿士北極永無窮南山安足擬藝文歌門演繁露續集卷四
