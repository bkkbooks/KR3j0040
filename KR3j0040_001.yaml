body:
  text: 演繁露卷一宋程大昌撰牛車漢初馬少故曰自天子不能具醇駟將相或乘牛車言惟天子之車然後有馬然亦不能純具一色至將相則時或駕牛也自吳楚誅後諸侯惟是食租衣稅無有橫入故貧者或乘牛車則此之以牛而駕自緣貧窶無資可具非有禁約也漢韋元成以列侯侍祠天雨淖不駕駟馬車而騎至廟下有司劾奏削爵則舍車而騎漢已有禁矣東晉惟許乘車其或騎者御史彈之則漢法仍在也至其駕車遂改用牛王導駕短轅犢車犢牛犢也王濟之八百里駁駁亦牛也言其色駁而行速日可八百里也石崇之牛疾奔人不能追此其所以寶之也南史吳興太守之官皆殺軛下牛以祭項羽知駕車用牛也豈通晉之制皆不得駕馬也耶豫於是考案上古駕車則皆駕牛無用馬者故易曰服牛乘馬也又曰皖彼牽牛不以服箱則牛服之謂也至古之耕却不用牛孔子弟子中有冉耕方字伯牛豈前此未以牛耕耶詩十千為耦長沮桀溺耦而耕沮溺二人相對自挽犂也甘誓御非其馬之正汝不共命詩曰四牡騑騑蕭蕭馬鳴有車鄰鄰有馬白顛則車皆馬駕也然則此時牛既不耕又不駕車則將何用也至於馬既駕車車重而鈍又未有人知用馬為騎直至六韜方著騎兵詩書中元未之有此制殆難考也徐吕皮今使北者其禮例中所得有韋而紅光滑可鑒問其名則徐吕皮也問其何以名之則曰徐氏吕氏二氏實工為之也此說出於遼傳信否殊未可知矣豫案燕北雜禮所載遼事曰契丹興宗嘗禁國人服金玊犀帶及黑斜喝里皮并紅虎皮靴及道宗即位以為靴帶也者用之可以華國遂弛其禁再許服用此即靴帶之制矣及問徐吕皮所自出則曰黑斜喝里皮謂回紇野馬皮也用以為靴騎而越水水不透裏故可貴也紅虎皮者回紇獐皮也揉以硇砂須其軟熟用以為靴也本此而言則知徐吕皮者斜喝里聲之轉者也然斜喝里之色黑而徐吕之色紅恐是野馬難得而硇砂熟韋可以常致故染而紅之以當獐皮也為欲髙其名品遂借斜喝里以為名呼也陷河沈存中曰今之推五行三命者皆借事物以寓其理如驛馬貴人之類是也然貴人驛馬今世術人悉皆知而用之惟陷河一名人固不知亦復不講故沈氏之言曰西域有沙地極虛軟人馬履之隨步􅐓洞如行幕上或值甚虛處陷入其中輒不可出是為陷河也術者既廢此說不用亦無人能知陷河之為何物何理也石晉天福四年嘗遣使冊命于闐以平居誨為制置判官居誨行程記曰自沙州至樓蘭城二千餘里自樓蘭行三月過一處名陷河須束薪排連填匝兩岸乘勢急走乃始得過駝馬比人稍重即須卸去所載獨以身行可也若適遇鋪薪不接之處不問人駝皆陷矣駝雖軀體壯大茍其陷焉亦遂全體淪沒才能露出背峯一入遂不可救故比之陷河也者即沈氏謂命家借之以喻沈滯者也驛馬者隂陽相交第第接續如詩所謂驛驛其達者正其義也夫其驛馬陷河對立而命之名則陷河之與驛馬必如長生之對七殺也三命家既有其名而無其義則古說之傳乎今者多不具矣何可責其必驗也服匿刁斗斯羅南唐張僚使髙麗記其所見曰麗多銅田家饁具皆銅為之有溫器名服席狀如中國之鐺其底方其蓋圓可容七八升案齊雜記云竟陵王子良得古器小口方腹底平可著六七升以示祕書丞陸澄之澄之曰此名服匿單于以賜蘇武子良視其欵識果如所言夫東夷之謂服席即北狄之謂服匿者也語有訛轉其實一物也僚之回也舟至冷泉麗兵來衛中有銅器晝以供炊夜以擊警用顔注驗之即刁斗矣東夷箕子之國也猶知重古三代俎豆至漢尚存則刁斗尚其傳習而近者也若銅厮羅其義絶不可曉案張僚記新羅國一名斯羅而其國多銅則厮者斯聲之訛者也名盆以為厮羅其必由此也中國古固有盆矣皆瓦為之故可叩擊以為樂節者以其有聲也相如請秦王擊缶楊惲謂婦本秦也拊缶而呼烏烏皆瓦為之質未至用銅也若其以銅為質固不知始於何時然其以斯羅為名而至今仍之則斯羅也者本其所出以為之名也後世固有改用黃白二金且鍛且鑄者矣而其易盆名以為斯羅者則其祖本由新羅來不可掩也於是酒器之有豐也樂之有阮咸嵇琴也食品中之有畢羅鑒虛也皆本其自而立之名也則易盆名以為厮羅自當本之新羅無疑也日圓與日說通古謂日輪規環千里特言其周廣當然者耳而無有言其如何其圓者也沈括取銀圜為喻曰月如銀圜本自無光日耀之乃有光其圓非圓乃月與日相望其光全耳及其闕也亦非真闕乃日光之所不及耳此喻最為精審豫已詳著之矣淳熙丙申三月豫為少蓬太史局言朔日巳時日食西北隅食至一分半而復已而日行加已呼請臺官即道山下以盆貯油對日景候之時既及已雲忽驟起少選雲退則日輪西北角微有虧缺約其所缺殆不及一分蓋食已而復非不及一分半也其年某人忘其名使遼自北而回正當食時其行適及河北自北望之則日輪虧及十分之二是太史之言固不能精亦不全謬也豫因此之見益知沈括銀圜之說確與之合也臨安距河北則向南二千餘里矣日食西北人在東南故從東南見之闕處全少是以十其分而闕僅及一也至於人在河北日並東南故其食處多現而遂十分虧二以此見日輪正圓可驗也此如東京所鑄渾儀今在臨安清臺則於西北兩柱移低兩寸以順天勢其痕迹尚在可驗也南北異地於以凖望天度則臨安與汴京自是不同也騶唱不入宫腰唱舊尚書令僕中丞騶唱得入宫門止於馬道馬道是許人上馬處也郭祚為僕射奏言非盡敬之宜騶唱不入宫自此始也按騶唱者騶從之傳呼也朱仲逺為行臺僕射請凖朝式在軍鳴騶廢帝笑而許之史臣謂其任情則是僕射在朝得用騶唱而涖軍則否軍國異容之義也在軍而乞從朝儀所以名為任情也梁制尚書令僕御史中丞各給威儀十人其七人武冠絳韝音溝唱呼入殿引喤至階一人執儀囊不喤喤音橫類篇曰喧也則七人同聲唱導故曰喧也通典二十二絳韝六人所謂騶也學官官者管也一職皆立一官使之典管也故官舍所在皆名為官其曰學官者學舍也五帝官天下以天下為公而使仕者任之是為官矣三王家天下則以天下為已有者也然則學官之義可想矣渭口有船官餘杭有鹽官成都有錦官齊出三服有工官其為官一也漢官稱府漢時廷尉治亦稱府倪寬傳御史亦稱府朱博傳韶鳳石獸黃圖曰文王立辟雍而知人之歸附靈臺靈沼而知鳥獸之得其所以為音聲之道與政通故合樂以識之案此類而言即簫韶儀鳳非真有鳳來也擊石拊石非真有獸舞也若聲若舞皆寫鳳獸而入諸形容焉耳若以為真有儀舞則祖考來格亦真有神像顯然降格也乎周禮樂合而天地神祇皆至是亦此理也大武之舞周人世世用之五成而分周公左召公右豈世世真有周召來集舞佾之前也歟以此求之則夫立為象類而真有感格益可驗矣詩曰於論鼓鐘論者商度其制而求以橅放之也左符魚書漢太守之官必得左符以出至郡用以為驗蓋右符先以留州故令以左合右也唐世刺史亦執左魚至州與右魚合契亦其制也唐世左魚之外又有敕牒將之故兼名魚書唐書曰開成二年幽州節使史元忠奏當管八州凖門下牒追刺史右魚各一隻臣勘自天寶末年頻有干戈並皆失墜伏乞各賜新銅魚可之貨三百五十五後有詔刺史已有制書為驗左魚不給淇澳詩瞻彼淇澳菉竹猗猗陸璣草木疏援爾雅云菉王芻也郭璞云即菉蓐草也豫謂不然史記漢世河役云下淇園之竹以為楗淇水古屬衛地又詩籊籊竹竿以釣於淇亦衛地也夫惟衛竹之大可為河楗而其竿之長可以垂釣則其不為王芻之草亦已明矣本朝之初試文必本注疏不得自主已說嘗試館職有以緑竹為題者試人賦竹以為釣淇之竹而蒞試者咎其不從訓故黜之不取富韓公嘗辨有司之誤矣卞山湖州卞山其形嵯峨略如辨狀故東坡初至湖詩曰聞有辨山何處是為君四面意求看及其至郡巳久凡詩所賦而及此山則字皆為卞不復為辨蓋圖經云卞姓居之故其山名卞也至風土記則曰烏程縣山望之有黃氣紫雲大吳故以葬焉御覽八其字又加山為不知孰是案左氏昭九年為辨髦杜預釋之曰辨冠也陸曰辨亦作卞然則卞辨古蓋通用矣謂山形為辨亦與卞通行李左氏襄八年子員謂鄭有楚命亦不使一介行李告于寡君則行李當為使人今人謂出行資裝為行李固失之矣唐李涪曰使字山下安人人下安子蓋古使字也傳左氏者誤書􅡛為李故一字釐為二字涪之此語亦未必可據昭十三年鄭㑹晉于平丘子産爭承曰諸侯靖兵好以為事行理之命無月不至杜注曰行理使人通聘問者則是正指使人為行理也此最明證也古字多通用理李同也若以行李為行裝之具恐無所本也水碧李太白詩多言采水碧碧玊類也水中有此碧也字書曰碧者玊之縹青者也水經於穀水源派載山海經之言曰紵麻間其中多碧玊篇玊部引山海經亦云商山下多青碧郭璞曰亦玊類也此之謂碧即王褒謂為碧雞之碧也古大夫佩水蒼玊其殆用此乎今信州水精其品下而不瑩者多為縹青之色碑厄王闢之澠水燕談云景祐初姜遵奉太后意悉取長安碑石為塔材因援楊大年談苑叙武行德金石厄以傷之傷之誠是也然此何足怪隋文帝嘗誚世之立碑者曰若欲求名一卷史書足矣不然徒為人作鎮石耳案水經洛陽天淵池中有魏文帝九花樓殿基悉是洛中故碑纍之然則尚矣江左度量尺比唐制通典叙六朝賦稅而論其總曰其度量三升當今一升稱則三兩當今一兩尺則一尺二寸當今一尺注云當今謂即時即時者當佑之時也唐時一尺比六朝制一尺二寸也王制曰古者周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸六分玉食王嘉傳玉食注言精好如玉周禮王齊則供玉食是真以玊參饌也玉不可炊如何可食當是參粒為禮如今人服藥耳書曰惟辟作福惟辟作威惟辟玉食三者一類也作福作威非尋常刑賞之有定别者也天子時出意見特有賜豫誅治也故曰功多有厚賞豫則孥戮汝皆出賞罰之外以作福作威也再以其類推而求之則玊食也者非常饌也當齊之時特設此玉如特作之威福非常法也亦如漢武以玉屑和露之類後世乃欲求服玉之法殆失本意矣類交㦸交㦸之內案通典衛尉公車令曰胡廣曰諸門部各陳屯夾道其旁設兵以示威武交節立㦸以遮呵出入也祏室宗廟神主皆設石函藏諸廟室之西壁故曰祏室室必用石者防火也通典祭若干若干者設數之言也干猶箇也若箇猶言幾何枚也又說干者十幹自甲至癸也亦以數言也漢食貨志邸閣為邸為閣貯糧也通典漕運門後魏於水運處立邸閣八所俗名為倉也巖廊舜逰巖廊李試義訓曰屋垂謂之宇宇下謂之廡步檐謂之廊俗書檐為簷峻廊謂之巖漢宣帝選六郡良家子便弓馬者為羽林郎一名巖郎言其禦侮巖除之下注曰後漢志曰言從遊獵還宿殿階巖下室中故號巖郎通典十八和香梁武帝祀地用土和香杜佑注以地於人近宜加雜馥案雜馥即合諸香為之言不止一香也梁武帝祭天始用沈香古未用也通典四十三霤力救反五祀有中霤左氏三進及霤通典曰古者穴居故名室曰霤許叔重說文曰屋水流也以今人家凖之則堂中有天井處也許說誠確行馬晉魏以後官至貴品其門得施行馬行馬者一木橫中兩木互穿以成四角施之於門以為約禁也周禮謂之陛枑音互今官府前義子是也筮逺日旬之外日為逺日先輩進士唐世呼舉人呼已第者為先輩其自目則曰前進士案魏文帝黃初五年立太學初詣學者為門人滿一嵗試通一經者補弟子不通一經罷遣弟子滿二歲試通二經者補文學掌故不通經者聽須後試故後世稱先試而得第者為先輩由此也前進士者云亦放此也猶曰早第進士而其輩行在先也通典五十三花信風三月花開時風名花信風初而泛觀則似謂此風來報花之消息耳按吕氏春秋曰春之得風風不信則其花不成乃知花信風者風應花期其來有信也徐鍇嵗時記春日金鎰枚乘七發曰射千鎰之重賈逵國語注曰一鎰二十四兩文選三十四花犀帶唐㑹要章服大和六年敕一品二品服色許服犀玊及斑犀按斑犀者犀文之黑黃相間者也此時止云斑犀至近世其辨益詳黑質中或黃或白則為正透外暈皆黃而中涵黑文則名倒透透即通也唐世槩名通天犀若正透倒透之别出於近世也今世士夫便服而繫犀帶惟兩府始服正透從斑已下即服倒透本無定制直是以正透為重耳演繁露卷一
