body:
  text: 演繁露卷十四宋程大昌撰金吾漢志執金吾注金吾烏也金吾執之以禦不祥夫使金吾果禽類從古至今必不絶種何以全無其傳也按揚子雲執金吾針曰吾臣司金敢告執璜崔豹古今注金吾棒也以銅為之黃金塗兩頭謂之金吾也按今三衙大將立殿陛下所執杖子者銀扣兩末而軍職之呼員僚者每朝不笏而杖其制略與之同軍伍間呼其杖為封杖豈古金吾遺制耶以揚崔之語合而證之知其為杖不為鳥也亦以明矣跳蕩渾瑊年十一立跳蕩功唐兵志矢石未交陷堅突衆敵因而敗曰跳蕩一唱三嘆樂記曰樂之隆非極音也食饗之禮非致味也清廟之瑟朱絃而疏越一唱而三嘆有遺音者矣大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣凡瑟之絃練而朱之則其聲濁底竅洪疏則其聲遲用絲本以取聲而特貴其遲濁者正與玄酒大羮薦味而棄味者同一意度故曰遺音遺味也遺味遺音即與上文之謂非極音非致味者相發相應也鄭氏釋遺為餘失其旨矣至於一唱三嘆則鄭謂三人從而嘆之大戴禮傳亦曰清廟之瑟一唱而三嘆之也漢去古未逺一唱三嘆其言如此必有所受也陳僧匠智敘古今樂録引尚書大傳云古者帝王升歌清廟之樂大琴練絃達越大瑟朱絃達越以韋為鼓不以竽琴瑟之聲亂人聲清廟升歌先人功烈德深故欲其清也其歌之呼也曰於穆清廟歎之也於穆者欲其在位者遍聞之也據此而言其三人從旁歎之者從於穆等語申以嗟嘆至于三人也僧匠智作樂録起漢迄梁其於存古甚多其序清商正聲篇曰但歌四曲皆起漢世無絃節奏技最前一人唱三人和魏武好之有宋容華善唱此曲自晉以來四曲並絶其曰但歌者但徒也徒歌者不以被之絲絃而専以人聲故曰無絃節也奏技者技即伎也即本卷題首之謂技曲者是也方其奏技之時無絃矣其歌者最前一人唱之三人從旁和之與鄭氏所言同知漢人共傳之古者如此樂録於清商類中又有可證者其注東光曰舊但絃無聲其注東門曰舊但絃無歌皆宋識造其歌與聲耳從但絃之義以推文可以例但歌之為徒歌也其後又有楚調但曲七如廣陵散之類謂從琴箏而得者則又後人好事寫之絲絃非但歌本然也夫古人貴本遺音既不免絃木為瑟矣又從而理其絃度使之遲濁也漢魏宗尚而推廣之又並與絲絃不用而悉以人聲為貴此其意皆近古而可書茍無匠智傳録則今日不可以意推測矣擊缶應劭風俗通缶者瓦器所以節歌易曰日昃之離不鼓缶而歌則大耋之嗟凶楊惲傳擊缶而呼嗚嗚者真秦聲也由此言之擊缶者皆擊之以節其歌非缶而自能出聲也彤管詩彤管有煒箋云彤管筆赤管也鄭氏以為后夫人必有女史彤管之法史不記過其罪殺之毛鄭説詩多異惟此制略相通其必有所本按漢制尚書郎主作文書起草月賜赤管大筆一雙會稽典録盛吉為廷尉每冬至斷囚持丹筆垂泣則皆丹彤其管以别於常用之筆第不知其得賜得用制度何似耳馬匹馬以匹為數自古言匹馬皆一馬也文侯之命有馬四匹不知當時何指韓詩外傳謂馬夜行目光所及與匹練等或曰匹言價與匹帛等不知孰是因讀劉協文心雕龍其説為長曰古名車以兩馬以匹蓋車有佐乘馬有驂服皆以對並為稱雙名既定則雖單亦復為匹如匹夫匹婦之稱匹是也此義甚通虎賁沈約宋志虎賁舊作虎奔言如虎之奔走也王莽以古有勇士孟賁故以奔為賁此説非也書虎賁三千人賁之為賁久矣古賁奔通不必取孟賁為義官橦貴私橦賤孫伏伽言只為官橦貴所以私橦賤讀者不解按舊唐志虞部職掌柴炭木橦進內及供官客並於農隙納之則木橦也者虞部嵗取諸民有定令也既以令取又不足用則溢額制之而給其直會其科取數多既至而官不更買則不免賤售於外故曰若官橦賤則私橦無田賤也橦徒江反屋幾楹元祐初程頥議更立太學先言三舍每齋須屋七楹其後又言七間為一齋學制所詰問頥前後所須間架不同頥曰所稱齋七楹即是七間别無間架不同不知此時何人主學制所殊可笑也楹柱也詩言旅楹即槩言衆柱耳孔子夢奠兩楹即是在兩柱之間世謂屋若干間者取兩柱夾覆之中故曰一間今文士記屋亦皆相承以幾楹為幾間蓋取柱之一列言之則無礙或析而言之以一間為一楹一楹安得立屋此正所謂因文害事也唐王盈孫傳僖宗還蜀議立太廟盈孫議曰故廟十一室二十三楹楹十一梁是排立十一室無室為屋間二其東西屋盡處别須植柱二列故十一室而二十三楹者以一列為一楹也二十三楹而梁才居十一者從南面計視亦以梁列數之故每室才云一梁也洋州洋當讀如汪洋之洋今讀如詳莫明所起説文洋水出齊臨朐雖非今洋州之洋然徐諧著音乃以似羊為翻則當讀洋如詳古有之矣洋揚二州聲稱相雜豈其世人病之而借齊洋音讀以加梁洋使有差别乎浙江説文釋浙江云江水東至會稽山隂為浙江又漸水出丹陽黟水東入海皆今錢塘浙江也秦始皇渡浙至會稽又莊子有浙河則浙名舊矣桑欽載漸水所徑所入正今浙江而不名為浙若謂浙漸字近久而相變如邾鄒之類耶則浙之得名既已先秦而桑欽更以為漸何耶許氏浙水漸水又復兩出皆不可曉黟歙今徽州也休寧縣有浙溪溪上有浙嶺而婺州亦有浙溪二州水皆會桐廬而遂從杭越間入海則本其發源各名為浙亦無抵牾第以古語為正則出黟者古也浯世傳浯溪本無浯字元結自名之恐不然也説文浯水出琅琊靈門壺山東北入濰從水吾則浯非結之所名地箭貫耳軍法以矢貫耳為聅聅之音恥列徒安二翻也説文引司馬法曰小罪聅中罪則大罪剄故子玉治兵鞭七人貫三人耳者用此法也漢原涉犯罪茂陵守令尹公捕之急諸豪説尹欲使肉袒自縳箭貫耳詣廷門謝罪則用箭貫耳以示恐畏非以意為之也衙凡官寺吏卒率以晨晡兩時致禮俗呼衙府古有之而稱謂訛也漢文釋申曰吏以晡時聽事申旦政也藝文類聚載古射覆蜜蜂之辭曰花花華華雖無官職一日兩衙則凡官寺日再聽事吏卒因之亦兩致其恭當用衙晡二字府餔聲之訛者也天子御正殿受朝亦名正衙不知何始酎漢八月飲酎説者曰酎正月釀八月成許叔重曰八月黍成可為酎酒酎三重醇酒也二説不同然酒固有久醖者恐八易月乃成期太迂逺當以黍成可釀為是黍既登熟三重釀之八月一月可辦也漢藏書處漢世藏書舊知有禁中外臺之别已今讀劉向敘載所定列子之書而知中書之外又有太常太史與中祕而三也向言所校三藏本篇章大率中書多外書少知漢留意中祕故比他本特備也史遷紬金匱石室以成史記豈嘗許其稽閲中祕耶或太史所藏于漢家事實則金匱石室以加嚴耶然不知正在何地也箭括列子仲尼篇言善射者能令後鏃中前括發發相及矢矢相屬前矢造凖而無絶落後矢之括猶銜弦視之若一焉唐六典武庫令注箭制曰其本曰鏑其旁曰羽其矢末曰括括旁曰疑恐是擬字書所謂往省括于度則釋者矢之末分岐而銜弦者是括也南墳西墳國朝宗子自祔葬山陵之外又有南墳西墳問諸宗子多南渡後始生無知之者建炎二年十月知汝州張抃奏劾其州官遁竄之罪有趙叔潛者結銜云保義郎添差管轄舒王已下墳圍有承節郎王世斌者其銜即云𬋩轄魏王已下墳圍此之舒魏二王墳南西二墳也耶臚傳漢書臚傳古今不曽究極其義按儀禮士冠禮主人得筮反之筮人筮人還東西旅占卒進告吉鄭氏注云旅衆也古人旅作臚豫因讀此始悟臚傳曰旅傳也今之臚傳自殿上至殿下皆數人抗聲相接使所唱之語聫續逺聞則臚傳之為旅傳其已審矣鴻臚寺主典賔客亦取大衆會集以為名寺之義古爵羽觴楚辭曰瑶漿蜜勺實羽觴張衡西京賦促中堂之狹坐羽觴行而無算班婕妤東宫賦曰酌羽觴兮消憂諸家釋羽觴皆不同劉德曰酒行疾如羽如淳曰以玳瑁覆翠羽於下徹上可見劉良曰杯上插羽以速飲皆非是束晢論褉曰逸詩云羽觴隨波流且以隨波之用證之若果插羽則流泛非便至謂玳瑁翠羽相須為麗則太不經惟李善引漢書音義曰作生爵形者是也古飲器自有爵真為爵形劉杳謂古尊彜皆刻木為鳥獸鑿頂及背以出酒者即其制也本朝李公麟得古爵陸佃繪之禮象圖其形有咮有足有尾但不為背而盡窪虛其中以受酒醴蓋通身全是一爵也惟右偏著耳以便執持如屈巵然乃始是飲器制度蘇文忠之詩有狀胡穆銅器者曰隻耳獸齧環長唇鵝擘喙三趾下鋭春蒲短兩柱髙張秋茵細君看翻覆俯仰間覆成三角翻兩髻古書雖滿腹苟有用我亦隨世嗟君一見呼作鼎才注升合已漂逝文忠不正命其器以為爵而徇穆之所名姑以為鼎然味其所詠形模大小以較禮象則與李公麟古爵正同古爵雀字通紹興間奉常鑄爵正作雀形如禮象所繪知其有所本也則夫以爵為觴而命之羽觴正指實矣孟康釋班賦亦曰羽觴作生爵形有頭尾羽翼師古曰孟説是也第其制隨事取便鑄銅為之則可堅久於祭燕為宜若以流泛即刻木為之可飲可浮皆通便矣交牀今之交牀制出塞外其始名胡牀桓伊下馬據胡牀取笛三弄是也隋以讖有胡改名交牀胡瓜亦改黃瓜唐柴紹擊西戎據胡牀使兩女子舞則唐史臣追本語以書也唐穆宗長慶二年十二月見羣臣於紫宸殿御大繩牀則又名繩牀矣金為兵器孫愐唐韻釋鎧曰甲也管子云葛盧之山發而出黃金蚩尤制以為鎧謂蚩尤鑄鎧不知管子何所本然是以知周世之鎧必已用金也漢嚴安傳曰今天下煆甲磨劒矯箭控弦許叔重説文曰兜鍪首鎧也釬侯肝反臂鎧也錏音鴉煆霞頸鎧也自身鎧之外鍪釬錏煆循首以至頸臂悉皆有鎧而字又從金仲長統昌言曰古者以兵車戰而甲無鐵札之制今誠以革甲當強弩亦必喪師亡國則甲用鐵札西都已然不待漢末也袒免禮有袒免鄭氏曰免音問以布廣一寸從頂中而前交於額上又卻向後繞於髻也豫疑不然記曰四世而緦服之窮也五世袒免殺同姓也服之旁殺而至於緦僅為三月則自此之外不更有服矣然而由四殺五不可頓如路人故屬及五世而族人有喪則脫露半袖見其內服是之謂袒解除吉冠是之謂免免之為言正是免冠之免不應别立一冠名之為免而讀之如問也曲禮曰冠無免勞母袒免且袒皆變易其常故侍君子者以為不恭而無服者之屬用以致哀示與路人異也經於緦有三月而袒免無期日也既無服又無期日第行之始死之時其斯以為戚矣歷考禮經本文止言袒免更無一語記其如何為袒如何為免則是小功以上衰絰冠杖實有其制而袒免則元無冠服故亦莫得而記也周禮垂衰冠之式於門謂緦小功以上亦無袒免體式也使誠有其制如鄭氏所言則亦不成其為冠也況袒既不别為之衰又對免而言知當未斂之時第使之袒衣免冠者事情之稱也古今言以布繞頂及髻而謂之為免者惟鄭氏一人自漢以後并免而數以為冠名則皆師述鄭氏也杜佑博識古事而特致疑於此雖其敘載喪制即免加絲借古冕之絻著以為絻若用鄭矣而特自出其見於下曰絻制未聞惟鄭氏云云則佑固不以為安矣按禮凡因事及免必與冠對喪服小記曰男子冠而婦人笄男子免而婦人髽又曲禮冠毋免則凡免皆與冠對免之為免當正讀為免其理已明矣喪而免冠不惟五世無服用之雖重如斬齊當其未斂未及成服亦嘗用之蓋闕喪之始未辦成服姑仍常時衣冠在衣則袒在冠則免以為變常之始故經紀重喪曰袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也賈公彥之釋袒免首尾遵本鄭氏惟於此特循正理而為之言曰冠尊不居肉袒上必先免故凡哭哀則踊踊必先袒袒必先免是袒且免皆因哀變常而未及為服者之所為也斬齊重矣故免冠而肉袒免冠且肉袒矣而又被髮不紒則以麻約之較之五世袒免則此為其重若其袒衣免冠以示變常則斬齊袒免其意同也且免之為免不止始喪然也喪服小記曰既葬而不報虞則雖主人皆冠及虞則皆免又曰逺葬者比反哭者皆冠及郊而後免又曰君弔雖不當免時也主人亦免凡此三節皆以冠對免而免則皆取其進而及於重也葬而誠虞也逺葬而及郊近墓也已過免時而君始臨弔也則皆以免冠為禮取始死之節以重為之也葬不報虞逺葬而未及墓若過時而有弔者自非其君則皆仍所喪之冠而不為之免處之以喪禮之常也從是推之知免冠之為始死之節也喪小記又曰斬衰括髮以麻母括髮以麻免而布之蓋父母皆當以麻括髮而古禮母皆降父故減麻用布示殺於父也此之謂免蓋應用而許其不用故特言免以明之若如鄭言以免為免音問則居母喪者既括髮以麻而以布為免音問遂當以免而加諸齊衰之上則是降斬而齊遽著五世以外輕殺無服之冠豈其理乎至此推説不通矣然以免為冠萬世宗信鄭氏豫獨不以為安故著此以待博而不惑者折衷之演繁露卷十四
