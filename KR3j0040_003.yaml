body:
  text: 演繁露卷三宋程大昌撰誕馬宣和鹵簿圖有誕馬其制用色帛周裹一方氊蓋覆馬脊更不施鞍此其為制必有古傳非意創矣然名以為誕則其義莫究也蔡攸輩雖加辨釋然不協當案通典宋江夏王義恭為孝武所忌憂懼故奏革諸侯國制但馬不得過二其字則書為但不書為誕也但者徒也徒馬者有馬無鞍如人袒裼之袒也迹其義類則古謂徒歌曰謠是其比也其所謂徒者但有歌聲而無鐘鼓以將也然則謂之但馬蓋散馬備用而不施鞍轡者也通典三十一又王瓊每見道俗乞丐無已道逢太保廣平王懷遽自言馬瘦懷即以誕馬并乘具與之案此書但為誕誤也所與者但馬而無鞍勒故以乘具與之其理相貫也又案酉陽雜俎一卷北齊迎南使使主副各乘車但馬在車後鐵甲百餘人其所書曰但馬而不曰誕馬在車後而名但知無乘具以備闕也卜教後世問卜於神有器名杯珓者以兩蚌殼投空擲地觀其俯仰以斷休咎自有此制後後人不專用蛤殼矣或以竹或以木略斫削使如蛤形而中分為二有仰有俯故亦名杯珓杯者言蛤殼中空可以受盛其狀如杯也珓者本合為教言神所告教現於此之俯仰也後人見其質之為木也則書以為校字義山雜纂曰殢神擲校是也校亦音珓也今野廟之荒涼無資者止破厚竹根為之俗書竹下安教者是也至唐韻效部所收則為珓其説曰珓者杯珓也以玊為之説文玊篇皆無珓字也案許氏説文作於後漢顧野王玊篇作於梁世孫愐加字則在上元間而廣韻之成則在天寶十載然則自漢至梁皆未有此珓字知必出於後世意撰也千祿書凡名俗字者皆此類也至其謂以玊為之決非真玊玊雖堅不可揚擲兼野廟之巫未必力能用玊也當是擇蚌殼瑩白者為之而人因附玊以為之名凡今珠璣琲珕字雖從玊其實蚌屬也夫惟珓校既無明據又無理致皆所未安豫故獨取宗凛之説也凛之荆楚嵗時記曰秋社擬教於神以占來嵗豐儉其字無所附並乃獨書為教猶言神所告於揚擲乎見之也此説最為明徑也又嵗時記注文曰教以桐為之形如小蛤言教教令也其擲法則以半俯半仰者為吉也此其所以為教也流離漢西域傳罽賓國有琥珀流離師古曰魏略云大秦國出赤白黑黃青緑縹紺紅紫十種流離此蓋自然之物采澤光潤踰於衆玉今俗所用皆銷冶石汁加以衆藥灌而為之虛脆不耐實非真物案流離今書附玊旁為琉璃字師古之記流離是矣而亦未得其詳也穆天子傳曰天子東征有采石之山凡好石之器於是出天子升山取采石焉使民鑄以成器於采石山之上注云采石文采之石也則鑄石為器古有之矣顔氏謂為自然之物恐不詳也北史大月氏傳魏太武時月氏人商販京師自云能鑄石為五色琉璃於是采礦於山中即京師鑄之既成光澤乃美於西方者自是中國琉璃遂賤用此言推之則雖西域琉璃亦用石鑄無自然生成者若果出於生成則月氏之賈從何人而受此鑄法也兼外國竒産中國未始無之獨不聞有所謂真琉璃也東坡作藥玊盞詩曰鎔鉛煮白石作玊真自欺東坡謂煮即穆傳之所謂鑄顔氏之謂銷冶者也然中國所鑄有與西域異者鑄之中國則色甚光鮮而質則輕脆沃以熱酒隨手破裂至其來自海舶者製差朴鈍而色亦微暗其可異者雖百沸湯注之與磁銀無異了不損動是名畨琉璃也畨流離之異於中國流離其别蓋如此而未嘗聞有以石琢者也如階石之類古謂之珉又謂之碔砆至瑛璁琇玫皆石之似玊者使此一種石而入用自附名於玊不為流離矣故知師古之言為未審也闌出漢法闌出謂以違禁之物越出邊禁之地也無籍而冒入宫殿則為闌入謂其人身竊入宫禁之內也闌有遮攔之義古字多通用闌闌攔皆一也攔檻之版為蘭子虛賦云宛虹拖於楯軒注云楯軒軒之蘭版也張平子西都賦曰伏櫺檻而俯聽薛綜曰櫺臺上欄也為軒檻可以限隔髙下故名之為欄是皆闌干之闌也兵器在架曰蘭張衡賦曰武庫禁兵設在蘭錡李善引劉逵魏都賦注曰受它兵曰蘭受弓弩曰錡蓋以轄束兵器名之曰蘭也井上四立幹四出而相交亦名為蘭言能遮限井口也聮木以邀遮禽獸為闌上林之賦校獵也顔師古注曰校以木相貫穿總為闌校遮止禽獸而獵取之也馬牛間廏為闌周官校人闌板以養馬故命之為闌也納奴婢間中而鬻賣之亦名為闌賈誼傳賣僮納之間中間即闌也合數者而求其義則闌出闌入之理皆昭昭矣後世財利所在官專其入則命之為𣙜𣙜者水上獨木之橋也言獨專此水禁塞它路如一木橋然也夫以專取為𣙜則犯國禁而越出越入皆當為闌矣十數改用多畫字古書一為一二為二三為弎蓋以弋為母而一二三隨數附合以成其字特不知單書一畫為一單書二畫三畫為二為三起自何時今官府文書凡其記數皆取聲同而點畫多者改用之於是一二叄肆之類本皆非數直是取同聲之字借以為用貴點畫多不可改換為姦耳本無義理可以與之相更也若夫十之用拾八之用捌九之用玖則全無附並也然亦有在疑似間者易之參兩天地左傳自參以上則往稱地來稱會是嘗以參為三矣顔子不二過士有二宗國不堪二為其與正為副則二之為二尚或可以傅會矣在顔師古時江充傳固已訛大臺為太一矣薛宣傳本曰一笑為樂而傳本乃作一笑為壺矢則是此時一己為一矣若元本不用一字則一字本止一畫何緣轉易為壺為矢也若曰唐至明皇始盡以今文代去古文因盡歸咎明皇則師古之時漢書傳本何為已變大臺以為太一一笑以為壺矢耶又凡漢書一字皆以一代則一變為一久在明皇之前矣然而古今經史凡書千百之字無有用阡陌之阡公伯之伯者豫故疑舊本不曽改少畫以從多畫也然不能究其起自何時大衍虛一正易新法之論大衍曰挂一之在四十九元不入用則雖去之無欠也其意以為揲蓍之初此一既挂左指則自不預揲數上聲之數去聲矣及其四已定此一又歸竒扐則又不入七八九六之用故曰去之無欠也此蓋以象數言易於有爻之後而不知超象數以求易於未爻之前也道生一一生二二生三三生萬物一之生二是虛一之能生天生地者也夫天地得此之生於太極也其象在蓍則分一為二是其形容已然此之分二者從何而來豈非從一握則四十九用皆藏一握之內及其分一握以為兩握則一已生二而一遂無見聖人於是即五十蓍中取其一蓍挂之左指者既不以揲又不循數其意蓋示四十九用之上此之一數處總無為而四十九者各以七八九六聽令而受數焉耳故此一雖虛而天下之實莫不由之以出則安可知有用之用而不知無用之用也故知此説不能求諸未爻之前也契丹於達魯河鈎魚燕北雜録載契丹興宗重熙年間衣制儀衛打圍射鹿鈎魚等事於景祐五年十月撰進不書撰人姓名而著其所從聞曰思鄉人武圭在遼十餘年以善歌𨽻帳下故能習遼事詳悉凡其所録皆圭語也達魯河鈎牛魚遼中盛禮意慕中國賞花釣魚然非釣也鈎也此之所記於遼為道宗清寧四年其甲子則戊戌正月也達魯河東與海接嵗正月方凍至四月而泮其鈎是魚也遼主與其母皆設次氷上先使人於河上下十里間以毛網截魚令不得散逸又從而驅之使集遼帳其床前預開氷竅四名為氷眼中眼透水旁三眼環之不透第斫減令薄而已薄者所以候魚而透者將以施鈎也魚雖水中之物若久閉於氷遇可出水之處亦必伸首吐氣故透水一眼必可以致魚而薄不透水者將以伺視也魚之將至伺者以告遼主即遂於斫透眼中用繩鈎擲之無不中者既中遂縱繩令去久魚倦即曳繩出之謂之得頭魚頭魚既得遂相與出氷帳於别帳作樂上壽古用玊非純玊古禮用玊甚多而玊不乏或疑古玊多於後世是則然矣然而有説也説文玊部案禮天子用全純玊也上公用駹四玊一石侯用瓚伯用將玊石相半也然則瓚將云者其質半玊半石而駹者五分其質而四分為玊一分為石也然則古之禮玊惟天子所用通體是玊若其間雜之以石則不用也自上公以降則駹瓚將之質雖不免雜之以石亦入用也則其禮用雖多凡半珉半玊亦入用也紹興十三四年間或於會稽禹廟三清殿前發地得瘞玊官寺初未之知人多分取及縣官知而録之止餘四物其一蒼璧也色帶青一邊有土黯處稍變為土黃色不知在瘞幾年矣其二蒼璋也極小略可三五寸許正為半圭之形此三者蓋真玊也又有一物體圓如璧而旁出兩角角末即是圭頭在禮所謂兩圭有邸者也色似玊帶白而體質甚軟觀者多用指瓜掐試已成深穴細視正是寒長解石輩耳亦恐未可名之為珉也其器見藏禹廟縣尉典之前後官遞相付授防換竊也吳民可帥越大興工浚鏡湖得小玊璧以藏公帑中迹此數物而考之以古則皆得諸禹廟其在土中者必為薶玊以祭者也得之水中者則其沈祭之玊也古用玊如此之多也蓍以七為數諸家多言蓍以七為數至其何以用七則莫有言者意謂七七四十九正蓍之用耳歷考諸易自數總以及數變皆無以七為祖者獨有七為少陽固在四策之一然此之七也進之不得為陽數之極退之不能為陽變之祖則七在四策中特其列數之一耳安能總攝它數也顧獨於末流取四十九以配七七而謂蓍數之祖何所本也鴻毛王褒聖主得賢臣頌曰翼乎如鴻毛之遇順風鴻毛非指其羽中之最大者言如鴻鵠得風而順其羽翰既大風又借便故以為賢臣遇主之喻也河豚類篇魚部引博雅云鯸盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨禹冢漢地理志會稽郡山隂縣注云會稽山在南上有禹冢禹井今紹興府城東十許里有告成觀觀有禹廟相傳禹墓在廟東之小山山下又有窆石或云禹葬所用然絶無信傳又其地自在山隂縣治之東與古傳在南者方鄉不應若紹興府府治則又在今山隂縣之西而其正南大山即秦望山也秦始皇父子皆登此山以祭禹矣南史記秦碑至今尚在讀二世碑是也然則禹墓在秦望山上山隂縣南而不在告成觀甚明背子中襌今人服公裳必衷以背子背子者狀如單襦夾襖特其裾加長直垂至足焉耳其實古之中襌也襌之字或為單皆音單也古之法服朝服其內必有中單中單之製正如今人背子而兩腋有交帶橫束其上今世之慕古者兩腋各垂雙帶以凖襌之帶即本此也江充傳衣紗縠襌衣師古曰襌衣若今之朝服中襌也漢官儀曰虎賁中郎將衣紗縠襌衣事物紀原曰漢髙帝與項羽戰汗透中單且曰中單即今汗衫非也屣音屣地理志趙地倡優女子彈弦跕它頰反屣遊媚富貴注躡跟為跕挂指為躡師古曰屣謂小履之無跟者也跕謂輕躡之也案今人夏月以生帛為屧其三面稍隆起惟當腳跟處正低即師古所指也湘素雜記靖康間閩人黃朝俊所作也辨正世傳名物音義多有歸宿而時有闕疑者至釋宋子京刈麥詩以四月而曰為麥秋案北史蘇綽傳麥秋在野其名逺矣是未嘗讀月令也以此見博記之難宿州虹縣虹縣今宿州屬邑也今讀如絳孔光傳光為虹縣長注虹沛之縣也音貢與今呼不同舞馬梁天監四年禊飲華光殿其日河南獻赤龍駒能伏拜善舞周興嗣為賦本傳六十二案此時已有舞馬不待開元間矣唐中宗景龍文館記已有舞馬亦非明皇創教也渾姓劉禹錫集二十八送渾大夫赴豐州其詩曰鳳銜新詔降恩華又見旌旗出渾家然則渾姓側聲也怪石禹貢青州貢品有鉛松怪石説者疑怪石之為玩物不當責貢豫曰非也其所謂怪非今世所玩如靈璧太湖之石嵌空玲瓏可為戲玩也質狀色澤似石而非石故以怪名也怪者異也説文瑀璅音繅玗音于􅊅音燮詩之貽我佩玖有蒼璁衡以至系壁之琫充耳之琇與夫瑎之黑也珊瑚之赤也碧雞之碧也許氏以及漢儒皆嘗枚列其物而命之名曰此石之次玊者也此石之能比乎玊者也以此之石而比璠璵璿瓘瑾瑜琳球則不能齊及然能超出常石之上得與真玊為比豈非石類之卓然秀異者乎則其命為之怪非抑之也所以髙之也且古之用玊比後世特多不止六器五瑞而已也刀劍衣佩曰用之具皆用玊也用玊既多則所須必倍其勢不得不以似玊者充代足用也故玖璁琫琇固已明用美石而夫駹瓚將之類則玊而雜石亦兼用之然則兼列怪石以期足用事之必然者也則怪石之貢以用而不以玩亦已明矣莕婕妤詩參差莕菜左右采之許氏曰菨餘也左右者后妃左右所謂淑女也言左右淑女如河洲之有菨餘也豫於是疑漢之婕妤取此義以名也字或加女則為婕妤或加人則為倢妤皆本詩之莕菜而增偏旁也漢世名所采良家女為采名或亦本此矣富貴昌宜侯王淳熙乙巳豫以大饗恩封新安郡侯時寺丞佐善小篆豫問何人能刻銅當呼之使刻時因引豫入一書室四壁盡是古器皆有欵識其中一盆鑄寫特精而格制差淺四旁皆隱起水波中有兩魚其間不為水紋處有篆文六字曰富貴昌宜侯王豫時大病更生樂見昌宜二字意益欣然不暇究其為何種制度也丁未三月二十八日在建寧閲唐會要見上元間髙宗即洛北營建隂殿韋洪機掘地得古銅器如盆而淺中有蹙起雙鯉之狀魚間有四篆字曰長宜子孫以較時公所藏則盆與樣制皆與之合其中字語則隨人意向故兩語不同耳然則此制唐已前既有之矣桔橰水車水車古無見莊子曰漢隂丈人鑿隧而入井抱甕而灌則直提甕汲井汲滿即出而灌之未有機巧也子貢於是語以桔橰之制其説曰後重前輕挈水若抽數如沃湯案此意制是就有水處立木其上交午如十字一頭繫甕一頭虛垂汲者制其低昂故其挈水若抽數如沃湯也沃湯者湯之沸騰而湧起者也此其為械比之抱甕則事半而功加倍矣然而自此時至漢皆未有今世捲水之車也不獨未有捲水之車也雖水磨水碓亦無載焉故知智未及知也魏略曰馬鈞居京都有地可為園患無水以灌乃作翻車令童轉之而灌水自覆更出更入其巧百倍於常此方是今之水車也矣出魏略載在御覽八百十四東堂桂晉郤詵試東堂得第自言猶桂林一枝東堂者晉宫之正殿也山謙丹陽記曰前殿正殿也東西堂魏制也在周為小寢也御覽三百七十五含章梅粧壽陽公主在含章殿梅花飄著其額因橅倣之以為粧樣山謙之丹陽記曰皇后正殿曰顯陽東曰含章西曰徽音皆洛陽宫舊名也名起後漢御覽三百七十五太守黃堂郡國志曰雞坡之側即春申君之子假居之地也後有守居之以數失火故塗以雄黃遂名黃堂御覽堂門赤米國語曰越大夫種謀曰今吳既罷而大荒薦飢市無赤米注曰米之惡者也御覽三十五案赤米今有之俗稱紅霞米田之髙卬者乃以種之以其早熟且耐旱也然則越時已有此米矣南史任昉傳昉解新安太守去惟載桃花米即赤米是也演繁露卷三
