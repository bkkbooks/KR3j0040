body:
  text: 演繁露卷十二宋程大昌撰侯鵠周禮司裘王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠鄭氏注侯謂以虎熊豹麋之皮飾其側又方制之以為音凖謂之鵠著于侯是謂皮侯賈公彦循鄭氏此説謂還以熊虎等皮為鵠於其上其説恐未然也射之設鵠以為的也若以熊虎等皮為侯又以熊虎等皮為的則侯與鵠兩無别異恐古人立的以凖射不應如此昧昧鄭氏亦自覺不安又従為之説曰鵠小鳥難中是以中之為雋其義近之而不敢自主何也鵠之為物揚飛迅駛射之難中故古人言射者往往及之孟子曰一心以為鴻鵠将至思援弓繳而射之漢髙帝曰鴻鵠髙飛一舉千里羽翼已就横絶四海雖有繒繳尚安所施又梓人張皮侯而棲鵠其在皮侯則曰張在鵠則曰棲是鵠非皮類而真為鵠形審矣夫惟以獸皮為侯而棲鵠其上於示逺立的便故吾恐鄭氏之説未安也琵琶皮絃葉少藴石林語録謂琵琶以放撥重為精絲絃不禁即斷故精者以皮為之歐公時士人杜彬能之故公詩云坐中醉客誰最賢杜彬琵琶皮作絃因言杜彬恥以技傳丐公為改予考公集所載贈沈博士歌誠有此兩句然其下續云自従彬死世莫傳玉練繅聲入黄泉則公詠皮絃時彬已死安得有丐改事恐石林别見一詩耶陳後山亦疑無用皮者然元稹琵琶歌傾聲少得似雷吼纒絃不敢彈羊皮又曰鵾絃鐵撥響如雷房千里大唐雜録載春州土人彈小琵琶以狗腸為絃聲甚凄楚合三物觀之以皮造絃不為無證若詳求元語恐是羊皮為質而練絲纒裹其上資皮為勁而其聲還出於絲故歐公亦曰玉練繅聲也冒絮薄太后以冒絮提文帝晉灼曰巴蜀異志謂頭上巾為冒絮冒音陌顔師古曰老人以覆其頭應劭曰陌額絮也詳其所用當是以絮為巾䝉冒老者顙額也冒之義如冒犯鋒刃之冒其讀如墨則與陌音冒義皆相近矣漢官舊儀皇后親蠶絲絮自祭服神服外皇帝得以作縷縫衣皇后得以作巾絮而已以絮為巾即冒絮矣北方寒故老者絮䝉其頭始得温暖地更入北則塞外貂冠狼頭帽皆其具矣玉樹甘泉賦翠玉樹之青葱左思譏以假稱他土珍怪按漢武故事既得欒大即甘泉宫造甲乙帳前庭植玉樹玉樹之法葺珊瑚為枝以玉碧為葉花子或青或赤悉以珠王為之故顔師古注云玉樹者武帝所作集衆寳為之用供神也非自然而生左思失之葢為是也長安記正以玉樹為槐也當是並縁青葱之語乎甲庫唐吏部有甲庫龎元英文昌雜録曰用甲乙次第其庫而此庫其首也猶如漢言令甲令丙然此誤也唐制中書門下吏部各有甲厯名凡三庫其曰甲者若干人為一甲其在選部則名團甲其在今日則擬官奏鈔總言此鈔某等凡幾人者是其制也唐云甲令言等一也是其所従名庫以甲也㑹要太和九年勅令後應六品闕已下凡自稱舊嘗有官皆下甲庫檢勘有無又貞元四年吏部奏艱難以來三庫勅甲又經失墜人多罔冒乃至制勅㫖甲皆被改毁則甲庫也者正收藏奏鈔之地非甲乙之甲也僧衣環唐㑹要吐蕃官章飾有五等一瑟瑟二金三以金飾銀四銀五熟銅各以方圓三寸褐上装之安膊前以辨貴賤今僧衣謂之袈裟者當胷有環環中著鍵横紐上下牙角銀銅隨力為之其源流殆出此乎疇人古字不拘偏旁多借同聲用之漢志疇人疑籌人也従筭厯言之比疇列之疇於義為徑登席必觧韈左氏哀二十五年衛侯蒯輒與大夫飲酒靈臺褚師聲子韈而登席公怒辭曰臣有疾異於人若見之君将㱿之㱿嘔吐也以是知古者登席不獨脫屨又觧韈也兩觀魯有兩觀非度也書新作雉門及兩觀皆譏也然戮少正夘必即兩觀以周之所以誅誅之不毁明堂之意也夫将有為東周之心則佛肸尚可因而況周度之所寄乎社日停針線取進士衣裳為吉利張籍吳楚歌詞云庭前春鳥啄林聲紅夾羅襦縫未成今朝社日停針線起向朱櫻樹下行則知社日婦人不用針線自唐已然矣又送李餘及第云歸去惟将新誥牒後來爭取舊衣裳又知新進士衣物人取之以為吉兆唐俗亦既有之六么段安節琵琶録云貞元中康崑崙善琵琶彈一曲新翻羽調緑腰注云緑腰即録要也本自樂工進曲上令録出要者乃以為名誤言緑腰也據此即録要已訛為緑腰而白樂天集有聴緑腰詩注云即六么也今世亦有六么然其曲己自有髙平仙吕兩調又不與羽調相協抑不知是唐世遺聲否耶文史封氏見聞記古者十嵗入小學學書計十七能誦書九千字乃得為史又更郡守課試乃得補書史即東方朔所謂三冬文史足用而以二十二萬言為多者也文人便以文史為史籍非也笛曲梅花段安節樂府雜録笛羌樂也古曲有落梅花吳兢樂府要解胡角者本以應胡笳之聲後漸用之有雙横吹即胡樂也兢所列古横吹曲有名梅花落者又許雲封説笛亦有落梅折栁二曲今其辭亡不可考矣然詞人賦梅用笛事率起此金蓮燭令狐綯賜金蓮燭是以金蓮花為臺事見摭言知後典縣吏受郡事而下之縣者今皆謂之祇候典訛也國朝㑹要唐藩鎮皆置邸京師謂之上都留後院大厯十二年改為上都知進奏院又摭言載夏侯孜業李敬者久従孜苦厄不去同類怵之他適敬曰吾主人登第尚擬作西川留後官後十年孜鎮成都以敬知進奏以此言之今之祇候典云者乃借唐藩鎮留後吏目以為名稱當曰知後典不當曰祇候典也此雖猥事而世間名稱如此其訛者多也墓石誌西京雜記杜子夏𦵏長安臨終作文曰云云及死命刋石埋於墓側則墓之有志不起南朝王儉然西京雜記所紀制度多班固書所無又其文氣嫵媚不能古勁疑即葛洪為之卷白波飲酒卷白波唐李濟翁資暇録謂漢時嘗擒白波賊人所共快故以為酒令晏公類要六十五卷白集詩云長驅波卷白連擲采成盧注曰骰盤卷白波莫走鞍馬皆當時酒令名玉衣老杜詩玉衣晨自舉鐵馬汗常趨皆言昭陵神靈也三輔故事髙廟中御衣従篋中出舞於殿上冬衣自下在席上幞頭垂脚不垂脚幞頭起於後周一名四脚其制裁紗覆首盡韜其髮兩脚繫腦後故唐装悉垂脚其改為硬脚史不載所始故莫知其的自何時也孫角談苑載栁玭在東川有従子來省玭不甚顧視其家人為之叙説房派行第亦不領畧僕𨽻輩相與獻疑曰得無責敬於君之幞頭也乎姑垂脚入見以占其意可也此郎乃垂下翹翹之尾果獲撫接則知當栁玭時幞頭不皆垂脚其屈而下垂者乃其用以為敬也國初有王易者著燕北錄載契丹受諸國聘覲皆繪畫其人物冠服惟新羅使人公服幞頭畧同唐装其正使著窄袖短公服横烏正與唐制同其上節亦服紫同正使惟幞頭則垂脚疑唐制以此為等差故流傳新羅者如此也又秦再思洛中紀異云唐太宗令馬周雅飾幞頭至昭宗乾符初教坊内教頭張口笑者以銀撚幞頭脚上簮花釵與内人裹之上恱乃曰與朕依此樣進一枚來上親櫛之復覽鏡大恱由是京師貴近效之龐元英著文昌録乃以為宣宗未知孰是沈存中筆談謂唐惟人主得服硬脚晩季方鎮擅命始有僣服者宣和重修鹵簿圖言唐制皆垂脚其後帝服則脚上曲五代漢後漸變平直其説與上所載畧同而皆不記所出豈皆以意揣度乎換鵞是黄庭經王羲之本傳以書換鵞者道徳經也文士用作黄庭人皆謂誤張彦逺法書要録載褚遂良右軍書目正書第二卷有黄庭經注云六十行與山隂道士其時真蹟固在既可以見其為黄庭無疑又武平一徐氏法書記親在禁中見武后曝太宗時法書六十餘函所記憶者扇書樂毅告誓黄庭又徐浩古跡記𤣥宗時大王正書三卷以黄庭為第一不聞道徳經則傳之所載却誤骨朶宋景文公筆録謂俗以撾為骨朶者於古無稽據國朝既名衛士執撾扈従者為骨朶子班遂不可攷予按字書䈑撾皆音竹𤓰通作簻簻又音徒果反簻之變為骨朶正如而已為爾之乎為諸之類也然則謂撾為骨朶雖不雅馴其來久也爵公國史許瓊傳開寳五年澶宻等州各奏民年八十以上呂繼美等二十九人並賜爵公士翰林學士汪藻先世有號爵公者汪謂五代間得此爵恐或便在此開寶間也如律令李濟翁資暇録言今人符咒後言急急如律令者令音零律令雷鬼之最捷者謂當如律令鬼之捷也按風俗通論漢法九章因言曰夫吏者治也當先自正然後正人故文書下如律令言當承憲履繩動不失律令也今道流符咒家凡行移悉倣官府制度則其符咒之云如律令者是倣官文書為之不必鑿言雷鬼也桃笙栁子厚詩云盛時一失貴反賤桃笙蒲葵安可常案揚雄方言簟宋魏之間謂之笙梁簡文帝荅南平嗣王餉舞簟書曰五離九析出桃枝之碧筍郭璞桃枝賛曰叢薄幽薈従風蔚猗簟以寧寢杖以持危杜子美亦有桃竹杖詩桃笙蓋以桃竹為簟也漢爵級所直惠帝元年民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡為六萬按惠帝初立賜爵級有差中郎不滿一嵗一級外郎不滿二嵗賜錢萬謂作外郎未滿二嵗者其賞不及一級裁賜萬錢耳今乃以三十級為六萬其誤無疑顔師古亦不辨白駒非日景魏豹傳人生一世間如白駒過隙顔師古釋白駒日景也劉孝標荅劉紹書曰隙駟不留李善注墨子曰人之生乎地上無幾何也譬猶駟之過隙二世謂趙髙曰人生居世間譬如騁六驥過決隙也則豹所引者不以白駒為日景冠帔曽子固王回母金華縣君曽氏誌夫人以夫恩封縣君以兄曽公亮恩賜冠帔也是得封者未遽得冠帔中間朱康侯母以太母恩得初封託子問冠帔制度遍詢禮寺皆無之壬辰年在建康與客談及此秦塤侍郎適在予問其家數有特賜者必知其制秦言其姊出適時徳壽使人押賜冠帔亦止是珠子鬆花特髻無有所謂冠也秦丞相夫人塑像建康墳庵乃頂金鳳于髻上又不知何據俗語以毛為無後漢馮衍傳説鮑永曰更始諸将虜掠飢者毛食寒者裸跣注毛草也太子賢案衍傳毛作無今俗語猶然或古亦通用乎耗矣哀哉注以耗為毛毛無也唐黄繙綽諧語以賜緋毛魚袋借毛為無則知閩人之語亦有本唐婦人有特勅方許乘檐朝謁杜詩夫人常肩輿上殿稱萬壽按唐㑹要命婦朝謁並不得乘檐子其尊屬年髙特勅賜檐子者不在此例王珪母殆得特恩歟唐時三品得服玉帯韓退之詩不知官髙卑玉帶垂金魚若從國朝言之則極品有不得兼者然唐制不爾也唐制五品已上皆金帯至三品則兼金玉帯通鑑明皇開元初敕百官所服帶三品以上聴飾以玉是退之之客皆三品之上亦足詫矣本朝玉帶雖出特賜須得閤門闗子許服方敢用以朝謁則體益以重然唐裴晉公得特賜乃于闐玉也暨病亟具表返諸上方其自占辭曰内府之珍先朝所賜既不合将歸地下又不敢留在人間謹以上進不知故事當進如隨身魚符之類耶抑晉公自以意剏為此舉也本朝親王皆服玉帯元豐中剏造玉魚賜嘉岐二王易去金魚不用自此遂為親王故事又前世所未有者古者戮不必是殺左氏文十年楚子畋孟諸命夙駕載燧宋公為右盂違命文之無畏抶其僕以徇或謂子舟曰國君不可戮也此以抶為戮又襄六年宋子蕩以弓梏華弱于朝平公見之曰司武而梏於朝難以勝矣遂逐之子罕曰專戮於朝罪甚大焉亦逐子蕩此以梏為戮則甘誓謂不用命戮于社予則孥戮汝未必殺之或者降削其家廪給之類其斯以為孥戮焉耳茍惟不然罰弗及嗣虞舜之世則未逺也啓以肖禹得傳政焉豈其罪人遽肯以族耶演繁露卷十二
