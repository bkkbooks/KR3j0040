body:
  text: 演繁露續集卷二宋程大昌撰制度知州唐世州郡分上中下三等其結銜分節度觀察防禦團練名稱雖有髙下實皆守臣也於是其銜為某州節度若觀察或防團者茍非遥領即是真任此州太守非虚稱矣太祖之平李筠也㑹李繼勲上黨來朝即命繼勲就守其郡繼勲官品適與上黨郡品兩相當匹遂以繼勲為昭義節度既曰節度昭義即是昭義太守焉耳非如遥領節鎮但虚假名稱而已也及平揚州以宣徽使李處耘權知揚州宣徽者處耘之官也權知揚州者實為揚州太守也為其職元為宣徽故不改本鎮節鉞而實行州事故其結銜曰權知揚州也此時雖一時權制而太祖之規橅實已素定矣乾德元年有事荆湖方㑹兵襄陽即以邊光範權知襄州其銜亦為權知也此時髙繼冲尚據荆南朝命已甞使之權判荆南矣及其納土不欲遽易他人即就命繼冲為荆南節度而用王仁贍為巡檢以參總其兵則仁贍實預州事而繼冲之節度荆南者但以繫銜而已至其年六月竟用仁贍權知荆南則太祖初橅可考矣後既盡得荆湖北乃遂分命呂餘慶鎮潭州李昉鎮衡州薛居正鎮鼎州州之舊名犯廟諱其結銜皆曰權知而凡他臣得郡者皆放此為制行之積久大藩鎮多授文臣乃始盡正其銜明曰知某府某州軍州事也慶厯八年塞澶州決河命步軍副都指揮使郭承祐權知澶州又以户部判官燕度同知澶州兼修河事非一州而兩太守也同知之名即通判也皇祐五年詔知州軍武臣並須與僚屬謀議公事毋得專決監司常檢舉之案皇祐此制而參以太祖詔㫖即武臣之為知州軍者實為其人常有功績無以處之故令領郡以郡禄優酬之耳即栁子厚之論封建謂聖人之不得已者也然則太祖用武臣為守而使文臣與為通判其意正與置文尉而換鎮將同為一見矣宗子取解取應額紹興十五年十一月臣寮劄子昨來國子監申請行在宗室並赴監試如外任及宮廟並赴漕試其監試有官鎖應七人取三人無官應舉七人取四人無官袒免親取應文理通者為合格不限人數惟赴運司試所取之數與進士一同非所以㢡進宗子乞除行在宗子依見法外諸路宗子不以有官無官如願試行在應舉鎖應並依熙寧舊制許赴監試請解赴省如不願前來依見行崇寧貢舉法行案此所言是崇寧運司取人數必少於熙寧蓋崇寧非不欲優之為親遠屬疎比熙寧不同大勅改京官甞聞人説今前宰執一年許舉五員改官者初立法時一年止發一削有此一削便徑改京官丁未九月二十五日讀青箱雜記云解賔王為登州黄縣令陳執中用大力舉改京官大力者豈非一狀遂可改官者耶又景祐三年制舊制轉運使副及提㸃刑獄舊當三人者止當一人舊已授差遣不待闕祥符八年詔審官院以近地二年半以上逺地二年以上權與差替不為永例上以京朝官俟闕既久奉朝者頗多故有是詔案此則其時京朝官有在京奉朝須有闕出乃授授已即赴不甞逆用未該替闕也自太祖太宗時數下詔戒已授而路程外闕月不赴者又有川峽在任人未及三年優恩許替者㑹要咸平三年二月向敏中言選人有在任一年已注替人致不成三考今後須見任官二周年半即得注替如未有闕曉示各令待闕每季一集更不使隔季員闕川廣漳泉等處見任並許成資日注即見不差待闕人也天聖元年晏殊言大中祥符三年東封赦放選時三千人銓司注擬不足始擘畫隔年豫使季闕後遂為例今待闕人不多欲今後且用見闕景祐三年審官院言見在院待闕官凡九十二人欲並以到任一年半使闕候見任官滿三十月許赴此則注官後待闕之始也徽州苗絹自楊炎立兩税法農田一年嵗輸官兩色夏蠶熟則輸紬綿絹絲亦有輸麥者秋稻熟則專輸米皆及時而取所有也唐行兩税不久只三四年遂令當輸者皆折價輸錢陸贄奏議具在可見也徽州唐歙州也有水可通浙江而港洪狹小閲兩旬無雨則舟膠不行以此人之於秋苗額中量州用米數許於本色外餘盡計米價凖絹價令輸以代納苗以便起發也而苗絹無定額吏得出入為姦乾道丁亥趙德莊為江東漕問所委予曰徽吾桑梓也税額之重居田收十之六也自五代楊行宻時已如此今難減矣而惟有司年年於法外多科此即可以檢轄令毋羨取也趙曰予畧知其似矣徽之苗米本州全得用不起一粒已自優如他州矣而不知起發苗絹即是計米輸絹也觀德莊此言已是為吏輩先言所入矣予但悵然因與之詳道曲折始歎程琳之為達識也琳為三司時有建議者患二税色目多欲并為一以便稽檢琳獨不可曰今并其入而没其名他日姦人拈取舊目曰昔甞取而今漏檢者遂成添税一重也此即徽之苗米藏於秋苗絹之類也程公達識也哉黜責帥臣亦降召命凡今為帥者不問文武雖以罪罷亦降召命未知始於何時或言此制為武臣握兵者設而槩以用諸文臣使不為兩體耳乾興元年曹偉任真定都部署責授容州觀察使知萊州丁謂疑其不受命詔河北運使韓億馳往收其兵既而曹得責命即日上道則是此時大帥徑加責徙遂不託名為召矣又建隆二年孫行友鎮定州欲據山寨以叛太祖命武懷節㑹鎮趙之兵偽稱巡邏直入定州出詔示之行友聴命削官爵禁錮之則又不以召罷也萬壽觀端拱造上清宫慶厯三年火止存壽星殿因葺為觀大中祥符元年造玉清昭應宫至天聖七年災止存長生及章獻本命殿因葺以為萬壽觀東宫記舉子稱習進士同進士出身始太平進士出身始祥符諸州助教始熙寧御試不黜落始嘉祐四年舉子前此許挾書至祥符止許帶禮部韻景祐五年舉人見有落解經生唐突自此遂只許解元見聞喜宴錢熙寧始賜蘇紳父仲昌生紳十九年解入京始父子相識景德二年契丹犯河北特推舉人恩令甲令丙後漢肅紀詔令丙箠長短有數注前書令有先後有令甲令乙令丙郊後謝太乙宫天聖五年劉筠言南郊朝饗玉清昭應宮景靈宮又宿齋于太廟一日之内陟降為勞請罷朝饗玉清昭應宫竢郊祠畢行恭謝之禮從之實録初禁礬天聖六年用齊宗矩言巡捉私礬如私茶鹽法實録諫官不兼他職天禧元年始詔置諫官六員不兼他職首以魯道宗為之實録天聖七年諫官始得面論事是時諫官章須由閣門進又罕得對者魯道宗請得面論事而上奏通進司遂為故事同上郎中致仕與一子官郎中已上致仕與一子官天聖四年帶館職出外以館閣校勘王琪簽書南京留守判官公事故事館閣校勘無出外者以留守晏洙所辟特許之天聖四年枌榆漢髙祖少時常祭枌榆之社及移新豐亦立焉長安記臨潼縣張公喫酒李公醉則天時䜟謡曰張公喫酒李公醉張公易之兄弟也李公言李氏不盛也參知政事知外郡乾德中蜀平吕餘慶以參知政事知成都參知政事出權藩府自此始監司漢置刺史察州成帝綏和元年更刺史為州牧光武復為刺史隋初雍州置牧餘州益置刺史開皇三年罷郡以州統縣自是刺史名存而實廢唐武德罷郡置州改太守為刺史神龍分天下為十道道置巡察使二人景雲改置按察使開元二十二年改置採訪處置使女樂𨽻太常隋大業六年以所召周齊梁陳散樂悉配太常皆置博士弟子以相傳授納錢度僧道安禄山反楊國忠遣侍御史崔衆至太原納錢度僧尼道士旬日得百萬緡而已江南丁口錢呉有丁口錢又計畝輸錢徐知誥秉呉政宋齊丘説徐知誥請減丁口錢從之由是江淮曠土盡闢桑柘滿野國以富強收茶征聴民自賣茶馬殷據湖南判官髙郁請聴民自採茶賣於北客收其征以贍軍殷從之紀事三十八驛劵出樞宻舊制館劵出於户部唐明宗天成二年卞圜以宰相判三司安重誨為樞宻使請館劵從内出圜與爭於上前宫人問上知為宰相曰妾在長安中未甞見宰相樞宻奏事敢如此者蓋輕大家耳上不恱卒從重誨言圜罷按國初每給驛劵皆樞宻院出頭子令三館中有藏太祖御書帝翰有親與決者即其來已久矣内中漢紀元封二年甘泉宮内中産芝注内中謂後庭之室也新亭丹陽記新亭呉舊立先基崩淪隆安中丹陽尹司馬恢之徙創今地案此所言乃王導正色處則凡晉宋間新亭已非呉時新亭矣三司使置使自後唐張延朗始本傳方鳩􅟅功説文人部釋􅟅曰具也從人孨聲讀若汝南水虞書曰旁救􅟅功土戀反與今書文不同而孔安國以鳩為聚則本文誠為鳩不為救矣不知許孔孰為真也馬步殿三司五代康義成傳贊侍衛親軍馬步都指揮使云云親軍之號始於明宗其後又有殿前都指揮使之名皆不見其更置之始今天下之兵皆分屬此兩司矣豈歐公時未有三司耶父子同省人以為非五代豆盧革傳革與韋悦俱為莊宗相二人各以其子為拾遺父子同省人以為非遽改他官避親舊唐職官志吏部下凡同司聮事勾檢之官皆不得注大功以上親按此即知有職掌相涖者應避直學士唐初定制以五品以上官為集賢學士六品以下為直學士今六閣學士直學士髙下必視此為别元祐入仕數今特奏名進士諸科約八九百人一郊子弟奏補得二三百人同上丞郎唐稱丞郎謂尚書左右丞及尚書侍郎輩也今人多承丞郎之語文字簡便以寺監丞郎當之承襲之誤也唐劉寛夫傳八十五寶厯中寛夫為監察御史言以王府官攝祠位輕乞以尚書省左右丞侍郎通攝又潘孟陽傳為侍郎年未四十其母謂曰以爾之才而位丞郎使吾憂之馮道曰宰相之權吾初入能用人為丞郎官耳寄禄官階官政和三年勅特進至承務郎為寄禄官承直郎至迪功郎為階官按元豐未改官制以前如朝奉將仕承務之類别名階官皆須在職遇郊始得加之自元豐制行既不以京朝官如正字三丞列曹郎官之類為寄禄官遂取唐世承務朝議之類増廣比序以為磨勘遷進之則因以寓禄而神廟時未改州縣掾官簿尉之類其元豐三年改定新制詔曰今推本制作參酌損益使臺省寺監之官實典職事領空名者一切罷去而易之以階此時未分寄禄與階官也至政和六年以神宗官制有未暇盡改者如選人有帶知安州雲夢縣事而實任河東轉運司管榦公事者淆亂莫甚今選定選人七等之制如易留守節察判官為承直之類凢七階立制既定以特進至承務既名寄禄始以新定選人七級名為階官以别於舊寄禄官稱今人槩謂非職掌者為階官不詳考也京朝官實封劄子三朝聖政録太宗許京朝官實封劄子於閣門上進元絳知潁州使服學士金帶如舊臨安志元時從翰林侍讀參知政事出據此即因不得服參政帶矣而學士帶亦不該服其服學士帶特恩也舉官連坐自謝濤始濤真宗時為巡撫益利兩路使囘舉所部官三十餘人宰相以為多乃陳諸吏治狀而願連坐奉使舉吏連坐自濤始摛文堂強淵明宣政間為翰林學士承㫖上為増廣直廬書摛文堂牓以寵之臨安志云出本傳呉越改元寶正六年嵗在辛卯見封落星石制書辛卯乃後唐明宗長興二年寶太元年羅隠記修新城縣記云癸未嵗癸未乃後唐莊宗同光元年臨安記以此知呉越雖云稟中原正朔既後唐長興同光年號與其寶正寶太同嵗而名不同知呉越自甞改元審矣裴延齡科草陸贄奏度支以税草支用不免令京兆折今年和市草一千萬束每束草兼車脚與折錢二十五文公私兼濟贄奏每年税草不過三百萬束令入城輸納只二百三十萬而已今既加征約計百里搬運已當三十五文買草本價又更半之而度支徑以每束限為二十五文十卷預買太宗時馬元方為三司判官建言方春民乏絶時預給庫錢貸之至夏秋令輸絹於官預買紬絹始於此東觀餘論周田畝數通典古雍州卷曰周制步百為畝畝百給一夫即一頃商鞅佐秦以一夫力餘地利不盡於是改制二百四十步為畝百畝給一夫羨道墓誌南史二十三裴子野傳子野葬湘東王為之墓誌銘陳于藏内邵陵王又立墓誌于羨道羨道列誌自此始台鈞衙節使未有平章事即不合稱台階台造鈞慈鈞造不兼郡牧亦不合著某官衙上事後早晩兩衙右出李肖隠所撰使範聖節進馬人主誕節宰臣舊例進衣一副元和七年李吉甫固恩澤别進馬二匹賜通天犀帶以答之唐㑹要節日門誕日設齋用樂開成五年以六月十一日為慶陽節天下州府常設降誕齋行香京城内宰臣與百官就大寺設僧一千人齋仍許量借教坊樂官充行香入兩閣門吉凶異制天祐二年四月勅自今年五月一日後常朝出入取東上閣門或遇奉慰即開西上閣門永為定制差考試道卒有恩澤衢州西安令宋宏以使牒考試它州在道遭水禍以死其子拯以父死職事推恩補太廟齋郎蘇子容集簽樞石熙載平梅山蠻入為尚書兵部外郎充樞宻直學士嵗中以本官兼職同簽書樞宻院事簽書院事自公始也蘇子容集臨奠已罷執政熙載為樞宻使乞觧政除右僕射太平興國九年薨太宗即往臨其喪近世執政既罷而卒車駕臨視自公始同上改劭字文帝生元凶劭初命之曰劭在文為召刀惡之改刀為力納陛尊者不欲露而升陛鑿殿基際為陛納之霤下不使露也王莽傳四川總領財賦結總領在四川上建炎間軍遽須財典計之臣不暇盡如常制遂倣河北陜西路法置都轉運使通領數路以侍從為之其結銜不為都運者則直以從官總領某路某路財賦後至紹興三四年間始以郎官總領江西或江東財賦則今總領之始矣紹興十五年十月二十八日汪勃言四川既已休兵可罷都轉運使歸其職於宣司宣司既典兵又總財賦則為非是乞即宣司置四川總領一司應辨宣司錢糧㫖用其言其年十一月十八日除趙不棄為之初降指揮以四川宣撫司總領財賦為銜至其命詞給告則結銜曰總領四川財賦是初時使為宣司屬官已而返來總領宣司財賦也是時鄭剛中為宣撫使既見不棄全銜結總領於宣司之上迺始驚疑而知其有異矣此蓋秦丞相微機或者云不棄有請而秦從之用日厯撮考當講官口義今講日講官以所撰講義進講即講筵内侍收掌紹興十三年正月王普奏其父在建炎元年為講官講孝弟仁之本合上意退批早來講義即今進入普仍言故事次日方進今此即日促進非常儀也不兼經筵遇講讀即赴熙寧二年召中丞呂公著赴經筵公著以臺臣侍講不兼經筵職遇講讀即赴如此即侍講之與經筵異耶是年十月翰林學士范鎮兼侍讀鎮前為侍讀學士及還翰林即落侍讀至是雖復侍讀而不兼學士長編據日記所載如此詳此當是以翰林侍讀學士或天章閣侍讀學士等為經筵而以單帶侍讀講為講讀所耶知州不該舉京官職官即令通判舉熙寧三年詔諸路知州軍不該舉京官職官處令通判舉長編存疑云不知州軍何故不該舉予集元立舉官格須舉主是某官已上恐是知州軍官未及品耶演繁露續集卷二
