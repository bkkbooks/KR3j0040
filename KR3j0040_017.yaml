body:
  text: 演繁露續集卷一宋程大昌撰制度以兵代民役建隆二年以前代傳置悉用民夫至是詔募軍卒代之至三年正月詔不得以逆旅僑民充遞夫飢民強盜人穀米舊法嵗飢強發倉窖皆死太祖真宗多因奏讞特許貸配元不明立為法天聖三年詔陜西州軍持仗劫人倉廩非傷主者減死刺配非首謀者又減一等仍令長吏密以詔書從事自是諸路災傷即降不下司敕而飢民盜取榖食多蒙活宥按此即是矜其迫飢為之故特貸其死然不明立之法亦不明降詔命者恐人恃此以犯也寶元二年西川飢饉詔劫廩榖非傷殺人者並刺配牢城為首者配出川界皇祐三年信州民有劫米傷主者當死上以其迫飢故貸死至和六年楊安國讀周禮大荒大札則薄征緩刑楊安國曰所謂緩乃過誤之民耳今衆持兵仗劫糧廩一切寬之恐不足以禁姦帝曰不然飢饉不能恤至為盜而又殺之不亦甚乎治平四年九月詔災傷州縣持仗強盜不以財物斛斗但同火三人以上傷人及計贓罪死者捕獲已嘗為盜至徒經斷不以赦前後今犯至死者依元條不用災傷減等則是覺恕貸之不足以戢盜而改出此令足為至當也三司借用內藏錢景祐元年閏六月謝絳言內藏嵗受鑄錢百餘萬緡而嵗給左藏庫及三年一郊度嵗及九十萬緡所餘無幾請以天下所鑄錢盡入三司十年責以移用與夫滯積大盈利害逺矣祖宗時三司常借內庫錢觀此即知當時新鑄錢亦入內庫却從而給與之耳今鑄錢數雖少於舊要之悉入外藏則難如祖宗時常借矣景祐四年內藏庫言嵗收緡錢三十萬助三司天禧三年詔書切責三司毋得復借自明道二年距今才四年所借錢帛凡九百十七萬二千詔戒飭之治平元年詔三司用內藏庫錢三十萬貫修奉仁宗山陵依乾興例蠲其半餘聽漸還改官用職司景祐三年詳定內外官所舉州縣幕職官各有合舉員數其轉運使副提刑不限人數舊當三人者止當一人仍須有本部監司長吏及通判薦舉者始聽磨勘按此時監司長吏通判皆得為職司今則不可兼轉運使及副提刑一狀當三狀今皆不然也張亢仁宗時契丹聚兵幽涿間張亢丁母憂起為北京使知安肅軍亢曰萬一契丹背約臣請擐甲為諸軍先既而元昊叛慶厯元年亢為鄜延路都鈐轄知鄜州與部署許懷德不相能上令戒諭若固為此以求內徙當悉奪官安置緣邊既而亢上邊事乞赴闕面陳如臣言狂率不可用乞重降黜不報本傳言令驛奏據本傳亢乃出力多非避事講讀官坐立皇祐三年詔邇英閣講讀官當講讀者立侍敷對餘皆賜坐侍於閣中天聖以前皆坐侍自皇祐以前皆立侍至是帝屢面諭以經文義旨須詳悉詢説卿等無乃煩倦否遂有是詔以為永制熙寧元年侍講呂公著王安石言故事侍講者皆賜坐自乾興後講者始立而侍者皆坐聽臣等竊謂侍者可使立而講者當賜坐詔付禮官後韓維刁約胡宗愈等言賜坐蓋出優禮祖宗或賜講臣坐者以其敷暢經義也太宗開寶中李穆薦王昭素召對便殿賜坐講易乾卦太宗端拱中幸國子監令有司張帟幕設别坐令李覺講易之泰卦今列侍之臣得坐執經而講者顧使獨立於前臣以為宜如天禧舊制判太常寺龔鼎臣等言執經人主之前本欲便於指陳則立講為宜若謂傳道近師則今講解皆先儒章句非有為師之實安可專席安坐以自取重也初孫奭坐講仁宗尚幼跂案以聽之奭因遂立講論者不以為是上問曽公亮公亮但稱臣侍仁宗書筵亦立後安石因講賜留上面諭卿當講日可坐安石不敢坐遂已殿前三司軍職周恭帝時李重進出鎮揚州領宿衛如故太祖受禪命韓令坤代為馬步軍都指揮使正是奪其所帶軍職耳建隆二年七月凡諸將職典禁衛者例罷悉除節度使獨石守信兼侍衛都指揮使如故實亦帶以為職元不典兵也至三年守信亦表解軍職許之則守信竟不自安也殿試不落人長編曰嘉祐二年賜進士章衡等及第出身共三百八十八人是嵗進士與殿試者始皆不落李復圭紀聞云是春以進士羣辱歐陽修之故殿試不落一人案實録試進士李實等四百人而得第者三百八十八人謂之不落一人固舉大約言之耳特不知禮部奏名實為幾人故其留黜之數不容參考案皇祐元年廷試取四百九十八人五年取五百二十人至嘉祐四年所取又止一百六十五人六年一百八十三人閲兩舉才共取三百四十八人耳雖緣其時初制間年一開科舉故約此意指似是禮部奏名先減其額故廷試雖不落人其得第者少是亦朝三暮四之比也又緣其時立制減去諸州解額之半禮部以半額紐數而取故奏名已少及至廷試不用汰黜也階級法階級法本文曰一階一級全歸伏事之儀世傳太祖聖語故著諸令今長編則遂於真宗時登載案司馬光嘉祐七年上疏論禮法曰太祖申明軍法自押官以上各有階級小有違犯罪皆殊死然則其制不起真宗時恐長編不審也鄉兵保捷義勇等咸平四年取陜西稅户為義軍家出一丁號曰保毅軍四年吳蒨點得六萬八千七百餘人官給糧戍邊則此義軍行諸陜西未及它路也其年五月集近京諸州丁壯選𨽻軍籍則已用陜西法行之它路矣其年名河北鄉兵為忠烈宣勇未見名始何時并代司兵名為廣鋭祥符六年以雄霸所調為忠順指揮名始此年慶厯元年槩於近邊募土人為之名護塞二年二月簡河北強壯徑勇者刺手背為義勇指揮嘉祐四年大名府路安撫李昭亮言河北州軍見闕義勇乞令二年內補足其強壯緣不係教閲欲候義勇足日亦令補復即是強壯别是一法却於強壯中選補義勇也三月簡河東弓手不刺面為義勇陜西弓手為保捷治平元年宰臣韓琦乞於陜西路選鄉兵富户三丁揀取一丁仍刺手背以義勇為名差徐億等往凡刺十三萬八千四百餘人而河北義勇之制始達于陜西司馬光陳請今但怪陜西無義勇不知三丁巳有一丁充保捷即慶厯二年所創是也是其實也然會要記保捷始慶厯二年而天聖五年已有臣僚言秦州十年不曽揀選保捷嘗令秦州分析則前乎慶厯已有保捷矣熙寧八年夔州路提刑言乞差黔州義勇往瀘州界防守不聞黔州自置義勇今之所指黔州義勇當是自陜西抽戍耶其年兵部言隴成州義勇應援熙河不足乞差保丁充數則義勇外又差保丁潁昌府順昌軍神宗初為忠武軍節度淮陽郡王後封潁王案忠武軍即許州也故元豐三年升許州為潁昌府者以嘗領節忠武也後封真王而國於潁則潁州也故元豐二年升潁州為順昌軍者為王封之舊也軍後升府即順昌府也張舜民言熙寧初升潁州為順昌軍久知其誤遂升許州為潁昌府長編辨其誤蓋升潁州為順昌府在元豐二年不在熙寧而神宗之為郡王乃淮陽郡亦非潁州也舜民兩説皆誤也密院進入文字押字豫在館中見祕閣所藏有太祖時宰執進入文字上有御筆自加處而趙韓王輩奉行以出則皆押字不書名不書臣常疑之後因閲實録見元豐五年五月詔三省樞密院自今後應入進文字用押字者並依三省例書臣名乃知至神宗時猶存押字例也外人得分同居物産元豐六年提舉河北保甲司言乞義子孫舍居壻隨母子孫接腳夫等見為保甲者候分居日比有分親屬給半詔著為令按今令文外人曽與本家同居久者許給分數恐立法因此然深詳此法是特欲優立科條使外人肯以它姓代充保甲焉耳配流法太宗已前因犯合配人不以遠近並押赴闕下恐是欲揀其強悍者為兵也後數有言其在道費傳送或逃亡者乃始立地里數配𨽻神宗以流人遠去鄉邑又有弊如上所言遂效古犯罪應流法加決刺隨所在配諸軍重役元豐八年八月中丞黃履有言於是降旨令配行又王巖叟深言其害本鄉及報讐事差除行詞舊制凡有除授格當命詞者無今時初除信劄皆即曰命詞詞出便給告故唐制五禁稽緩居其一王震序曽鞏集述其詞命敏疾曰元豐官制初行日多除授詞頭至子固即為之詞授院吏上馬去又熙寧間司馬光除樞副光適入對神宗面諭之曰告已在閣門矣用此觀之則凡有除授即命詞詞下即給告不淹日也至元祐二年五月戊辰殿中侍御史孫升罷知濟州諫議梁燾知潞州其月壬子朔則戊辰者十七日也其日右丞劉摯上疏論升燾行遣太重其文曰十五日呂公著送示內降批旨為升燾罷臺諫乞留此二人今雖已有成命命猶未下比至進告尚須一兩日據摯此言即十五日降命其進告當在十九二十日間則是時已自隔數日不給告矣不知不候授告先降劄子供職起自何時或説在南渡後呂公著論臺諫元祐二年監察御史張舜民言夏國封册使劉奉世是文彥博欲有所潤故以起居舍人使藩臣詔罷御史已而臺諫王巖叟傅堯俞等救之屢章不已右僕射吕公著奏乞稍與優遷令解言職巖叟等皆它除出臺别用賈易為司諫易因論蘇軾曰文彥博實主之太皇欲峻責易曰不責易此亦難作音做公著力爭曰不先逐臣易命亦不可行乃止罷諫職既退公著謂同列曰主上方富春秋異時將有進導諛之説以惑主上者當爾之時正賴左右力諍不可豫使人主輕厭言事也吕大防王存皆曰仁者之勇也按此章公著先乞移臺諫既嘗行之則禁中以為當然故不一日便徑欲峻責賈易公著覺之故因易事力諍以冀他時不爾其實公著失之於前也至三年二月正言劉安世論不當罷言事官曰陽餌以美遷陰奪其言責若出於大臣之私意臣謂姦人用事之始任臺諫以折其謀及禍胎既成聖賢不能救其害安世乃因宣仁問司馬光門下最厚人吕公著以安世對遂自正字遷正言此之所指可見前輩不為比周三年六月內批王覿論列不當罷諫議大夫與外任不與職名以覿論胡宗愈除右丞不當也翌日甲子吕公著論疏未行內批後又與文彥博吕大防范純仁等繼論曽肇封還詞頭純仁不敢簽書趙挺之楊康國皆乞留覿竟不許僅加直龍圖閣知潤州此又起於輕易臺諫云兩制蘇易簡續翰林志晉天福中從宰臣馮道奏詔翰林學士院公事宜並歸中書舍人自是舍人晝直者當中書夜直者當內制至開運元年六月詔曰翰林學士與中書舍人分為兩制偶自近年權停內字況司詔命必在深嚴宜復置學士院桑維翰所建也凡今合言兩制者皆始此也此時未有權侍郎故外制為從官之初也濮王太宗子魯王元份之第四子是為濮王祖宗之法天子之子封王元份已封魯王矣而濮王乃元份之子太宗之孫也至仁宗慶厯四年封汝南郡王嘉祐四年薨追封濮王諡安懿本傳英宗治平三年以王塋為園即園立廟俾王子孫主奉祠事尋以王之子宗慤為濮國公奉祀後至元豐七年方有嗣王其年詔曰朕以上承仁宗宗廟之重義不得兼奉私親故但即園立廟俾王子孫世襲濮國自主祭祀讀疑明道二年集賢平章事張士遜加門下侍郎昭文館大學士監修國史不知併加二館職何也試銜明道二年懷安軍判官熊文雅乞以三任告回乞母封詔與之仍授家便試銜知縣如此試銜亦任事受俸耶不然何為令就家便優養也莊獻不入景靈宫明道二年奉安莊獻明肅神御於慈孝寺彰德殿莊太后於景靈宫廣孝殿然則莊獻不入景靈耶政和官制題云政和官制因其舊名耳中載元豐新制與國朝舊制參列釐革簡淨易見至大觀二年以元豐改制有未盡者如寄祿官不分左右則敘爵制祿等級希少人易以及遂自朝議大夫至金紫光祿大夫增創新名於是以光祿大夫代舊右銀青光祿大夫以宣奉大夫代左光祿大夫正奉大夫代右光祿大夫通奉大夫代右正議大夫中奉大夫代左中散大夫奉直大夫代右朝議大夫而又别立武選郎大夫新名悉換舊某宫某使侍禁三班之類政和三年又立選人七階換舊州縣節察推判之類與婦爵封夫人以下革去郡縣君之號五年又創置貼職五年道職視文臣品秩有詔髙麗境望海外行程記者南唐章僚記其使髙麗所經所見也中引保大初徐弼使事為證即當是後主末年也僚之使也會女真獻馬於麗其人僅百餘輩在市商物價不相中輒引弓擬人人莫敢向則其強悍有素麗不能誰何矣麗主王建嘗資其馬萬匹以平百濟則諸家謂女真攻遼初時力弱無器械者誤也豫見舊史自平遼問陸趨髙麗者多直東行意麗並海與平遼等處對東而出而明人登航商販于麗者乃皆微北並東而往耳今觀僚所書水程乃自海萊二州須得西南風乃行則麗地之與中國對者已在山東之東矣而麗之屬郡有康州者又在麗南五千里乃與明州相對康之鄰郡曰武州自産橘柚又明言其氣候正似餘姚則麗之與明其斜相對值蓋相為東西而微並西北矣謝花在殿上殿下閣門舊儀大宴更衣降坐羣臣退及再坐羣臣先升殿既御坐羣臣謝花拜于坐次天禧中司諫祖士衡上言乞御再坐謝花于庭乃引上文昌録四龎元英忌日惟宰執不入敕大忌日六曹諸司並不作假執政官早出官司不得隨出前次凡有駕幸百官皆早出也文昌録四到官呈告勑今人初之官齎告敕呈長官乃得視事其來尚矣漢王尊傳曰尊為東平王相視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔謁者則是古已有呈敕例矣宰執宫觀降再任指揮紹興七年正月二十一日詔前宰執宫觀難以理數任滿未有除授即合依舊宫祠自此宰執嘗得奉祠者始不計年而長食祠祿也前乎此者如范宗尹富直柔葉夢得之在三年韓肖胄徐俯之在六年皆再降命乃得再任是時雖嘗位宰執亦以二年為任滿二嵗即再降差命乃可得祿也至十二年四月依朱勝非所乞宫祠滿日再任當是有司失引前詔耶至十七年四月前持服人程克俊乞奉祠詔令依舊以端明殿學士提舉洞霄宫即是因持服解官故須再乞而再降命非任滿則命也太祖右文五代間凡為節度使皆補親隨為鎮將鎮將者如兩京軍巡諸州馬步軍判官是也此等既是武人又皆有所憑恃得以肆為非法民間甚苦之太祖微時深知其弊建隆二年二月謂近臣曰今之武臣欲盡令讀書貴知為治之道近臣皆莫對史臣李沆表載此事罪當時之臣不能將順也其年十月詔吏部流內銓鎮將皆注擬選人又至三年每縣置尉一員盜賊鬬訟不得更委鎮將復如舊制並以委尉蓋趙普之謀也武人多不知書案牘法令書判行移悉仰胥吏民之受病既多而又果於營私如親隨悉為鎮將其類不止一事太祖於是州置通判明詔州事取決焉而武臣之為太守者不得專執聖見皆出乎此也演繁露續集卷一
