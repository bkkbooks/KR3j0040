body:
  text: 演繁露雜家類二雜考之屬提要臣等謹案演繁露十六卷續演繁露六卷宋程大昌撰紹興中春秋繁露初出其本不完大昌證以通典所引劍之在左諸條太平御覽所引禾實於野諸條辨其為僞因謂仲舒原書必句用一物以發己意乃自為一編擬之而名之以演繁露後樓鑰參校諸家復得繁露原本凡諸書所引者具在譏大昌所見不廣誤以仲舒書為小說家其論良是然大昌所演雖非仲舒本意而名物典故考證詳明實有資於小學所引諸書用李匡乂資暇集引通典例多注出某書某卷倘有訛舛易於尋檢亦可為援據之法其書正編不分類續編分制度文類詩事談助四門中如謂衛士扈駕清道等子當為鼎子一條嶽珂愧郯録引吳仁傑鹽石新論甲編謂魏典韋傳有等人之稱洪翰林云等人猶候人蓋軍制如此大昌所疑未為詳允然書中似此偶疏者不過一二條其他實多精確足為典據周密齊東野語云程文簡演繁露初成髙文虎嘗假觀之稱其博贍文虎子似孫時年尚少因竊窺之越日程索回原書似孫因出一帙曰繁露詰其間多文簡所未載而辨證尤詳今其書不傳諸家亦不著於録考似孫所著緯略其精博不能勝大昌或傳聞者過周密誤載之歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀演繁露原序大學致知必始格物聖人之教初學亦期其多識鳥獸草木之名也麟睢騶鵲荇蘋棠朴豈遽是道若未明八者之為何物八物之為何似而曰吾能得周南召南之所以言蓋望而知其為罔也是學也先秦則爾雅入漢則繁露其後轉而為釋名廣雅正謬刋誤皆小學也而論事談理者必稽焉如辨方正位之不容不仗土圭也五三而上制器備物人以為道故爾雅得與經比繁露以下既雜載後世之制則其書往往晦伏不揚此貴耳賤目之失也對道而言則有迹者為器本事而論則有質者為物何可限古今而論深淺也以仲舒之識精通天人性命而繁露之書事物名義悉所研極茍其未及仲舒顧可忽而不竟歟豫常有意於是而聞見不博且目力窮於應物未能極欲間因閲古有見不問經史稗說諧戲茍從疑得釋則遂隨所遇縑簡亟疏録以備忽忘雖不皆關涉治道而㑹心賢已棄之可惜因加凡最而并輯之題其帙曰演繁露以便尋繹非敢自列於董氏以其董出而董名之自識其意焉耳韓退之曰爾雅注蟲魚定非磊落人誠可恧矣然有退之之學則可無退之之學而遺迹談虛恐援據所及金根金銀或相貿易益可赧矣淳熙庚子正月新安程大昌寓吳興書董仲舒有春秋繁露十卷書名演繁露本此然繁露専主釋經而時時雜以已見穿鑿傅㑹可謂公羊之忠臣未可謂尼山之素臣也而其文亦骩靡不振或是贋書不可知是編義取校勘體雜訓詁頗傷煩碎然其辨名正物出史入經證據精核好古者所必資譬之董書亦猶玊巵無當不如土缶康瓠之適於用也𤣥晏有言豫恨不得請命於天延年纍百博極羣書豫每讀其語而悲之夫人之生有涯而知無涯以有涯窮無涯殆已博物若張平子而豐城劔氣必咨之雷令嵩山竹簡亦訪之束生然後神物為開亥豕無訛况學謝三餘書慚半豹者乎豫少有嗜古癖久而健忘每讀書至㑹心處有所欲語取筆書之而尋以懶棄去年紀蹉跎恐此事便廢徒欲窮搜古人已成書而讀之彼則溉種而我乃食其實亦巧拙勞佚之效也是書得自友人謝耳伯豫愛其錯綜義理不冗不浮在諸小說家最為可喜恨世不甚傳因刻置文逺堂中以貽同好至於是書撰述大㫖業詳程大昌自序余故可毋論也時萬厯丁巳端午簫曲山人鄧渼題
