body:
  text: 演繁露續集卷三宋程大昌撰文類韓文用古法韓愈原道曰不塞不流不止不行其語脈本自易出易曰不恥不仁不畏不義也項羽傳曰聞大王不聽不義注曰凡不義之事皆不聽順也古文相似洪範曰惟時厥庶民錫汝保極言民以其保極者報答人主建極之施也洛誥曰乃惟孺子頒朕不暇言成王不能察知人情則是以多事遺我也光武謂劉盆子曰待汝以不死陳後山曰報以永不諼皆一格也大體班固曰賈誼通達國體文帝䇿賢良曰明於國家大體説者不能明言其如何為體賈誼曰大臣特以簿書不報期會之間以為大至於移風易俗使天下回心而向道類非俗吏之所能為也俗吏所務在於刀筆筐篋而不知大體竊為陛下惜之夫簿書期會體之小者也移風易俗乃其大者故曰大體也又曰國體者體如人之有體焉四支與身皆體也又作屋作文皆有大指如曰辭尚體要是也月旦十五日韓退之弔武侍御文曰月旦十五日出其衣珥拜之夫不言朔望而變言月旦十五日其語脈有自也魏武帝遺令曰美人看銅雀臺上施八尺牀繐帳朝晡上酒脯月朝十五輒向帳作伎曹公此語即韓公之所祖也月朝者一月之朝即朔日也兩都賦正旦為三朝日之朝月之朝嵗之朝也以朔旦為月朝而於月望則變文為十五日其語出此乃新奇也南史孝義傳王文殊父沒於魏文殊立小屋月朝十五日未嘗不北望長悲不愆于素栁子厚梓人傳述其作室之橅曰不愆于素左氏哀元年楚子圍蔡里而栽夫屯晝夜九日如子西之素杜注曰本計為壘九日而成賽越王神文李商隱樊南集賽越王神文曰今來古往常教威著越城萬嵗千秋勿使魂歸真定此即模韓文羅池碑詞也其詞曰北方之人兮為侯是非千歲萬嵗兮侯母我違玉溪生自言其文體之所從來則巳曰時人目為韓文杜詩也主在與在袁盎論社稷臣曰主在與在主亡與亡如淳曰人主在時與共治在時之事人主雖亡其法度存當奉行如勃等坐視非劉而王是從生主之欲不與亡者也豫以為非也與讀如預方主之存也吾固預同其存主如喪亡吾亦與同其亡終不肯獨存其身也絳侯當劉氏不絶如帶之時顧惜軀命不能救正是獨存其身而不顧社稷之危亡故雖幸有功第可名為功臣而不得名為社稷臣也陸贄論救薑公輔也曰位列朝廷任當宰輔主辱與辱主安與安正是此理也故知如淳之説未通也唐世諸儒有學有守者吾得二人焉魏徴陸贄是也取其奏讀之其理悉與經合學能發古吾故敢云爾也先天易曰先天而天不違書曰自貽哲命又曰自作元命配享在下詩曰永言配命自求多福莊子曰神動而天隨皆一理也天下事孰有非天理之自然者乎而天安可先也曰惟其處心與天相似故意舉於我事應於彼比次而言之則倡之者人也應之者天也神動而天隨語最要也古語相襲宋子京贊尉遲敬德曰桑蔭不徙而大功立語甚新矣然葛洪抱朴子已嘗言之曰文王之接呂望桑蔭不移已知其可師矣抱朴子之言近也戰國策馮忌之言曰堯舉舜於草茅之中桑蔭移而受天下則其語有所自來矣項羽王沛公於南鄭沛公怒蕭何諫曰夫能屈於一人之下而信於千人之上者湯武是也太公六韜嘗曰文王尚疾岐小太公曰屈一人下伸萬人上聖人自行之然則何之語又本太公也翟公追恨爵羅及其復用題其門曰一貴一賤交情乃見一死一生乃知交情説苑已有此語矣禪家嘗譏學道而不知其方者曰長安在西東向笑桓談新論亦已言之曰里語云人聞長安樂出門西向而笑仁者必有勇舜舉臯陶不仁者遠矣此其賞中有仁也四罪而天下咸服誅不仁也是其罰中有仁也大賚于四海而萬姓悅服喜中有仁也文武一怒而安天下之民怒中有仁也故仁者之勇藏於無事之日而見乎不可不發之地仁主慈義主勇慈者所向皆在所愛勇者所向人不可禦他人非無勇也棖也欲焉得剛資本不仁為欲所蔽則其剛決不能遂也若夫剛毅木訥本不為仁其平時則質木而訥鈍遇事則剛果而猛毅惟其無欲故有不可牽制之象是為近仁也近者言其氣象似之也然亦不可信以為誠仁故特曰近之而已而又謂勇者不必有仁也若夫仁以為己任者則不然矣造次顛沛不肯與仁相舍則遇事而前必達其欲不可阻挫也如舜之所好者生也四凶或敗吾生則明以不仁誅之雖禹方任用不能救鯀也文武之怒未嘗妄興直待天下皆忿不復可以容忍乃始應之其怒一發必使害仁者去此其所以一怒而天下遂安不待再舉也碑碣後漢傳十三方者為碑圓者為碣不遷怒左氏范武召文子曰燮乎吾聞之喜怒以類者鮮矣易者實多宣十七年演繁露續集卷三
