body:
  text: 演繁露卷九宋程大昌撰厨傳宣帝元康二年詔曰吏或擅興徭役飾厨傳以稱譽過客按厨傳兩事也厨庖也以好飲食供過客則為飾厨也傳者驛也具車馬資行役則為飾傳也今人合厨傳為一槩謂豐饌為厨傳非也于定國無寃民古今稱于定國為廷尉天下無寃民此特舉其多者言之耳宣帝之臣如葢趙韓楊有譽有勞而皆傅致以法入之死地然四人之中楊惲專以口語怨望尤其可矜者史家特書惲獄實定國所定有深意也然則謂天下全無寃民吾恐楊惲懐恚於地下也澄心堂紙江南李後主造澄心堂紙前軰甚貴重之江南平後六十年其紙猶有存者歐公嘗得之以二軸贈梅聖俞梅詩舗叙其由而謝之曰江南李氏有國日百金不許市一枚當時國破何所有帑藏空竭生萎苔但有圖書及此紙棄置大屋牆角堆幅狹不堪作詔命聊備麤使供鸞臺用梅詩以想其制必是紙製大佳而幅度低狹不能與麻紙相及故曰幅狹不堪作詔命也然一紙已直百錢亦已珍矣十金薛宣曰十金法重不忍相暴章匡衡坐多取封邑四百頃監臨盜所守十金以上免為庶人按漢以黄金一斤為一金十金之重者言其臧直滿十金也白蓮花洛陽無白蓮花白樂天自吳中帶種歸乃始有之集五有白蓮泛舟詩曰白藕新花照水開紅窻小舫信風廻誰教一片江南興逐我殷勤萬里來又種白蓮詩曰吳中白藕洛中栽莫戀江南花懶開萬里携歸爾知否紅蕉朱槿不將來見長慶集卷五浮石衢州之下十里許深潭中有石兀立水面土人命為浮石白樂天集三卷有謝衢州張使君詩曰浮石潭邊停五馬則此水之有浮石其來乆矣先是土人嘗有謡䜟曰水打浮石圎龍遊出狀元口口相傳亦莫知其語之為何自也石之出水也本甚嶄巖不齊紹興甲子嵗兩浙大水漫滅垠岸浮石沒焉水退石仍出而嶄巖者皆去葢為猛浪沙石之所淙鑿乃此圜渾也又一年嵗在乙丑龍遊縣人劉端明章魁廷試嘌凡今世歌曲比歌鄭衛又為淫靡近又即舊聲而加泛灧者名曰嘌唱嘌之讀如瓢玉篇嘌字讀如飄引詩曰匪車嘌兮言嘌無節度也元不音瓢廣韻嘌讀如杓疾吹也亦不音瓢鞠揚子曰梡革為鞠亦各有法革皮也梡革為鞠即後世之皮毬斜作片瓣而縫合之故唐人借皮為喻而為詩以誚皮日休曰六片尖皮砌作毬火中燖了水中揉一包閒氣如長在惹踼招拳猝未休其謂砌皮包氣即今之氣毬也已古今物制固多不同以其類而求之於古即霍去病傳謂為穿城踏鞠者其幾於氣毬也已其文曰去病貴不省事在塞外卒乏糧或不能自振而去病尚穿城踏鞠也師古曰鞠以皮為之實之以毛踏蹙而戲也今世皮毬中不置毛而皆砌合皮革待其縫砌已周則遂吹氣滿之氣既充滿鞠遂圓實所謂火中燖了水中揉者欲其皮寛而能受氣也詳此意制當是古時實之以毛後加巧而實之以氣也吕后傳曰太后斷戚夫人手足使居鞠域中師古曰鞠域如踏鞠之域謂窟室也今築氣毬者以脚蹙使之飛揚上騰不復拘於窟域矣而軍中打毬之戲則以杖拂毬使之馳走而用快馬逐之尚存鞠域之法故疑古今因革如予所言也小步馬西域傳烏桓國出小步馬師古曰小細也言其能蹀足即今所謂百步千跡者也韓退之詩曰横飛玉盞家山曉細蹀金珂塞草春用此也按字醫有按摩法按者以手捏捺病處也摩者挼搓之也字當從手則其書當為按矣玉篇手部無按字廣韻有按字却從才别出案字從木注曰几屬也酴醿今世花之品目有荼䕷而廣韻無荼字玉篇云荼苦草也又苦菜也因引爾雅之言曰檟苦荼荼茶也篇韻皆無䕷字諸家字書皆有酴醿字注云酒也錢希白南部新書曰唐清明賜宰臣以下酴醿酒酴醿酒即重釀酒也葑菲詩曰采葑采菲無以下體玉篇葑蕪菁也菲菜名也按下體也者古者祭之用牲以上體為貴羊首牛首肩臑心肺皆上體之物也至於腎膓臂足之類皆不用以其在下而汙穢也蕪菁之葉可食而不如其根之美故采葑者不棄下體也菩薩石楊文公談苑曰嘉州峩眉山有菩薩石人多収之色瑩白如玉如上饒水晶之類日射之有五色如佛頂圓光文公之説信矣然謂峩眉山有佛故此石能見此光則恐未然也凡雨初霽或露之未晞其餘㸃綴于草木枝葉之末欲墜不墜則皆聚為圎㸃光瑩可喜日光入之五色具足閃爍不定是乃日之光品著色於水而非雨露有此五色也峩眉山佛能現此異則不可得而知此之五色無日則不能自見則非因峩眉有佛所致也䥝缹䥝於刀切玉篇引説文云温器也世言􅠉某肉當書為􅠉言從此䥝器之中和五味以致其熟也今人見霍去病傳有鏖戰之文又注家以多殺人為鏖遂書為鏖非也又今人食饌有雜五味於肉中而熟之當為米缹而皆書為米脯尤無義理也齊民要術雜五味於米肉而熟之書為米缹言和米而熟之於缹也玉篇音缶且云火熟也箙鞬董卓傳六十二卓膂力過人雙帶兩鞬左右馳射注方言曰所以藏箭謂之箙藏弓謂之鞬左氏傳云右屬櫜鞬伍伯後漢虞詡傳四十八注續漢志伍伯公八人中二千石六人千石六百石皆四人自百石已下皆二人黄綬武官伍伯文官辟車鈴下侍閣門蘭部署衙走卒皆有程品多少隨所典領率皆赤幘絳褠即今行鞭杖者也華陽後漢傳三十八贊注梁州北拒華山之陽南距黒水故常璩叙蜀事謂之華陽國志也魚笱唐書王君郭傳十七君郭無行善盗嘗負竹笱如魚具内置逆刺見鬻繒者以笱囊其頭不可脫乃奪繒去而主不辨也按魚具而内有逆刺此吾鄉名為倒鬚者也方書通典二十四御史門曰張蒼為御史主柱下方書如淳曰方板也謂事在板上也周禮以方書之書於板也朱書御札昭宗在鳯翔李茂貞白上三以朱書御札召崔𦙍𦙍竟不至紀事三十八五代史豆盧革傳莊宗時大水以責孔謙謙不知所為小吏段徊曰臣嘗見前朝故事國有大故天子以朱書御札問宰相莊宗乃命學士草詔手自書之按今世上自人主下至臣庶用道科儀奏事於天帝者皆青藤朱字名為青詞恐初立此體時是倣道儀也背嵬沈存中筆談載拱宸管樂之辭曰銀裝背嵬打囘囘背嵬者大將帳前驍勇人也章氏槁簡贅筆曰背嵬即圓牌也以皮為之朱漆金花煥燿炳日予將漕時都綂郭綱者韓蘄王背嵬也讀嵬如崔嵬葢平聲也如沈存中歌則去聲也予以背嵬之義問郭郭不能言惟章氏書號為皮牌耳竹􅜺白樂天集十一入峽詩曰苒蒻竹篾􅜺欹危機師趾􅜺即百丈也半池白樂天集五十三池上竹下作云穿籬遶舎碧逶迤十畆閒居半是池三宮三殿國朝有太皇太后時并皇太后皇后稱三殿其後乗輿行幸奉太后偕皇后以出亦曰三殿人或非之按王嘉傳云自貢獻宗廟猶不至此顔師古注謂天子太后皇后則三殿亦可通稱也唐有三殿則一殿而三面有殿也方鎮外國來朝則宴於此從銀臺門入象魏國語六管子對齊桓公曰昔吾先王世法文武設象以為民紀韋昭曰設教象之法於象魏也按此單言設象知象魏所垂真有其象也國語於此下又對文曰式權以相應比綴以度權度衡尺有器之物知象魏為畫象决也繫馬桓公城楚丘以封衛其畜散而無育公與之繫馬三百韋氏謂良馬在閑而不放散也則知繫馬千駟弗視言雖甚良而不取也都盧縁唐人以縁橦者為都盧縁按國語胥臣對晋文公曰侏儒扶盧韋氏謂扶縁也盧矛㦸之柲縁之以為戲上元觀燈四日㑹元引唐志云先天二年用胡僧婆隨請夜開門燃百千燈觀樂凡四日按本朝諸書或言太祖特命正月十七日後更放燈二日或言錢王來朝進錢買燈兩夕特為展十七十八仍為燈夕予嘗於秦王進奉録辨其事曰不起錢王買燈也然以先天事攷之則其時自上元觀燈後凡更有三日則買燈展日之法愈為無據又唐朝三元謂正月七月十月望日皆燃燈至中年方罷中下元兩節放燈也上中下褚衣南粤王傳陸賈往賜尉佗上中下褚衣師古音云綿裝衣以綿多少分三品閥閱史記古人之功有三以德以言以功明其等曰閥積曰閱衣錦夜行東觀漢記建武二年封景丹為櫟陽侯上謂曰富貴不歸故鄉如衣錦夜行故以封卿御覽二百按前漢皆言衣繡惟此言衣錦棨㦸當斧鉞漢雜事竇固征匃奴騎都尉秦彭擅刺軍司馬固奏劾之公府掾郭躬或為郎躬曰漢制假棨㦸以當斧鉞彭得斬人朱衣非舊制王儉為司右長史晉令公府長史著朝服宋大明以來著朱衣儉言宜復舊制時不許扁舟五湖隗囂傳方望以書辭囂曰范蠡収責勾踐乗扁舟於五湖注曰計然云范蠡乘扁舟於五湖丈二之組嚴助傳淮南王曰陛下以方寸之印丈二之組鎮撫方外漢官儀曰綬長一丈二尺法十有二月御覽綬門按綬組同朱買臣懐綬邸吏引綬即太守章則綬也者以之佩玉佩印皆同也又續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺御覽八百十九刺漢外戚傳二十七下成帝答許皇后詔曰皇帝有所疑便不便其條刺使大長秋來白之師古曰條謂分條之刺謂書之於刺板也刺音千賜反天子服璽漢元后傳髙祖即位即服秦傳國璽王莽時孺子嬰未立璽藏長樂宮按此知天子亦佩璽也故孫萬世謂昌邑王曰而聽人解脫其璽綬乎是每朝即佩也箭貫耳原陟傳茂陵守令尹公捕原陟廹窘諸豪説尹公原巨先犯法不得使肉袒自縛箭貫耳詣庭門謝罪耶按玉篇引説文云軍法以矢貫耳為聅聅音恥列反又徒安反司馬法曰小罪聅中罪刖大罪剄子玉治兵於蒍貫三人耳五稷職方氏并州宜五稷鄭𤣥曰黍稷麥稻菽后稷社稷皆取此以其該五種名之也丹圖秋官司約凡大約劑書於宗彛小約劑書於丹圖注春秋傳曰斐豹𨽻也著於丹書漢高紀鐡劵與功臣剖符作誓丹書鐡劵藏之宗廟象刑司圜掌收教罷民凡害民者弗使冠飾而加明刑焉注弗使冠飾者著黒幪若古之象刑歟卵翼左傳哀公下曰子西曰勝如卵余翼而長之今人言卵翼之恩本此窻牗説文穿壁以木為交牆所以見日也向北出牗也在牆曰牗在壁曰窻御覽百八十四宰相直筆舊唐書至德中宰相迭秉筆處斷每十日一易及賈耽趙憬陸贄盧邁同平章政事百寮有所闗白更相避不言於是奏議請旬秉筆者出應之時貞元九年也其後又請每日更筆其年迭以應事皆從之櫓許氏説文曰櫓大楯也案今城上雉堞曰櫓為其在城上可以蔽人如人之被楯也公侯干城方言曰楯自闗而東謂之音代或謂之干扞也闗西謂之楯案此即詩謂公侯干城鄭氏謂為扞城者扞者櫓也雉堞可以蔽鄣城是扞城也玉堂漢武故事玉堂去地十二丈基階皆用玉孔子食昌歜追文王文王嗜昌歜仲尼食之以取味事見吕氏春秋曰文王好菹孔子聞之蹙額而食之三年然後美之按此御覽所記恐菹字上脱一昌歜字餛飩世言餛飩是塞外渾氏屯氏為之案方言餅謂之飥徒昆反或謂之餦音張或謂之餛音渾則其來乆矣非出塞外也並御覽漆雕几鄴中記石虎御座几悉漆雕皆為五色花也按今世用朱黄黒三色漆沓冒而雕刻令其文層見疊出名為犀皮與虎刺同又異苑有神人著平巾袴褶語秀云聞君巧侔班魯刻几尤妙太山府君相召又漢書貢禹奏曰見賜杯案畫文金銀飾非所以食臣下也魏武上雜物疏曰御物有純鉏參鏤帶漆畫案一枚鹽鐡論曰文杯畫案所以亂治也又梁簡文帝書案銘曰刻香鏤采纎銀卷足漆花曜紫畫製舒緑怪廣知平入雕非曲嶧山爾雅曰魯國鄒縣有嶧山純石相積構連屬而成山又史記始皇二十八年上鄒嶧山立石刻秦功德鄒山記曰山東西二十里南北十三里高秀獨出積石相臨殆無壤土石間多孔穴洞逹相通往往有如數間居處其俗謂之嶧孔太平廣記其石玲瓏如此宜孤桐清響中琴瑟也石槨銘莊子八狶韋曰靈公死卜𦵏於故墓不吉卜葬於沙丘而吉掘之數仭得石槨焉洗而視之有銘焉曰不馮之子靈公奪而埋之夫靈公之為靈也乆矣棊道今棊方十九道合枰為棊子三百六十一案李善注韋昭博奕論枯棊三百引邯鄲淳藝經曰棊局縱横各十七道合二百八十九道白黒棊子各一百五十枚選五十七演繁露卷九
