body:
  text: 演繁露卷十三宋程大昌撰亷察周禮廉能之類諸家雖訓亷為察嘗疑理不相附因閲漢髙帝紀詔廉問有不如吾詔者以重論之顔氏曰亷字本作其音同乃知亷之為察本字也有覘視之義竹林啼老杜七歌竹林為我啼清晝蔡絛以竹林為禽名恐穿鑿也竹本非啼詩人因其號風若哀因謂之啼何必有喙者而後能啼耶說文竹之夭然似人之笑因為笑字竹豈能笑特以象焉耳非笑而可名以笑從懷哀者觀之孰謂不得為啼耶鐵瓮城潤州城古號鐵瓮人但知其取喻以堅而已然瓮形深狹取以喻城似為非類乾道辛卯豫過潤蔡子平置燕於江亭亭據郡治前山絶頂而顧子城雉堞緣岡彎環四合其中州治諸廨在焉圓深之形正如卓瓮豫始知喻以為瓮者指子城也時適有老校在前呼問其故校曰子城面面因山門之西出而達於市者蓋隧山置闔故門道長而厚不與常城等郡治北面出水之瀆兩旁斗起峭峻如壁仍更向北行十餘丈乃趨窪地以是知因山而城故能深厚如此也豫始信鐵瓮者専以子城言之古服不忌白隋志宋齊之間天子宴私著白髙帽士庶以烏太子在上省則帽以烏紗在永福省則白紗隋時以白幍通為慶弔之服國子生服白紗巾晉人著白接䍦竇平酒譜曰接䍦巾也南齊垣崇祖守壽春著白紗帽肩輿上城今人必以為怪古未以白色為忌也郭林宗遇雨墊巾李賢注云周遷輿服雜事曰巾以葛為之形如幍幍口洽反本居士野人所服魏武造幍其巾乃廢今國子學生服焉以白紗為之是其制皆不忌白也樂府白紵歌質如輕雲色如銀制以為袍餘作巾袍以光軀巾拂塵吳兢樂府要解案舊史白紵吳地所出則誠今之白紵列子所謂阿錫而西子之舞所謂白紵紛紛鶴翎亂者是也今世人麗妝必不肯以白紵為衣古今之變不同如此唐六典天子服有白紗帽其下服如裙襦襪皆以白視朝聽訟燕見賔客皆以進御則猶存古制也然其下注云亦用烏紗則知古制雖存未必肯用多以烏紗代之則習見忌白久矣世傳明皇幸蜀圖山谷間老叟出望駕有著白巾者釋者曰服諸葛武侯也此不知古人不忌白也桃葉桃葉歌王子敬為其妾作辭曰桃葉復桃葉渡江不用楫王性之謂渡江不用楫隱語也謂橫波急也此語極似有理而施建樂府廣題所載乃不然曰桃葉復桃葉渡江不用櫓風波了無常沒命江南渡陳末人多歌之後隋平陳晉王營六合縣之桃葉山實應其語建既得其本辭載之則謂寄意橫波者非也千里不唾井李濟翁資暇録諺云千里井不反唾疑唾無義也唾當為莝莝草也言嘗有經驛舍反馬莝於井後經此井汲水為莝所哽也按玉臺新詠載曹植代劉勳妻王氏見出而為之詩曰人言去婦薄去婦情更重千里不唾井況乃昔所奉逺望未為遙踟蹰不得共觀此意興乃為嘗飲此井雖舍而去之千里知不復飲矣然猶以嘗飲乎此而不忍唾也況昔所嘗奉以為君子者乎此足以見古人詩意猶委曲忠厚發情而止禮義其理亦甚明白易曉李太白又采用此意為平虜將軍妻詩曰古人不唾井莫忘昔纒綿姚令威著殘語太白此詩亦引李濟翁不莝井語以為之證是皆不以曹植詩為證也牛魚契丹主達魯河釣牛魚以其得否為嵗占好惡蓋倣中國賞花釣魚而因以卜嵗也近世周茂振使金金人賜之魚曰手所親釣者即金亦用遼制也壬易燕北録云牛魚觜長鱗硬頭有脆骨重百斤即南方鱏魚也鱏鱘同本草既有鱘魚又别有牛魚云生東海頭如牛則牛魚别自一種非鱘也若鱏魚正如鮎鱯通身無鱗既有鱗而硬即非鱏矣馮道出使詩曰曽叨臘月牛頭賜史謂道真受牛頭之賜非也契丹主率以臘月打圍因敲氷釣魚則臘月牛頭者正本草所著東海之魚其頭如牛者也非真牛頭也茅三間東坡詩周公與管蔡恨不茅三間南史劉義真傅贊曰善乎龎公之言比之周公管蔡若處茅屋之內宜無放殺之酷蕃語蕃語以華言譯之皆得其近似耳天竺語轉而為損篤身毒唐有吐蕃本禿髮烏孤秃髮語轉遂為吐蕃唃厮羅之父名錢通乃贊普也達怛乃靺鞨也契丹之契讀如喫惟新唐書有音冒頓讀如墨突惟晉書音義有之漢音義無也不知其何所木然常怪蕃語入中國其元無木字而以華字記之如捐篤身毒固無所奈何至如龜兹既知其為丘慈何不徑以丘慈書之乃借用龜兹以待翻字者而後音讀乃明是必有說也華戎語異雖借華字記之尚與本語不全諧協其必宛轉於兩字之間如龜近丘而不全為丘必龜丘聲合然後相近故不得以一字正命也三姑廟建康青溪有廟中塑三婦人像輿地志謂為青溪姑其在南朝數嘗見形今建康志因曰隋晉王廣嘗即其地斬張麗華孔貴嬪因并青溪姑者數以為三俗亦呼三姑廟此說非也按吳均續齊諧志㑹稽趙文韶宋元嘉五年為東宫扶侍居青溪夜遇婦人攜二婢過之女贈金簮文韶報以銀碗琉璃比明至青溪廟中見碗已在焉廟中女姑神像青衣婢侍立乃夜來所見即輿地志所謂嘗見形者然則三婦人像宋已有之安得為張孔乎躤栁壬辰三月三日在金陵預閲李顯忠馬司兵最後折栁環插毬場軍士馳馬射之其矢鏃闊於常鏃略可寸餘中之輒斷名曰躤栁音藉其呼藉若乍聲樞帥洪公謂豫曰何始豫曰殆蹛林故事耶歸閲漢書胸奴傳秋馬肥大㑹蹛林服䖍曰蹛音帶師古曰蹛者繞林而祭也鮮卑之俗自古相傳秋天之祭無林木者尚植栁枝衆騎馳繞三周乃止此其遺法按此即豫言有證其於馳躤之外加弓矢焉則又益文矣西北録太祖時契丹使來朝詔使者於講武殿觀射令其從者與衛士射毛毬截栁枝即其事也平白地腸斷李太白越女詞曰東陽素足女㑹稽素舸郎相看月未墮白地斷肝腸此東坡長短句所取以為平白地為伊腸斷也沓拖東坡頗有沓拖風味李白大鵬賦連軒沓拖揮霍翕忽簡策古者大事書之於策小事簡牘而已䇿者編綴衆簡而成者也文滿百乃書之不然則否故曰小事簡牘而已蔡雍獨斷云禮日不滿百文不書於䇿其制長二尺短者半之其次一長一短兩編下附用篆書此漢䇿拜丞相之制也至䇿免則以尺一木兩行而𨽻書與䇿拜異矣傅獻簡云今批答五六字即滿紙其體起於宋武帝縱筆大書甚有理也皂衣獨斷公卿尚書衣皂而朝曰朝臣故張敞曰備皂衣議論白銅鞮玉臺新詠載襄陽白銅鞮歌大抵主言送别且皆在襄陽沈為曰分首桃林岸送别峴山頭若欲寄音息漢水向東流無名氏一首曰陌頭征人去閨中女下機含情不能言送别淚霑衣其末云龍馬紫金鞍翠眊白玉羈照耀雙闕下知是襄陽兒郭茂倩樂録本襄陽踏蹄梁武西下所作玉臺新詠所載兩首皆沈為和白銅鞮即太白所謂襄陽小兒齊拍手攔街爭唱白銅鞮者也明妃琵琶琵琶所作為烏孫公主所出塞也文人或通明妃用之姚令威辨以為誤是矣然玉臺新詠載石崇明妃詞序曰公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明妃亦必爾也其造新曲多哀聲故書之於紙則崇之明妃詩嘗以寫諸琵琶矣郭茂倩著為樂書遂載崇此詞入之楚調中楚調之器凡七琵琶其一也則謂明妃為琵琶辭亦無不可香秦漢以前二廣未通中國中國無今沈腦等香也宗廟燔蕭灌獻尚鬱金食品貴椒皆非今香也至荀卿氏方言椒蘭漢雖已得南粵其尚臭之極者曰椒房椒風郎官以雞舌奏事而已較之沈腦其等級甚下不類也惟西京雜記載長安巧工丁緩作被下香爐頗疑已有今香然劉向銘博山爐亦止曰中有蘭錡青火朱煙玉臺新詠古詩說博山爐亦曰朱火燃其中青煙揚其間香風難久居空令蕙草殘二文所賦皆焚蕙蘭而非沈腦是漢雖通南越亦未見越香也漢武內傳載西王母降爇嬰香等品多名異然疑後人為之漢武奉仙窮極宫室帷帳器用之麗史漢備記不遺若曽創有古來未有之香安得不記沈香梁武帝方施之祭神雞栖老人城蘇易簡著本朝使人至西畨見有老人消縮如小兒在梁上雞窠中乃其見存子孫九代祖也其說甚怪丙申十月十六日夜寓直玉堂閲史見興元間韋臯得詔攻吐蕃其所攻州名有維保松及雞栖老翁城豫欣然自笑曰易簡之說豈即此二城名而增飾之以文滑稽耶管城子之毛頴烏衣國之王謝皆其例也毛裘徐常侍鉉入中原以織毛衣制本出塞外不肯被服寧忍寒至死信其有守然古固以狐羔麑為裘聖人服之矣若謂古人不以織毛之衣襲朝服者則今貂蟬亦古乎若其篤古堅毅死且不易上於人多矣烏鬼老杜詩曰家家養烏鬼沈存中曰烏鬼者鸕鷀也元微之嘗投簡陽明洞有詩曰鄉味猶珍蛤家神愛事烏乃知唐俗真有一鬼正名烏鬼謂為鸕鷀殆臆度耶傳記不聞有呼鸕鷀為烏鬼者又國史補裴中令節度江陵常遣軍將談洪受同王稹往嶺南斡集至桂林館有烏在竹林中稹偶擲石擊中其腦以死稹殊不以為意㑹洪受病逗留于後稹先達江陵中令疑訝忽夢洪受訴言道為王稹所殺棄其尸竹林中裴大以為異亟付獄治稹自誣伏法而洪受乃至始知是烏鬼報讎也此說甚怪然有以知唐俗謂烏能神直至於是則其祠而事之有自來矣石鑄器穆天子傳天子升采石之山取采石焉天子使重之民鑄以成器于黑山之上郭璞注云今外國人所鑄作器者亦皆石類也按此所言殆今藥玉藥流離之類古書記事簡不失實驟觀若可愕徐徐察之理甚煥然簡竒可尚也錢塘世說注錢塘云晉人沈姓而令其縣者將築塘患土不給用設詭曰有致土一者以錢一易之土既大集遂諉曰今不復須土矣人皆棄土而去因取此土以築塘岸故名錢塘非也漢書地理志㑹稽郡有錢塘縣其已久矣地名因俗傳而訛如此者多欸乃栁子厚詩漁翁夜傍西巖宿曉汲清湘燃楚竹江空日出不見人欸乃一聲山水緑欸音奧乃音靄世固共傳欸乃為歌不知何調何辭也元次山集有欸乃歌五章章四句正絶句詩耳其序曰大厯丁未中漫史以軍事詣都使還州逢春水舟行不進作欸乃五曲舟子唱之蓋取適於道路耳其中一章曰千里楓林煙雨深無朝無暮有猿吟停橈靜聽曲中意好是雲山韶濩音蓋全是詩如竹枝栁枝之類其謂欸乃者殆舟人於歌聲之外别出一聲以互相其所歌也耶今徽嚴間舟行猶聞其如此顧其詩非昔詩耳而欸乃之聲可想也栁枝竹枝尚有存者其語度與絶句無異但於句末隨加竹枝或栁枝等語遂即其語以名其歌欸乃殆其例耶百子帳唐人昏禮多用百子帳特貴其名與昏宜而其制度則非有子孫衆多之義蓋其制本出塞外特穹廬拂廬之具體而微者耳棬栁為圈以相連瑣可張可闔為其圈之多也故以百子總之亦非真有百圈也其施張既成大抵如今尖頂圓亭子而用青氊通冒四隅上下便於移置耳白樂天有青氊帳詩其規模可考也其詩始曰合聚千羊毳施張百子弮骨盤邊栁健色染塞藍鮮其下注文自引史記張空弮為證即是以栁為圈而青氊冒之也又曰有頂中央聳無隅四嚮圓是頂聳旁圓也既曰影孤明月夜又曰最宜霜後地則是以之弛張移置於月於霜隨處悉可也又曰側置低歌座平鋪小舞筵則其中亦差寬矣既曰銀囊帶火懸又曰獸炭休親近則是其間不設燎爐但用銀囊貯火虛懸其中也又曰蕙帳徒招隱茅庵浪坐禪其所稱比但言蕙帳茅庵而不正比穹廬知其制出穹廬也樂天詩最為平易至其鋪叙物制如有韻之記則豈世之徒綴聲音者所能希哉唐德宗時皇女下降顔真卿為禮儀使如俗傳障車却扇花燭之禮顔皆遵用不廢獨言氊帳本塞外穹廬遺制請皆不設其言氊帳即樂天所賦而宋之問所謂催鋪百子帳者是也丙申十月十一日夜醉後讀白集信筆以書演繁露卷十三
