body:
  text: 演繁露卷十五宋程大昌撰不托湯餅一名餺飥亦名不托李正文刋誤曰舊未就刀鈷時皆掌托烹之刀鈷既具乃云不托言不以掌托也俗傳餺飥字非予始讀此未審其言信否及見束晢餅賦知其有本也晢曰仲春之月天子食麥而朝事之籩煮麥為麵内則諸饌不説餅然則雖云食麥而未有餅餅之作也其來久矣又曰三冬冽寒涕凍鼻中霜成口外充虚解戰則湯餅為最而其形容制造之意則曰火盛湯涌猛氣蒸作攘衣振掌握搦捬搏麵瀰離於指端手縈迴而交錯紛紛馺馺星分雹落柔如春綿白若秋練則當晉之時其謂湯餅者皆手摶而擘置湯中煮之未用刀几也又宗懍荆楚嵗時記六月伏日作湯餅名辟惡餅庾闡賦之曰當用輕羽拂取飛麵剛軟適中然後水引細如委綖白如秋練則其時之謂湯餅皆齊髙帝所嗜水引麵也水引今世猶或呼之俚俗又遂名為蝴蝶麵也水引蝴蝶皆臨鼎手托為之特精麄不同耳不知何世改用刀几而名不托耳若參束宗所賦則李正元所紀信而有證也餺飥恐古無此字殆後人因不托聲稱之而食其旁與歐公餕音俊饀音叨之謔同一闗捩也凢将漢小學家司馬相如作凢将篇其後元帝時史游又作急就篇凢将今不可見矣藝文類聚載凢将一語曰鍾磬竽笙筑坎侯與急就記樂之言所謂竽瑟箜篌琴筑箏者其語度規制全同率皆立語總事以便小學即急就也者正規模凢将也幘冠服古今異制而苦無明著既其制不能明了則其所施用或當或否皆不可别識矣幘者冠下覆髻之巾也史游急就章曰冠幘簮黄結髮紐顔師古釋之曰幘者韜髮之巾所以整亂髮也當在冠下或單著之揚雄方言曰覆髻謂之幘巾或謂之承露或謂之覆髻皆趙魏間通語也夫其従覆髻而言則顔師古謂為整髮者是也冠冕有旒崔豹古今注以為垂露則承露云者従藉冠言之也漢元帝額有壮髮不欲人見始進幘服羣臣皆隨焉庾凱醉墮幘機上以頭就穿取檀道濟被收脱幘投地皆顔師古謂或單著之者也若其人應著冠則以幘籍其下賤而執事則無冠單著幘也應劭漢官儀謂幘者卑賤不冠者之所服是也董偃緑幘傅鞲拜謁武帝帝令起趨東廂就衣冠是也董仲舒止雨書亦曰執事者赤幘摯虞决疑曰凢救日蝕者皆著赤幘以助陽知其皆賤者之服也始有幘時未以覆髻但韜裹鬢毛使著冠使髮不䝉面耳凢此言冠而及幘者其冠皆冕冕冒額故必用幘以收髮也古冠冕得通言故也若單著既冠之冠則露髮無所事幘也蔡邕獨斷曰元帝進幘但遮覆額前壯髮尚未有巾也王莽頭禿始加巾故其俚語曰王莽秃幘施屋後漢書曰半頭幘劉俠卿為劉盆子制半頭赤幘續漢書曰半頭幘即空頂幘其上無屋故以為名東宫故事曰太子有空頂幘一枚空頂即半頭也元帝時尚未有巾故東宫用空頂幘者本古也屋即巾也有顔有屋即異乎空頂矣梁冀改易服制作庳幘狹冠是冀自改莽制損下其屋也董巴漢輿服志曰古者有冠無幘秦以為武将首飾為絳幘以表貴賤後稍作顔題漢興續其顔却結之施巾連題却覆之至文帝乃髙顔續為之耳且崇其屋貴賤皆服之夫耳者結巾之角也巴謂崇屋始於文帝恐不及蔡邕謂為始莽者的也董偃服庖人服故緑幘衛宏漢舊儀曰齋緑幘耕青幘漢官儀曰謁者著湘幘大冠皆隨事著色若東觀漢記載光武初起服赤幘賜段熲赤幘大冠一具孫堅為董卓所圍著赤罽幘潰圍而出皆執事者單幘之證也夫止雨救日執事者皆赤幘未必主為助陽也蓋漢以火王其在五徳尚赤耳故董仲舒繁露曰以赤統者幘尚赤是專漢制也鄒邾趙岐曰鄒本春秋邾子之國至孟子時改曰鄒矣國近魯後為魯所并又言鄒為楚所并非魯也今鄒縣是也鄒山記曰鄒山古之嶧山也孤桐之所植邾公之所卜山下是鄒縣本是邾國魯穆公改鄒山従邑變故謂鄒山始皇勒銘在此山上合此二説觀之鄒山記未為審的也鄒魯相閧魯之臣死者三十三人穆公尚以民莫救上問於孟子則改邾為鄒豈魯力所能哉夫并邾改鄒亦大故矣南史無明載攷古者至此殆難審定也百丈杜詩舟行多用百丈問之蜀人云水峻岸石又多㢘稜若用索牽即遇石輒斷不耐故劈竹為大瓣以麻索連貫其際以為牽具是名百丈百丈以長言也南史朱超石傳宋武北伐超石董舟師入河陽人縁河南岸牽百丈則知有百丈矣曲逆陳平封曲逆侯或讀如去遇非也地理志中山國曲逆縣得名因濡乃官反水至城北曲而流故曰曲逆章帝醜其名改曰蒲隂則曲逆之讀當如本字不當借音蒲盧説文嬴蒲盧細腰土蠭也按禮人道敏政地道敏樹政猶蒲盧也夫從地道敏樹之後始言政猶蒲盧真是蒲與盧耳今人釋中庸以蒲盧為螟蛉其誤當始説文無恙今人問安否曰無恙説者曰恙草間䖝名也故問安者以無恙言之今按説文恙憂也至它託何反條乃曰它従䖝而長象宛曲垂尾形上古艸居患它故相問無它乎垜殿説文垜堂塾也丁果反又云塾門側堂也今垜殿取此遏魏劉靖魏嘉平三年立遏於漁陽高梁河水經十四云遏即堨也以土壅水為遏不知何世加土為堨故栁子厚記袁家堨猶須解釋恐人不喻也相雞狗術荀子儒效篇堅白異同之分隔也不知無害為君子曽不如好相雞狗之可以為名也是此種雜術古已有之先馬荀子正論天子乘大輅諸侯持輪挾輿先馬注先馬導馬也莊子七聖在襄城之野有前馬後車後世東宫官有太子洗馬釋者曰洗先也此亦先馬之義也天子出則有先驅太子則洗馬言騎而為太子儀衛之先也選案黄紙中書令傅亮以蔡廓為吏部尚書語録尚書徐羡之曰黄門郎以下悉以相委蔡廓曰我不能為徐干木署紙尾遂不拜選案黄紙録尚書與吏部連名故言書紙尾也按此則宋時文書已用黄紙唐高宗時始令凢敕書皆黄紙則不獨選案得用也葉石林言太宗時敕已用黄紙不知其何所本也鼻祖揚雄賦曰或鼻祖於汾隅劉徳釋鼻為始後人特信徳語和附以為始祖不知鼻之訓始何義也説文釋皇曰皇大也从自自始也始皇者三皇大君也自讀若鼻今俗以始生子為鼻子則鼻之為始漢時已然也説文於辠又曰辠犯法也从辛从自言辠人蹙鼻若辛秦以辠似皇字改為罪合皇鼻二字本釋而言之則鼻之訓始有以也葉子古書不以簡䇿縑帛皆為卷軸至唐始為葉子今書冊也然古竹牒已用疊簡為名顧唐始以縑紙卷軸改為冊葉耳嘉慶李韋述兩京記東都嘉慶坊有李樹其實甘鮮為京城之美故稱嘉慶李今人但言嘉慶子蓋稱謂既熟不加李亦可記也林養松陵集陸龜䝉樵子詩云生自蒼崖邉能諳白雲養注養去聲讀山家謂養柴地為養予按刑浙東民有投牒言林養為人所侵者書養皆作􅦗予疑其無所本今讀陸詩知二浙方言自来矣托子古者彜有冉爵有玷即今俗稱臺琖之類也然臺琖亦始於盞托托始於唐前世無有也崔寧女飲茶病盞熱熨指取楪子融蠟象盞足大小而環結其中寘盞於蠟無所傾側因命工髹漆為之寧喜其為名之曰托遂行於世而托子遂不可廢今世托子又遂著足以便揷取間有隔塞其中不為通管者乃初時楪子環蠟遺制也六更禁中鐘鼓院在和寧門譙上其上鼓記五更已竟外間通用漏刻方交五更也殺五更後譙上不復更擊鐘鼓需平明漏下二刻方椎鼓數十聲門開人知促配五更不擊六鼓何義也唐王建宫詞云每夜停燈熨御衣銀熏籠底火霏霏遥聴帳裏君王覺上直鐘聲始得歸本朝王禹玉亦有詞云焚香熏熨赭黄衣恐怕朝陽進御遲禁鼓六更交早直歸来還直立班時以二宫詞詳之禁中記更鼓不究平曉者蓋交更之際翼日當直宫女須以未曉前先来受事則凢應奉蚤朝皆可夙辨若候正交五更始來則不及事矣王建言上直鐘聲者禁中五更曉鐘也王禹玉謂六更者明宫殿五更之外更有一更也其實宫鼔以外間四更促為五更故五鼓終竟時蚤於外間耳鼔節未嘗溢六也國朝大禮車駕宿齋青城則齋殿門内五更均促使短如宫中常節至青城門外則五夜平分須曉乃竟故奉當具行禮序次以授在事之人皆以宫漏之外别異其言曰街市幾更幾更為此也腰舟荘子言魏王大瓠濩落無所用何不以為大尊而浮之水上司馬云尊如酒器縛之於身浮於江海所謂腰舟也亦鶡冠子中流失船一壺千金者也詩曰匏有苦葉濟有深涉瓠之苦者不可食啖則養使堅大裁以為壺而用之濟水則雖深涉無害也貍首史記封禪書萇𢎞以方事周靈王諸侯莫朝𢎞明鬼神事設射貍首貍首者諸侯之不來者依物怪欲以致諸侯諸侯不従徐廣曰貍一名不來今俗語呼貍猶然然則射之所射者皆以惡物為鵠故曰毋若爾不寧侯故抗而射汝障扇今人呼乘輿所用扇為掌扇殊無義蓋障扇之訛也江夏王義恭為宋孝武所忌奏革諸侯制度障扇不得用雉尾是也凢扇言障取遮蔽為義以扇自障通上下無害但用雉尾飾之即乘輿制度耳蔡薿小詞有曰扇開仙掌誤也唐緋章服以花綾為之白樂天聞白行簡服緋有詩云榮傳錦帳花聨萼彩動綾袍鴈趂行注云緋多以鴈銜瑞莎為之則知唐章服以綾且用織花者與今制不同瑟瑟枕語林盧昻主福建鹽鐵有瑟瑟枕大如斗憲宗召市人估其直或云至寳無價或云羙石非真瑟瑟則今世所傳瑟瑟或皆煉石為之耶殿黄霸傳鶡雀飛集丞相府張敞奏霸集計吏使能言孝弟風化者上殿則是丞相府中有殿也許叔重曰殿堂也顔師古曰古者屋之高嚴通呼為殿不必宫中夫古今事物名稱隨世更易顔言未必無理然元后傳王根第中起土山立兩市殿上赤墀户青瑣董賢傳将作大匠為賢起大第重殿洞門師古於此故曰殿有前後僣天子制也則不更以殿為高屋矣豈以殿之重復者乃為天子禮耶不然何以語皆出顔而二傳異釋也鄭司農釋周禮朝士所掌外朝曰今司徒府有天子以下大㑹殿亦古之外朝也司農所見東都制也應劭曰丞相舊位在長安時府有四出門隨時聴事明帝時但為東西門耳國每有大議天子車駕親幸其殿殿西王侯以下更衣併存即周禮外朝也干寳注曰司徒府中有百官朝㑹殿天子與丞相决大事是外朝之存者由鄭應干三説合之人臣府第乃有殿焉則師古謂凢高嚴之屋皆得稱殿似矣而三人同辭皆謂此殿以朝㑹為名而天子又嘗臨幸則恐司徒未必敢以聴事也若霸府殿正受計其上則是相府所得專有豈西都於此種等差未致其察也故魯雖諸侯王而靈光巋然亦不以僣制而毁削也且其得名為殿者以嘗受朝備臨幸則他公府不皆有而朝㑹臨幸亦止在司徒府耶按漢宫典儀司徒府與蒼龍闕對則亦不在禁中諸家謂古外朝在路門之外其地亦與古應也則是殿也雖立於司徒府非司徒可得而有也漢三公董賢傳哀帝冊賢為大司馬曰建爾子公班固曰是時賢雖為三公常給事中則以大司馬為三公也史記儒林傳倪寛至御史大夫卒史遷曰寛任三公位以和良承意従容得久張湯為御史大夫既被薄責乃曰湯起刀筆陛下幸致位三公又元后傳王音為御史大夫列於三公則知漢語亦以御史大夫為三公也千金漢言百金中人十家之産則十金之直可辦中人一家之産也然則其數一金不當止於一兩矣説者各隨所見而别多少皆不適中以予觀之古者一代事物各為一制不但正朔服色而已周人之金以鎰計謚二十兩也漢人之金以斤計斤方寸而重一斤也惠帝初即位賜視作斥上者将軍四十金鄭氏曰四十金四十斤金是也食貨志黄金一斤直萬錢則漢云一金者皆為金一斤呂刑贖法計鍰輸金諸家謂鍰六兩也金黄鐵銅也五金皆金知銅為黄鐵也孔穎達曰釋舜典者謂贖金為黄金其實銅也故周金雖有鍰鎰二名而黄金不以鍰計也衛霍冢據顔師古注二傳則衛霍二冢皆附茂陵霍冢之上琢石為祈連山及人馬衛冢之旁有長主冢相併至唐皆無恙而茂陵晉時為人所發矣此張釋之所謂其中無可欲者則雖無石槨抑何戚焉者也悲夫演繁露卷十五
