body:
  text: 演繁露卷五宋程大昌撰辱井陳後主入景陽井隋軍出之因號其井為辱井曾子固記其所見曰井口石欄有鐫字曰辱井在斯可不戒哉乾道壬辰豫將漕江東以季月同諸司入視行宫有無修換至學士院前典鑰大璫指其中一石欄曰此古辱井欄也即而視之其欄口之上果嘗鐫刻辱井當戒等語側邊則唐人記其遊觀月日鐫題填滿至無見石而其石理光瑩可鑑仍有淡紅漫布其上略如朝霞建康圖經謂此之紅者乃張孔二宫人脂澤所染也豫細視而揆之以理則皆誤傳蓋史記後主與二嬖同縋而上則三人矣今其欄口略可容一小兒則後主一身尚不可入安有三人同縋之理也建康城中鋪街之石率皆青質紅章此自其地石性天然而然安得遂云胭脂所染也豫久欲辨識為無的據不敢輕發淳熙壬寅正月十四日偶閲歐公歸田録曰隋煬帝作景陽井銘銘文尚隱隱可讀有云前車已傾後乘將沒則歐公所見之銘此井鐫文全然不同矣豫亦嘗墨得唐世鐫刻井文一本今尋不見然猶記其詳元無歐公所見傾沒等語也然則今之留真建康行宫者非古物明白矣特不知唐人皆指此欄為真而歐公又何從而得傾沒等語也印文扁榜添之字世傳相國寺門舊扁題云相國之寺凡四字或以之字為贅遂除去之字别添大字其文曰大相國寺此之添一大字於體既該於文無贅最為可傳然扁題字數竒而不耦者古今往往皆增之字則是必有古而不知所起的在何時也漢武太初元年改正朔易服色色尚黃數用五張晏釋之曰漢據土德數用五故印文必五如丞相則曰丞相之印章則是於四字外添一之字以應足乎土五之數也下及諸卿及守相印文凡不及五者亦皆益一之字以足之後世但見太初蓋嘗增字遂從而放之凡印文以及門堂扁榜不問何事何世槩增一之以求合於古則失本矣諱左氏曰周人以諱事神名終將諱之言周人常時固嘗避其君上之名不敢斥言矣至事神之際則雖他時嘗避者亦正讀無避蓋不敢伸其尊於所尊也此之謂以諱事神名也及嗣君繼立則前君之名亦必諱之是謂終將諱之也本朝著令則分名諱為二正對時君之名則命為御名若先朝帝名即改名為諱是為廟諱也若漢時則未如此分故孝宣改舊名病已而更其名以為詢其詔曰古者天子之名難知而易諱今百姓上書觸諱以犯罪者朕甚憐之其更名詢其觸諱在令前者赦之則是名諱未分也唐太宗朝不諱世字李世績皆并世名之自見本項丁錢今之丁錢即漢世算錢也以其計口輸錢故亦名口賦也漢四年初為算賦如淳曰漢儀注民年十五以上至五十六出賦錢人百二十為一算治庫兵車馬至文帝時人多丁衆則遂取髙帝本額嵗減三之二則一口一年輸錢止於四十也賈捐之曰文帝偃武行文民賦四十丁男三年而一事如淳曰常賦嵗百二十嵗一事文帝時天下民多故出賦四十凡三嵗而一事此之謂賦即髙帝時百二十至此而減為四十者也此之謂事即古法一嵗一丁供役無過三日者是也民年十五以上雖未成丁亦輸口錢所謂民賦四十者也及已成丁則每嵗當供三日之役者至此減為三年而才受一年之役也唐制取民者為租庸調三色其曰庸者一嵗而用人力止於二十日役不及二十日則輸絹三尺是名為庸若有事而加役二十五日者免其調調謂輸絹銀之屬也此三代漢唐賦役增損之凡也庸字雖單出不添立人為與廟諱義同只闕租役調也有如皎日詩曰謂豫不信有如皎日言我志明白如日皎然也至左氏晉文公與舅犯誓亦用此之意度耳曰所不與舅氏同心者有如此河其立語亦放乎詩矣而意度全異也故史記發明其意而改為之言曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟此之要質河伯使司其約者語意却甚明白也郤克使齊齊人侮之克怒歸至河上曰不報齊者河伯視之出史記晉世家則亦史遷所記之語也至祖逖擊楫為誓則曰所不能清中原者有如大江則其義何屬也麒麟春秋獲麟孟子曰麒麟之於走獸此之麒麟自是瑞獸非馬也唐以麒麟名馬廏驥者馬之有德者也騏則馬之毛色也名廏之意蓋兼取祥麟德驥以重其事也字既改而從馬則失其本意矣不獨唐廏之誤如此世凡援麒麟以比者皆書為騏驎人亦不察也卿後世人主之對臣下不問三公九卿之與庶列槩呼為卿惟大朝會上公預事則典儀者臨殿陛宣答曰某慶與公等共之獨此稱公它則否前輩亦嘗辨之矣以豫所見此語當出戰國戰國之世其陪臣之貴者至卿而極故其國君目其人之為卿也是致極不可加之體也及其呼喚已熟故秦漢以下人主亦遂循而目之是以無問官之髙下槩命為卿也趙廣漢傳事推功善歸之於下曰某掾卿所為此時廣漢為尹京兆身為九卿不開國不立臣僕其屬官安得有卿耶特取時人相尊之語以為之禮耳廣漢又嘗對劾蘇回之賊而言曰京兆趙君謝君兩卿又語亭長曰京兆不忘卿厚意王尊為太守出教告屬縣曰願諸卿勉力正身意皆類也後世呼之為卿猶春秋時呼人為君為公也生祠于定國為東海郡決曹決獄平郡中為立生祠生而立祠此似無謂也人已死乃須立廟而血食今也生而立廟誰當享之然而于公聽之不辭者習見時事以為當然也秦始皇自立極廟漢諸帝皆生自立廟故賈誼對文帝而言曰顧成之廟號為太宗則生祠殆例此也東鄉古今賔主之位賔皆在西主皆在東非尊東而下西也東卑於西故自處於卑以西方尊客也曲禮説曰主人就東階客就西階客若降等則就主人之階則是客與主人敵禮者即居西對東以與主人匹所謂分庭抗禮者也惟其客之分卑降乎主人一等則不敢正當敵禮而隨主人之後以趨東階也然則居東之為自卑其理明矣今人通謂主人為東道尚亦無害指東為尊則失之矣左氏之言曰若舍鄭以為東道主供行李之往來此蓋鄭在秦東其人主秦地而言故曰東道主非謂一堂之上位在楹東乃云東道也廟法太祖西坐而正東向以為諸廟之冠正此理也韓信之得廣武君也東鄉坐西向而師事之是使左車之位在西而面則鄉東信位在東而面則西向也此其所以名為師事也此又可見其處東之為卑也田蚡為相坐其兄蓋侯西鄉而自東鄉以為漢相尊不可以私撓也王邑傳樓護嘗為王邑父客邑特尊之坐者數百獨處護於西使之東向正坐也近世相承分二相為左右而階銜之分左右也有出身人冠左無出身人冠右則又因坐位致誤也古人得罪下遷者皆曰左遷漢法仕諸侯者名為左官則古不尚左其來久矣男生小運起寅女生小運起申通典五十九卷曰男三十而娶女二十而嫁注曰許叔重云包字象懷妊巳在其中子未成形之象也元氣起於子人之所生也男左行三十女右行二十俱立於巳為夫婦而懷妊於巳巳為子也子為陽氣發生之始人皆於子稟生焉故男自子而左數之歷三十位而至巳是為男娶之年所謂男三十而娶也女自子而右數之歷位二十而至巳是為女嫁之年所謂女二十而嫁也人十月而生男起巳右行至寅女起巳左行至申故男年始寅女年始申男從巳上向右邊數去至寅則十箇月矣女從巳上向左邊數去歷十箇月即申也案此所言男生年起寅者即今三命家謂男一嵗小運起寅者也女生年起申即女生一嵗小運起申者是也其説若出附會而今世命術通用其説禍福皆驗不知許氏於何得之殆漢世已有推命之法矣而許氏得之也耶或是許氏自推男女生理而日者取以為用也然史傳所載如舉許負馬季主其能先事命中者皆卜相耳而未聞有推命之術也至隋世楊操注八十一難經詳述此説而曰人生男女隂陽出於自然也則明為推命也齒路馬有誅曲禮曰以足蹙路馬芻有誅誅責也如孔子曰於豫與何誅者是也其在國法則雖小小責罰皆可名之為誅也漢令不下殿門罰金四兩之類是亦名為誅責也於是見路馬之芻而蹙之以足則為不敬不敬者有罰是之為誅矣至於他馬與路馬同道官馬不自斂退乃遂與之齊行是之為齒齒之為義若三年不齒之齒齒亦有罰也凡此之罰皆得名之為誅如五刑皆得為刑也舊説謂齒者驗馬齒而命其年則遂加之以誅此謬也厠漢書衛青大將軍侍中武帝據厠見之注溷厠也此説非也武帝固以奴𨽻待青矣青時已為大將軍亦不應如此之深也凡言厠者皆為其在兩物之間漢文居霸北臨厠使慎夫人鼓瑟韋昭曰髙岸夾水為厠水經曰今斯原夾二水矣原者白鹿原也霸水自北原上來近長安而合乎滻也或謂長水會霸要之皆在兩水間其義兩通故此原在霸滻兩間而文帝臨之是謂臨厠也即此理推之則凡厠云者皆以兩間為義雖溷圊之名為厠亦一理也詩謂夾其皇澗者是也夫水在兩土之間既可名澗則凡厠之義皆以兩間名之復何疑哉古書所著如曰豫遜變姓名為刑人而入襄子之厠襄子如厠心動又如管寧首過而曰固嘗如厠不冠矣諸如此類則真溷圊矣而溷圊之義蓋亦同用兩間為義也又如郅都傳賈姬如厠有野彘如厠命都擊之則此之如厠者正為其在兩土夾中非溷圊矣人主之見臣下不必皆在廣庭坐雖便殿燕間御坐之前必有隙地使見者得以拜伏從容進退乃為得禮今武帝之見青也臨斬絶之岸而使青蒲伏於絶岸之下仰視威顔如在天上可謂非禮矣故史因武帝之禮黯而對青以言臨厠也鐡甲皮甲水犀鮫魚三代秦漢以來軍旅多用皮甲其曰犀兕者是也然史傳所載已有鍛金為甲者矣顧其用者尚少耳管子曰葛盧之山發而出黃金蚩尤受之以為劒鎧鎧即甲也注云言其始也言以金為甲自蚩尤始也然則前乎三代已有金甲矣若其軍旅之所通用不勝其多則直鍛皮為之耳許氏説文鎧甲也針臂鎧也錏煆頭鎧也三者字皆從金則可以知其必以金鑄矣周禮函人所典犀甲兕甲合甲凡三甲也此三甲者率皆以皮為扎扎成堅之以火故函人曰凡鍛不摯則不堅已敝則撓是也此之謂皮即牛犀兕三獸之皮皆堅韌可用也牛即耕牛也犀則一角者也兕則色青如牛者也三者惟牛可畜則可隨須隨有矣若犀與兕皆非可畜之獸其皮亦不可常得也孔子曰虎兕出于柙柙以畜之尚或擘裂而出則是不可豢畜也矣故國語載叔向之言曰唐叔射兕于徒林殪以為大甲葛洪亦曰屠犀為甲賈逵曰以兕革為大甲也夫其平日不可使出圈柙而臨用又須屠射則其材何可常有若夫牛者既可豢畜則臨用不患難辦矣華元曰牛則有皮犀兕尚多言吾牛皆有皮皮皆可用自牛以外犀兕亦不乏也此雖例為夸言然亦可以見犀兕之少於牛矣勾踐又有水牛之甲即以水牛皮為之矣荀子曰楚人鮫革犀兕以為甲堅如金石鮫魚者皮上傅砂其鋩可錯用以為甲亦與犀兕同堅於是遂名水犀者即是本鮫魚之為水産而取之以名也晉書載馬隆之討涼州也夾道纍磁石賊首負鐡鎧行不得前隆卒即被犀甲無所留礙賊以為神則是隆軍有鐡甲可擐而不擐也王隱晉書亦載其事乃曰隆兵悉著牛皮鎧得過則是實用牛皮為之而名以為犀焉耳市馬市馬於吐蕃古記無載然已有其事鹽鐡論曰齊陶之縑南漢之布中國以一端縵得胸奴纍金之物驢騾駱駝可使銜尾入塞則漢世已嘗出縑帛買馬塞外矣顧其時虜未知中國縑帛真價故得出一縑一布而得纍金之物至唐世則病其酬帛之多矣往省括于度則釋機者弩牙也牙之所以遏弦也括者矢之尾末岐而為二可以銜弦也度者立為分寸使可以凖望以求正鵠之所在故必待其尺寸之實故力始可發也虞者度也入聲往者矢尚在弦未離弩臂之上也為其目力已注乎機即為往也欽厥止者弩人虞度機牙之時也所止已定則率祖而行以釋矢于弦者也釋者發機激矢之時也揚子曰奠而後發發必中矣後漢愍王寵善弩射十發十中中皆同處李賢注曰寵射祕法曰三微為經三小為緯經緯相將萬勝之方然要在機牙案此即三微三小者其措矢之分寸也目之所注有分寸可凖則矢之所發必無毫釐或差弓弩蓋一律也夫惟有分寸可凖則虞度所施正在擬發未發之間矣三微三小分寸在弦而十發十中往必中鵠以機牙之分寸必與正鵠分寸相對也目注乎此而擬度及彼是為往省也什一稅夏商周賦助徹實皆十取其一魯哀公曰二吾猶不足則十二矣秦始皇多事征戍繁重橫加役取董仲舒曰一嵗力役三十倍於古田租口賦鹽鐵之利二十倍於古至班固食貨志總言其凡則又曰收泰半之賦泰半者三分取二也三分取二則又加於一半矣而亦未至三十其倍不知二者孰為的數也髙祖既定天下約法三章省禁輕田租什五而稅一則比十一之法既已加輕矣文帝因朝錯入粟之策行之數年邊積饒衍遂下詔賜民十二年租稅之半其曰賜半者此一年內當輸一斗者止輸五升是為官賜其年半額也明年又遂除民田之租稅此之謂除則并與當輸一斗之類全免不收矣然此之除減皆是立髙帝十五稅一以為之則而為除減之數焉耳後至孝景二年令民半出田租則是於髙帝所立之額正減其半如髙帝時應輸一斗者嵗嵗常減五升而所取益以輕少矣史家計定其數則曰三十而稅一也三十而稅一是從古者十一之法而三分免二若引而上之以比古法則當輸三斗者止取一斗也民間種田三十畝止收一畝而入之官也漢家賦稅之類至此乃始定為三十取一也中更王莽額固加重然東漢奉行宣帝之法不敢增改也為其減改太多故遇國家有事遂不免停減吏俸以資邊費所是仲長統約其中而論之曰二十稅一名之曰貉况三十稅一乎夫薄吏俸以豐軍用事緣於秦漢承其業遂不改更也據仲氏此論是云取之太輕故所入不供所出而至於鐫吏俸以補用非中制也孟子之論十一曰重於十一者大桀小桀也輕於十一者大貊小貊也反覆究論則十一為天下中正不刋之論也洛陽橋泉州北二十里有溪溪通海每潮來人輒病涉蔡端明君謨守泉時伐石跨溪而橋知潮力豪大徒柱不能勝遂出新意絫石以為壯趾其制中間濶兩頭鋭鋭故不與潮鬭濶故能勝鋪架也橋成蔡公自書橋旁石曰萬安渡橋而又别為一記以載首末今猶巋然矣然蔡公自命為萬安而土人以及它方皆以洛陽冠名於是橋實在閩而名以洛陽見者多不解或曰洛客有經此橋者樂其山水寬敞有似洛陽故以名此恐不然也閩固多山然投南而至興化以及泉南則平夷之地甚多此地雖濶不能廣於它處何以獨擅洛陽之名耶豫案元和郡縣志洛陽天津橋本維舟為梁後以洛漲壞船觀十四年始令石工纍石為腳則是不止用獨石為柱而絫衆石以為之趾趾濶而力厚即萬安橋之所取則也矣然則橋名洛陽其必以此之絫趾也哉注疏箋傳後世之名注疏者先列本文於上而著其所見於下其曰注者言本文如水之源而其派流之所分注如下文所言也至其曰疏者則舉注而條列之其倫理得以疏通也若夫古之傳書者則不然矣於本文隱奧之義則立説以發明之雖不正指本語而本語意度自昭也爾雅之於詩孟子七篇子思中庸之於論語實注疏也而未嘗合為一書於是引出己名以名其著列莊亢尹之於五千言亦猶是也漢興文帝時有申公詩武帝時有孔安國尚書有淮南王離騷傳則正為之説以解釋本文矣而亦未名為注也左氏之傳春秋也附經立文其體真注疏矣然先時亦未嘗合二為一也至劉歆大好其書乃始各附所傳於正經之下故班固傳之曰初左氏多古字古言學者傳訓詁而已及歆治左氏引傳文以解經然後轉相發明也則凡今附注於本文之下者殆自歆始也歆之移書亦嘗舉時論而隨折之矣曰謂左氏為不傳春秋豈不哀哉案此則知班固所書其得實矣周易十翼者文言亦其一也今惟乾坤兩卦附著文言於下而它卦之有文言者則聚著繫辭不附本卦也凡為此者實王弼也此蓋古則之在而可證者也鄭康成之釋詩也别為注文附毛公之下而自名其語曰箋崔豹古今注曰毛公嘗為康成鄉州太守故康成不敢與之齒躐而以箋為言箋猶箋也與箋記之箋同也此説迂也古無紙專用簡牘簡則以竹為之牘則以木為之康成每條自出己説别以片竹書之而列毛傳之傍故特名鄭氏箋者明此箋之語已實言之也演繁露卷五
