body:
  text: 演繁露卷六宋程大昌撰博博古固有之然而隨世更易制多不同予前本合晉宋數事而附摴蒱經立為之説皆可傳無忤矣李賢注後漢梁魯傳所引諸書格範則與晉宋所傳不同其説曰楚辭曰昆蔽象棊有六博王逸注云投六著行六棊故云六博此即已與劉裕挼五木者異矣賢又引鮑宏博經曰用十二棊六棊白六棊黒所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黒一邊不刻者五塞之間謂之五塞案此以刻畫多少為采名而無犢雉之象又與劉裕諸人所用不同殆是隨人各出意變無定格也摴蒱傳者孔老皆嘗言之而摴蒱之名至晉始著不知起於何代要其流𣲖必自博出也博用六子楚辭謂之六博而説文以為用六箸十二棊故數繫於六也至摴蒱則所用者五子而已其初刻木為之劉裕挼喝五木使之成盧則其子用木而五也摴蒱乆廢不行予在泉南傳得摴蒱經不書作者姓名然而五木形制齒數具在用劉毅傳所著盧雉之語㑹合而言之粗亦可攷然其説多自相矛盾推説不通詳求其用則專施之打馬則是此書之作殆出於變格打馬之後耶故與史語多不合也葛洪不曉棊道不識摴蒱齒數予之拙固與洪似矣而古事之與摴蒱相闗者多如盧白梟雉勝負之訣皆隠其中茍以素所不嗜而棄之不言則古事暗昧故隨見以書非明博也明古也投五木瓊橩玖骰博之流為摴蒱為握槊即雙陸也為呼博為酒令體製雖不全同而行塞勝負取决於投則一理也蔡澤説范睢曰博者或欲大投班固奕指曰博懸於投不必在行投者擲也桓𤣥曰劉毅摴蒱一擲百萬皆以投擲為名也古惟斵木為子一具凡五子故名五木後世轉而用石用玉用象用骨故列子之謂投瓊律文之謂出玖凡瓊與玖皆玊名也葢謂蒲者借美名以命之未必真甞用玊也御覧載繁欽威儀箴曰其有退朝偃息閒居操橩弄棊文局摴蒱言不及義勝負是圗注云橩瞿營反博子也橩之讀與瓊同其字仍自從木知其初制本以木為質也唐世則鏤骨為竅朱墨雜塗數以為采亦有出意為巧者取相思紅子納寘竅中使其色明現而易見故温飛卿艷詞曰玲瓏骰子安紅豆入骨相思知也無凡此二者即今世通名骰子也本書為投後轉呼為頭北史周文命丞郎擲摴蒱頭則昔云投者遂轉為頭矣頭者總首之義本文詳見此後采下自鏤骨為骰以後不惟五木舊制堙沒不傳而字直為骰不復為投矣若其體制又全與用木時殊異矣方其用木也五子之形兩頭尖鋭中間平廣狀似今之杏仁惟其尖鋭故可轉躍惟其平廣故可以鏤采也凡一子悉為兩面其一面塗黒黒之上畫牛犢以為之章犢者牛子也一面塗白白之上即畫雉雉者野雞也凡投子者五皆現黒則其名盧盧者黒也言五子皆黒也五黒皆現則五犢隨現從可知矣此在摴蒱為最高之采挼木為擲往往叱喝使致其極故亦名呼盧也其次五子四黒而一白則是四犢一雉則其采名雉用以比盧降一等矣見晉傳詳在後篇自此而降白黒相雜每每不同故或名為梟即鄧艾言云六搏得梟者勝也或名為犍居言切謂五木十擲輒犍非其人不能是也見御覽凡此采名摴蒱經雖皆枚載然反覆推較率多駮而不通也詳别出至於骰子之制固知祖襲五木然而詳畧大率不同也五木止有兩面骰子則有六面故骰子著齒自一至六為采亦益多率其大而言之則是裁去五木兩頭尖鋭而蹙長為方既有六面又著六數不比五木但有白黒兩面矣五木之制至晉世猶復用木然列子已言投瓊則周末已嘗改玊骨也耶或者形製仍同五木而質已用玊石也今世蜀地織綾其文有兩尾尖削而中間寛廣者既不象花亦非禽獸乃遂名為摴蒱豈古制流於機織至此尚存也耶采采本是采色之采指其文以言也如黒白之以色别雉犢之以物别皆采也投得何色其中程者勝因遂名之為采今俗語凡事小而幸得者皆以采名之義葢起此也此正班固所譏謂懸於投而不屬乎其人之有德者也齊書李安民與明帝摴蒱五擲皆盧帝大驚曰卿面方如田封侯相也言其投而得雋非一時幸中也此言相有福也後周王思政在同州與太祖摴蒱大出衣寶約擲盧者與之思政斂容跪誓願得成盧已果得盧又北史梁主蕭詧曾獻瑪腦鍾周文帝執之顧丞郎曰能擲摴蒱頭得盧者便與鍾已經數人不得至薛端乃執摴蒲頭而言曰非為此鍾可貴但思露其誠耳擲之五子皆黒文帝即以與之用此而言則得雋而名以為采其來尚矣盧雉自有骰子以後摴蒱尖長之子遂廢閣不用凡古書古事語及摴蒱者其名數遂不可曉雖非要事要之闕所不知終是懐慊也摴蒱經也者據其所見立為之書有意乎追補亡矣然古摴蒱事在史而詳者惟劉毅傳為著舉此之經語以與毅傳相較則此書所載不能與之諧合也故知其傳不古也晉書劉毅傳曰毅於東府聚摴蒱大擲一判應至數百萬餘人並黒犢以還惟劉裕及劉毅次擲得雉大喜此言衆人先毅而擲已有得犢者矣而五木未至純盧也次傳及毅則遂得雉雉者四黒而一白夫四黒而一白其采名為雉也褰衣繞牀叫謂同座曰非不能盧不事此耳雉次於盧盧高於雉雉亦高於它采既不得雉冀它人不能及故大為之言曰非不能盧直不為耳裕惡之因挼五木乆之曰老兄試為卿答既而四子皆黒其一子轉躍未定裕厲聲喝之即成盧焉四子皆黒其餘一子若不得黒即必現白如又現白即是四黒一白采當為雉矣裕若得雉即不能勝毅故一子之轉躍未定者裕遂厲聲喝之使現黒采也黒采既現即五子皆黒遂可以成其為盧也盧現而雉自降等故毅怨裕不肯相借也哉毅意不快曰亦知公不能以此見借也用毅傳所記以求晉世之樗蒲采名齒數予之前説悉與之合也劉裕所得之盧是五子之半面為黑者皆現乎上而五子之半為白者皆藏於下俯仰合計則五子通為十面半白半黑具足無欠而五木之齒數亦相應協無欠無餘矣自斯以徃黑白兩面交致其雜亦隨齒立名而不出乎白黑兩面是皆有數可數故亦有象可畫矣今此經所繪白黒遂有不可推較者失在誤添純白純黑兩色故其説不與史合耳今先列舊圖而後别立新畫貴其易暁樗蒲經舊畫只有四木四木者博子四箇也不是一木簇為四角古蒲子皆言五木故知舊經誤畫今定新畫係用五木五木者木投凡五箇也若本晉傳而求之則五黒者五子固皆為黑而黑上皆畫為犢無有純黒而不為犢形者也五白者五子皆白白者畫雉無有純白而不為雉形者也於是合而言之其陽能現五犢則其隂必藏五雉二五為十而五子之十面無欠無餘推之而皆可通矣今舊圖之於五黒也以其三畫犢以其二純黑則是五子之十面者以其半為純黑以其半為黑犢乃可應數不知十面皆黑安得别有一白越自外來而間乎四黒之間可以命之為雉也耶若毎子皆有四面兩面有文黒上畫犢白上畫雉兩面無文純白不畫雉純黒不畫犢且以劉裕所投言之四黑已見其一白若專是白而上無畫雉之文則此之一白而間五黑何以得名為雉也凡此皆推而不通今故别為之圖而正樗經之誤使史語明白五白梟犍老杜今夕行曰馮陵大叫呼五白袒跣不肯成梟盧觀其意脉正用劉毅事而五白非摴蒱所貴不知杜獨何據也摴蒱家謂二白三黒為犍犍惡齒也御覽曰六博五擲皆犍不為不能則知犍為惡齒也梟名甚多鄧艾曰六博得梟者勝此艾因牙上有梟姑為安衆之言耳韓子曰儒何以不好博勝者必殺梟是殺其所貴也儒者以為害義故不博据此言之則梟固為善齒而殺梟者又當得雋則梟之采品甚低非盧比也老杜槩言梟盧亦恐未詳長短句魏晉唐郊廟歌率多四字為句唐曲在者如柳枝竹枝欵乃句皆七字不知當時歌唱用何為調也張華表曰漢氏所用文句長短不齊則今人以歌曲為長短句者本張華所陳也通典樂門角通典樂門蚩尤帥魑魅與黄帝戰帝乃命吹角為龍吟以禦之其後魏武北征烏桓減為半鳴而尤更悲矣胡角者本以應胡笳之聲後漸用之横吹有雙角即胡樂也張騫入西域傳其法於西京後漢以給邊將和帝時萬人將軍得之皷吹後魏永熙中諸州鎮各給鼓吹人多少各以大小等級為差諸王為州皆給鼓吹其等以赤青黒色為次中州刺史及諸鎮戍皆給之佛牙世之尊佛而主其異者其説曰華夷之人生理一也此之牙骨若指其長大皆能倍常且其色紅潤與枯骨異非佛不能有此也予固不嘗見佛亦不嘗見其指骨然以古書攷之長狄僑如之死也尸載於車眉出軾上古今中國亦未嘗有此巨人矣而僑如兄弟自生及𦵏左氏皆能詳記則佛骨之比常人特為長大自其種類如此不得資之以信其怪也若以骨指紅潤為異則有見矣獸惟自病而死血不䕃骨則骨遂槁乾若非自死則其乆而紅潤者皆以瀝血不盡也人固不可試矣試以猪羊骨驗之其遭烹之骨必且紅潤而自死者必枯槁此可驗也予之執此見也非為異也而舉世信佛難為辨正有不容不辨也顧有事效見前者可以證予説之非妄也五代史趙鳯傳唐明宗時有西域僧得佛牙以獻明宗以示大臣鳯言世傳佛牙水火不能傷因以斧斫之應手而碎是時宮中施舎已及數千因鳯碎之乃止此與傅奕用羚羊角擊金剛石者正同一驗也世人尊佛太甚但有一人倡言是佛俗子萬衆擎跽畏敬傾家以施焚肌以禮安有敢證其謬者况敢出意自言以斧石試擊之耶故其誕得行而人惑不可得觧也庚戍二月十七日夜閱趙鳯傳書此大宅黄庭經天中篇曰靈宅既清玊帝遊梁丘子注曰面為靈宅一名大宅以眉目口之所居故為宅大洞經云面為赤宅黄庭經者其書自叙云扶桑大帝傳授南嶽魏夫人也魏夫人者魏公舒女晉人也計其世皆在東漢以後特不知大洞經作於何世耳文選載枚乗七發説太子以游獵之可樂而太子陽氣見於眉宇之間侵淫而上滿於大宅也既曰陽氣自眉宇而上滿於大宅即必在眉兩間矣以李善之博而不詳大宅所出惟五臣注劉良曰大宅面也亦不言得之何書也良若嘗見大洞經亦必引以為據矣不言所本則意度之耳然則枚乗之在漢世豈嘗已見道書而知名面以為大宅耶烏鬼元稹集十三聽庾及之彈烏夜啼引曰四五年前作拾遺謫官詔下吏遣驅身作拘囚妻在逺歸来相見淚如珠惟説閒宵長拜烏君來到舎是烏力妝㸃烏盤邀女巫當時為我賽烏人死𦵏咸陽原上地案稹此詩即是其妻為稹賽烏而得還家者則唐人祀賽烏鬼有自來矣樂營將弟子開元二年𤣥宗以太常禮樂之司不應典優倡雜樂乃更置左古教坊以教俗樂命左右驍衛將軍范及為之使又選樂工數百人自教法曲於棃園謂之皇帝棃園弟子至今謂優女為弟子命伶魁為樂營將者此其始也通典二百十一白屋春秋莊公丹桓宮楹非禮也在禮楹天子丹諸侯黝堊大夫蒼士黈黈黄色也案此即自士以上屋楹方許循等級用采色庶人則不許夫是以謂為白屋也後世諸王皆朱其邸今世凡官寺皆施朱存古也南史有隠士多遊王門或譏之答曰諸君以為朱門貧道如遊蓬戸又主父偃曰士或起白屋而致三公顔師古曰以白茅覆屋非也古者宮室有度官不及數則屋室皆露本材不容僣施采畫是為白屋也已是故山楶藻棁丹楹刻桷以諸侯大夫而越等用之猶見譏誚則庻人之家其屋安得不白也白茅覆屋古無其傳也後世諸侯王及逹官所居之屋皆飾以朱故既曰朱門又曰朱邸也言朱以别於白也鹽鐡論文學譏漢俗奢僣曰雖白屋草廬歌謳鼓琴日給月殫朝樂暮戚金鋪風俗通義門戸鋪首昔公輸班見水中蠡引閉其戸終不可開遂象之立於門戸案今門上排立而突起者公輸班所飾之蠡也義訓曰門飾金謂之鋪鋪謂之鏂鏂音歐今俗謂之浮漚釘也案此漚者水上浮漚狀亦類蠡也南史人借雀以行嘲謔曰誰家屋門頭鋪首浪遊逸六纛御覽三百三十九曰纛六口大將中營建出引六軍古者天子六軍諸侯三軍今天子十二諸侯六軍故有六纛以總軍衆案此即凡今詞人語建節者云植六纛皆本此也渹世説劉真長見王丞相盛暑之月丞相以腹熨彈棊局曰如何乃渹劉既出人問王公何如曰未見它異惟聞吳語案玊篇曰渹音虚觥反水石聲也腹熨棊局水石之聲非所言也今鄉俗狀凉冷之狀者曰冷渹渹即真長之謂吳語也乎臘鼓湖州土風嵗十二月人家多設鼓而亂撾之晝夜不停至來年正月半乃止問其所本無能知者但相傳云此名打耗打耗云者言警去鬼祟也世説禰衡作漁陽蹀躞而前正是正月十五案時而言此説近之矣然其撾擊不待正月又似不相應也摶黍或論仁人明道不計功曰人有能輕摶黍者不能無意於百金有能輕百金者不能無意於拱璧數以摶黍問人人無知者吕氏春秋曰余以百金與摶黍以示兒子兒子必取摶黍也以和氏之璧與百金以示鄙人鄙人必取百金矣論葢取此語以為之據也特牲饋食禮曰佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人又禰衡在黄祖坐上黍臛至衡先自飽食畢摶以戲弄祖怒其戲謾此即摶黍也並見御覽八百四十一或以為摶黍黄鳥也王介甫詩云蕭蕭摶黍聲中日漠漠舂鋤影外天説者謂舂鋤白鷺也以鷺對鶯也但不知摶黍之為黄鶯何出耳平始予聞蜀興州有殺金平其名已古予嘗問人何以名曰山之名平者所在有之不止此處也予後至昌化縣過一山其下甚峻至頂而平夷名走馬平乃知平之為義葢如此後又讀道書太上太霄琅書有曰尸解者不棺不槨拂山平之上掃深樹之下衾覆於地則山平之名其來乆矣李白墓采石江之南岸田畈間有墓世傳為李白𦵏所累甓圍之其墳畧可高三尺許前有小祠堂甚草草中繪白像布袍裹輭脚幞頭不知其傳真否也白嘗供奉翰林終不曾得官則所衣白袍是矣范傳正作白碑曰白之孫女言曰嘗殯龍山之東麓墳髙三尺傳正時為宣歙觀察使諭當塗令諸葛縱改𦵏于青山則在舊瘞之東六里矣其時元和十二年也然則龍山青山兩地皆著白墳亦有實矣至謂白以捉月自投于江則傳者誤也曾鞏曰范傳正志白墓稱白偶乗扁舟一日千里白之歌詩亦自云如此或者因其豪逸又嘗草瘞江邊乃飾為此説耳正史及范碑皆無捉月事則可證矣景鍾徽宗崇寧四年鑄景鍾大晟樂書具載其制曰景鍾垂則為鍾仰則為鼎鼎之中大為九斛中聲所極九數退藏則八斛有一焉至其律度在崇寧則用徽宗君指中節以為三寸三三而九推展用之紹興十六年四月再鑄景鍾有司上崇寧指法六月詔大晟樂書并金字牙尺令參用之段拂等契勘若要退藏數在鍾内又高九尺則中容可二十斛不與八斛有一之數相應照得金字牙尺用皇祐中黍尺㸃量到太常寺見存黄鍾律編鍾一顆正高九寸故依此絫及九尺隨宜製造詔亦可之予案大晟樂之用君指正為古今尺度不同無可執據遂援黄帝之指尺與夫大禹之身度而用徽宗皇帝御指以為一寸之始今拂等所定却是用太常見存九寸之鍾與皇祐黍尺參用以為起度之本是元不曾用人主君指為則也演繁露卷六
