body:
  text: 演繁露卷二宋程大昌撰牙旗牙門旗鼓大將所建牙旗劉馮事始兼載兩義其一謂以象牙飾旗其一謂以爪牙為義然終無的據御覽三百三十九至其所引兵書則曰牙旗者將軍之精凡始建牙必以制日制日者其辰之在五行以上尅下之日也又引尚書曰門旗二口色紅八幅大將牙門之旗出引將前軍列又引黄帝出軍訣曰牙旗者將軍之精金鼓者將軍之氣又引後漢書光武徇河北収韓歆置鼔下將斬之注云中將軍最尊自執旗皷若置營則立旗以為軍門并設皷戮人必於其下合此數者言之則軍門對立兩旗是為牙旗其已審矣特不知真設以牙邪或止取爪牙以為義也真人水鏡經曰周禮司常職云軍旅㑹同置旌門夫以旌為門即旗門也此其説有本也後世軍中遂置牙門將郭子儀李光弼在朔方皆嘗為之魏博特置驍鋭可倚仗者使為䕶衛名為牙兵而典總此兵者其結銜名為押衙至於官府早晩軍吏兩謁亦名為衙宇文化及為秦王浩丞相於帳中端坐白事者黙然不應下牙時方収啓狀與張愷參决之則是以朝晡而集為牙也呼為既熟雖天子正殿兵衛受朝謁亦名正衙當是因牙門之義展轉以為此名也黄帝出軍曰有所征伐作五采牙幢青牙旗引住東赤牙旗引住南白牙旗引住西黒牙旗引住北黄牙旗引住中是凡大將行住不以何地皆有牙旗隨之不止軍門有二牙旗也魏志曰典韋為張邈士牙門長大衆莫能勝韋一手建之此即牙門大旗矣呉志陸遜討費棧以兵少乃益施牙幢分布皷角賊即破散既云益施牙幢則不止二旗矣凡滕輔袁宏顧愷之陳子昻皆有祭牙禡牙文其所謂牙即牙旗也再詳此義恐旗有飾牙之理蓋既不専以門旗為牙旗而五方之旗皆名為牙恐欲重其體故飾之以牙也耶詩之象齒五輅之象輅其為用象亦已久矣筌蹄笱得兔者忘蹄得魚者忘筌筌與蹄世人習聞其名而不能察其果為何物也戰國策魏魀謂建信君曰人有置係蹄者而得虎虎怒决蹯而走虎非不愛其蹯也不以環寸之蹯而害七尺之軀然則蹯也者其虎足之爪或指也歟故曰環寸也言其圍一寸也唐韻曰蹯獸足也左氏胹熊蹯不熟蹯即熊掌也係蹄者以繩為機縻繫其蹄也决蹯者知其縻繫不可復解故自剔去其足魏魀之謂如人遭蝮螫而自㫁其腕者也以類求之則蹄者亦設繩以縻也歟筌者魚笱也出廣韻笱者以竹為器設逆鬚於其口魚可入不可出也文選有㝠筌李善曰取魚之器也詩曰寡婦之笱又曰敝笱在梁又曰毋逝我梁毋發我笱蓋横溪為梁梁傍開缺透水而設笱以承其下魚墮梁已即覺水淺急趨旁闕以求入溪既入即陷笱中見者發笱而取之也相戒毋發我笱者懼其發取巳獲之魚也几几與案自是兩物几者坐具也曲木附身以自捧抱故釋名曰几也所以物者也其音軌其義則閣也漢武内傳帝受王母真經黄金之几是以几而貯閣經文也鄴中記曰石虎所坐几悉彫畫為五色花則几者所以坐也非案類也語林曰孫馮翊徃見任元褒門吏憑几見之孫請任推此吏吏曰得罰體痛以横木扶持非憑几也孫曰直木横施植其兩足便為憑几何必狐蹯鵠膝曲木抱腰用此推之則几之形象可想大率如今之胡床頂施曲木而俗以抱身交床名之是其象矣第古無繩床既為坐具必是施板竹林七賢論曰阮籍在袁孝尼家醉起扶書几板為文王逸少見門生家棐几滑浄因書真草其父刮去是皆有板可書也孟子隱几而卧南郭子綦隠几而坐㗳然似喪其耦皆其事也必以几閣其手故得以寄其逸也若周禮玊几漆几用材設飾則有别若其形制無二也石蜜太平御覽異物志曰交趾甘滋大者數寸煎之凝如氷破如博棊謂之石蜜涼州異物志曰石蜜之滋甜於浮萍非石之類假石之名實出甘柘變而凝輕注云甘柘似竹煮而曝之則凝如石而甚輕又魏文帝詔曰南方龍眼茘枝寧比西國蒲萄石蜜合此數説觀之既曰柘漿所凝其狀如氷而名又為石則今之糖霜是矣又有崖蜜者蜂之釀蜜即峻崖懸寘其窠使人不可攀取也而人之用智者伺其窠蜜成熟用長竿繫木桶度可相及則以竿刺窠窠破蜜注桶中是名崖蜜也䕶駕六典侍中䕶駕又左補闕掌扈從乘輿扈即䕶也近説引相如賦扈從横行出乎四校之中則失之矣師古曰扈跋扈也言其驍勇不循行列而自跋扈行乎四校之外也不専以䕶衛為義也盂東方朔傳置守宫盂下注盂食器也若而大今之所謂盂也音撥今僧家名其食鉢為鉢則中國古有此名而佛徒用之耳紫泥封詔漢朝中書以武都紫泥為璽室加緑緹其上案此即是紫泥渾裹其匣而泥匣之外更加緑緹也漢趙皇后傳曰中黄門田客持詔記盛緑緹方底封御史中丞記其曰方底即詔函矣紫泥所封即方底之函矣函外又以緑緹封裹之也御史中丞記即謂中約書者是矣約書云者約結也以繩或帶結封而書字其上也即封緘也車渠尚書大傳曰散宜生輩之江淮之浦取大貝如車渠陳於紂庭然則車渠非大貝也特貝之大者可比車渠耳不知車渠又何物也御覽六百四十七車者車也渠者轍迹也孟子謂城門之軌者是也霞帔唐睿宗召司馬承禎問道遂賜絳霞紅帔以還公卿賦詩送之今世之謂霞帔者殆起此耶出實賓録二十五牛衣王章卧牛衣中注龍具也龍具之制不知何若案食貨志董仲舒曰貧民常衣牛馬之衣而食犬彘之食然則牛衣者編草使暖以被牛體蓋簑衣之類也玊巵無當韓子曰堂谿空見昭侯曰今有玊巵無當瓦器有當君渇將何以曰以瓦器空曰為人主漏泄羣臣之語猶玊巵無當也昭侯於是每與空話事歸輒獨卧惟恐漏言於妻妾也案左思賦嘗引玊巵無當以譏揚雄而曰假言珍怪如玊巵無當而巵當之為何物無有能言者今以韓子求之則當者底也當平聲以玊為巵信美矣而其下無底則水漿迸散不若瓦器有當乃為適於用也御覽以華陽隠居代名花書陶隠居以諸王侍讀解職遂自稱華陽隠居書疏亦以此代名出太平廣記國初人簡牘徃來其前起語處皆書名後結語處即以花書代名不再出名也花書云者自書其名而走筆成妍狀如花葩也中書舎人六員凡書敕雜列其名濃淡相間故名為六花判事花書之起其必始此矣韋陟書名如五朶雲亦其事也王介甫當神宗正眷注時其書石字為口人皆效之故時人嘲之曰表徳皆聮甫花書盡帯圏蓋有以也馬纓建隆元年涇州都校李玊謀害節使白重贊先遣人市馬纓一即偽造制書云重贊謀逆令夷其族謂都校陳延正曰使人致此去矣上聞大驚鞠之玊棄市又李飛雄竊得馬纓遂詐稱詔斬邊帥人初亦信之即知馬纓者使人用以為驗也新築人請繁纓以朝即此也今州郡惟帥臣乘馬乃始有纓建康有之他帥不製也坫論語反坫也者乃是藉爵之器兩邦君酬酢飲已而反置爵其上是名為坫也沈存中記國初人有用反坫為屏者沈以為誤為其下文又有塞門塞門屏也不應重以屏出也案許氏説文云坫屏也不知許氏别有據否亦恐許誤六帖白樂天作類書名六帖通典選舉門載唐制曰開元中舉行課試之法帖經者以所習經掩其兩端中間惟開一行裁紙為帖凡帖三字隨時増損可否不一或得四得五得六者為通此六帖之名所從起也六帖云者取中得之數以名其書期於必遂中選也古每一官别鑄印孔琳之當亘元時建議曰古者皇王傳國之璽及公侯襲封之印皆奕世傳用無取改作今世惟尉之一職獨用一印至於内外羣臣每遷悉改終年刻鑄金銀銅炭之費不可勝言愚請衆官印即用一印無煩改作本傳十七神道李廣傳丞相李蔡得賜冢地盜取三頃賣之又盜取神道外壖地一畆葬其中世之言神道者始此西漢二十四又霍光塋起三土闕築神道神道言神行之道也長安志弮司馬遷言李陵矢盡道窮士張空拳文頴曰拳弓弩拳也師古曰拳音弮與絭同弮絭音皆去權反又陵傳陵連發弩射單于張晏曰三十絭共一臂案絭是弩弦張之則滿臂即弩樁也空弮言上弦使滿而無矢可射承上矢盡為文也西漢十四犦槊宋景文筆記曰宣獻宋公著鹵簿記至犦槊不能得其義予後十餘年始得之其説曰江左有瓝槊為其首大如瓝是其義也按字書㼎小𤓰也蒲卓反字或為瓝同一音也予案爾雅犦牛犎牛也此獸抵觸百獸無敢當者故金吾仗刻犦牛於槊首以碧油囊籠之荆楚嵗時記所説亦與爾雅同今金吾仗以犦槊為第一隊則是犦槊云者刻犎牛於槊首也他説皆非也五馬太守五馬莫知的據古樂府五馬立躊蹰即其來已久或言詩有良馬五之侯國事也然上言良馬四之下言良馬六之則或四或六元非定制也漢有駟馬車正用四馬而鄭𤣥注詩曰周禮州長建旟漢太守比州長法御五馬𤣥以州長比方漢州大小相絶逺矣周之州乃反統𨽻於縣比漢太守品秩殊不侔不足為據然鄭後漢時人則太守之用五馬後漢已然矣至唐白樂天和深春二十詩曰五匹鳴珂馬雙輪畫㦸車至其自杭分司有詩曰錢塘五馬留三匹還擬騎來攪擾春老杜亦曰使君五馬一馬驄則是真有五馬矣若其制之所始則未有知者鶻突師友談紀云錢穆父尹開封剖决無滯東坡朝次譽為霹靂手穆父曰敢云霹靂手且免鶻鷺蹄即俳優以為鶻突者也鶻突者胡塗之反也殷芸小説曰孫邕醇粹有素魏武帝初置侍中舉者不中選遂下令曰吾侍中欲得渾沌渾沌氏古之賢人也於是臣下方悟遂舉邕帝大悦此語著於釋稗釋稗訓之曰世俗之俳言也鶻者渾之入突者暾之入渾者渾之去沌者暾之去也用此言觀之則謂愚無分别名為鶻突由來古矣釋稗不書名氏其書引王介父解義即近世人也或作陸農師絲杉霍光傳師古曰爾雅毛詩傳皆云樅木則松葉栢身栝木則栢葉松身按栢葉松身乃今俗呼為絲杉者也虚封建安二十年曹操專封拜始置名號侯至五大夫與舊列侯關内侯凡六等以賞軍功新置皆不食租虞松之曰今之虚封蓋始於此萱草詩曰焉得諼草言樹之背注直以諼為萱草詩永矢弗諼諼訓為忘故曰永誓不忘也又凡字必從其類而萱當從草今特舎草從言義皆可疑後見許氏説文萱之字從草憲又作萱作蕿俱以况袁為飜切乃知古詩字本作蕿自唐明皇改古文代以今字乃訛蕿為諼耳碑生金晉語云墓碑生金庾氏大忌初不曉生金為何等語案呉淑事類賦引魏志曰繁昌縣授禪碑中生金表送上羣臣盡賀王隠晉書曰永嘉初陳國項縣賈逵石碑中生金人盜鑿取以賣賣已復生此江東之瑞也其曰瑞者晉為金行故金生為祥元帝中興其應也据此而言則碑中誠生黄金矣亦異事哉牙盤唐少府監御饌器用九飣食以牙盤九枚裝食味於上置上前亦謂之看食據此即是以牙飾盤矣問之今世上食止是髹盤亦不飾牙鐐鑪談苑載鐐鑪曰鐐者白金也意謂以白金飾爐也是固有本矣然恐語訛耳爾雅云烘燎煁烓也烘謂燒燎也煁今之三隅竈也然則烓者無釡之竈其上燃火謂之烘本為此竈止以燃火照物若今之生麻籶音身盆也然則鐐鑪亦不為鐐當為燎爐耳燭儀禮之燕禮曰宵則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭閽人為大燭於門外鄭𤣥注曰燭燋也甸人掌供薪蒸者庭大燭為位廣也閽人門人也為作也作大燭以俟賓客之出也古燭未知用蠟直以薪蒸即是燒柴取明耳亦或剥樺皮爇之亦已精矣然曲禮曰燭不見跋則是必有質可篸乃始有跋耳曲禮或是有蠟燭後從其所見而言之耶答人問九江説前䝉疑諭九江曲折冗久不報當不訝否某之論禹貢也疑則傳疑初未嘗敢確主其見也進本於發語中已著此意至於九江非今江州固嘗明言之矣顧經文關及九江者多悉是經中大節目若不姑據古傳以奠其地則凡經文中語及九江者無所指以致其辭故姑從古傳言之不謂確不可易也春秋所書尚分見聞傳聞為三歐公亦不敢全廢漢儒之説而遂設為之喻曰村疃有火州人數日乃始聞之不如其邑人翌日聞之之未遠也縣聞雖近又不如其鄰人登時親見之審也秦以今淮南為九江漢以今江州為九江皆非鄰人親見之審矣然由今日眎秦漢如以州人而言縣事又不如姑仍縣人之言尚或可據也若舎之不用别擬一水以名九江是似州人强破邑傳或時却成薦誤所不敢安也漢去古不逺已不知九江所奠矣劉歆遂指彭蠡以為九江凡今名江州以為九江郡皆始於歆然歴世不肯主信者以匯即彭蠡也匯與彭蠡經既以三江名之不應添出一名謂為九江也夫三江者南中北相參為三是尚可應塞三數矣若九之為九其名何自而起耶故王莽雖采歆説以此名郡而後世不肯主信者為其本無的據也若其指洞庭為九江則自胡旦始而鼂説之實宗師之第不肯明云其説自旦而出耳古來未嘗有為此言者也且經之言九江也如曰九江孔殷又曰過九江至于敷淺原又曰九江納錫大龜是皆因事及之猶可展轉它説矣至夫岷江原委相貫自岷山以至入海具有次第著乎經文則何可移之而它也歟經曰岷山導江東别為沱又東至于澧過九江至于東陵則是九江也者上承岷派由夔峽東注以下貫於東陵而後始㑹於匯匯者南江之與江漢合三為一之地也今江州湖口縣是其所也洞庭也者課其大派則上承瀟湘而下逕岳州以合於江而瀟湘之源皆出湖南不受蜀水也則書之岷派瀟湘不得而預也今從岳州言之岷江正在州北洞庭乃在湖南其不為一派明矣由岳州已上則兩水不相入如之何强取未嘗合流之南派而用全無古據之見剟而入之北派也今鼎沅之西固與蜀中施黔東西相距然而中隔萬山水不通流如之何而云南派可入北派也湖南固有澧水因遂置為澧州矣李吉父元和郡縣志遂取此之澧水以為岷蜀之澧故胡旦信之不疑而不知後世湖南之澧水非古梁州之澧水也此最致誤之因也旦之説曰九水入於洞庭故名以九非也漣水營水今為瀟耒水洣水漉水瀏水㵋水並水湘水是姑可枚列為九矣然而九水之外更有微水資水沅水澧水此四水者亦皆同入洞庭而同注於江則是洞庭所受者凡十三水矣不知以何為限而遂掇去四水不數也若以為上流只有九水則資之入沅時漣瀟鍾耒洣漉瀏㵋之入湘也方其初來已為九水而沅湘又為二水以九合二則十一矣其可削減十一使之為九乎若専以注湖為數則又沅湘實止二水數不及九不知何據而遂以意定之為九也蓋古人之記水派也皆摭其本名本地據實言之無有取象以為之數者也旦謂九為陽數則於治水之義絶無所附不待他人致辨胡氏亦既設辭自疑而不敢主執矣是江淮河濟命名既定則江的名江河的名河不似今世凡水皆得名江名湖也且夫漢水之大幾與岷江相敵其已大矣而其初未及入江經但稱之為漢不肯假以江名也洞庭雖大安得未㑹於江而遂破例以目為江乎而經亦無其語何可信也演繁露卷二
