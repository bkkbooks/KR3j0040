body:
  text: 演繁露卷八宋程大昌撰褐裘背子道服襦裙襦者短衫也莊子曰未解裙襦亷范傳曰昔民無襦今五袴也褐者裾垂至地張良傳有老父衣褐至良所師古曰褐制若裘今道士所服者是也裘即如今之道服也斜領交裾與今長背子畧同其異者背子開胯裘則縫合兩腋也然今世道士所服又畧與裘異裘之兩裾交相掩擁而道士則兩裾直垂也師古畧舉其槩故不能詳也長背子古無之或云近出宣政間然小説載蘇文忠禪衣襯朝服即在宣政之前矣詳今長背既與裘制大同小異而與古中單又大相似殆加減其制而為之耳中單掖下縫合而背子則離異其裾中單兩腋各有帶穴其掖而互穿之以約定裏衣至背子則既悉去其帶惟此為異也至其用以襯藉公裳則意制全是中單也今世好古而存舊者縫兩帶綴背子掖下垂而不用葢放中單之交帶也雖不以束衣而遂舒垂之欲存古也太平御覽有仙公請問經其文曰太極真人曰學道當潔浄衣服備巾褐制度名曰道之法服也巾者冠中之巾也褐者長裾通冒其外衣也巾褐皆具乃中道家法服之制今世衣直掇為道服者必本諸此也又傳授經曰老子去周左慈在魏並葛巾單裙不著褐則是直著短衫而以裙束其上不用道家法服也晉王獻之書羊欣練裙朱公叔絶交論謂西華之子冬月葛衣練裙葢古人不徒衣袴必以裙襲之是正上衣下裳之制也日受月光月不能自出光景凡其有光悉日力也揚子雲曰月未望則載魄于西既望則終魄于東其遡於日乎謂月為遡日理固該盡矣而不如沈括之語能發越其狀使聞者豁然也括之言曰月如銀圜圜本無光日耀之乃有光矣用其銀圜之説而思之則其魄也是銀圜之背日而暗者也故闇昧無覩也其明也則是其圜得日而銀彩煥溢者也月十五日兩耀相當銀圜也者通身皆受日景故全輪皆白而人以為滿也過望則月輪轉與日逺為之圜者但能偏側受照而光彩不全故其暗處遂名為魄也魄者暗也究其實致則是日光所及有全有不全而月質本無圎缺也故揚子遡日之説已得其理而沈氏耀圜之説又能發揚其狀也是説也予初得之以為括之所剏也偶讀酉陽雜爼乃知其説古嘗有之而括善加發揮焉耳雜爼之言曰太和中有人游嵩山遇修月户謂之曰君知月七寳合成乎月勢如丸其有影處乃是日爍其凸也此云修月户者必誕矣而爍凸之理即沈氏之説所從以出也若其増一銀字而明之與魄粲然有狀括其能言也哉養不吠之犬東坡上神宗書曰畜犬本以防姦不可以無姦而養不吠之犬北史宋游道傳畢義雲奏劾游道楊遵彦曰譬之畜狗本取其吠今以數吠殺之恐將來無復吠犬立乗車古者乗車皆立不坐車前横木曰軾在車遇所敬則俯身以手案式武王式箕子閭葢如此其式也惟安車乃始坐乗杜延年賜安車駟馬顔師古曰安車坐乗車是也日食加時予奉詔定乾道厯厯官劉孝榮曰後世厯法太宻於古今之論厯者太責備且如日蝕古來能知其食在何日則為驗矣而未尅定某時當食食當幾時幾分而復也至魏黄初始言食於何時予甚然之今按杜欽傳上封事曰日以戊申蝕時加未且説戍末當為何應則不待黄初已嘗加時矣恐史官失書耳物産有無汶南無鸜鵒江南無狐粤無馬虎前地志廬山人見駞以為山精潤州人見蠍以為主簿蟲州麾自五君詠言顔延之一麾出守而杜牧用其語曰擬把一麾江海去人遂以建麾為太守事張師正辨五君詠曰麾猶秉白旄以麾也一麾猶言為人之所擠排也屢薦不嘗得官一遭擠排遽出為守所以嘆也此説是也或謂周禮州長建麾則州麾自可遵用此又非也周之州絶小不得與漢州為比周制絫州成縣而漢世累縣為郡累郡乃始為州也若夫崔豹古今注則又異矣其説曰麾所以指也乗輿以黄諸公以朱刺史二千石以纁則漢以來自人主至二千石莫不有麾也則謂太守為把麾亦自可通也羽扇語林曰諸葛武侯與晉宣帝戰於渭濵乗素車著葛巾揮白羽扇指麾三軍晉書顧榮征陳敏自以羽扇麾之敏衆大潰是皆特持羽扇以自表異而令軍衆瞻求易見也晉中興徴説曰舊羽扇翮用十毛王敦始省改止用八毛其羽翮損少故飛翥不終此其兆也据此語以求其制度則是取鳥羽之白者挿扇柄中全而用之不細析也今道家繪天仙象中有秉執羽扇者皆排列全翮以致其用則制可想矣吹鞭馬融笛賦云裁以當簻便易持李善注曰簻馬䇿也裁笛以當馬簻故便易持沈括辨之曰潘岳笙賦修簻内辟言此笛但裁一簻五音皆具故曰易持也馬簻安可為馬䇿也予案急就章曰吹鞭箛篍課後先唐韻曰箛竹也説文曰篍吹筩也玉篇亦曰篍吹筩也以竹為鞭中空可吹故曰吹鞭也簻即馬䇿可以䇿馬又可為笛一物兩用軍旅之便故云易持也今行陳間皆有笛即古吹鞭之制也括豈不見急就今書而臆立此難也耶尺蠖尺蠖之屈以求信也方言曰蠀資􅠸子六反謂之尺蠖郭璞釋之曰步屈也步屈云者一步一屈也多在桑上其體質似蠶色灰褐而身瘦長其腹下両頭有足足亦如蠶每欲進步先聚屈其體前後幾相連著而脊背橋􅁸直如笄􅁫兩頭環曲之處也此其所以為屈也已屈而聚聚已而舒則遂寸寸前進是其所以為伸也吾鄉俗呼度音鐸蟲度者蠖音之訛也爾雅曰尺蠖説文則曰曲信蟲韓集城南聨句曰桑蠖虚指皆可互相發明也土部魚説苑二卷曰莊周貸粟於魏文侯曰周之來見道傍牛蹄中有鮒魚焉得斗升之水斯活矣鮒今俗名土部葢聲訛也此魚質沉常附土而行不似它魚浮水遊逝也故曰土附也顧後人加魚去部則書以為鮒焉耳説苑之謂牛蹄者牛足踐泥泥之為窪窪中水停不通故此魚附著亦不能去若得斗升之水則可它適而活也諺言涔蹄之水不容吞舟之魚正舉此以為之況也吳興人名此魚即云鱸鯉以其質圎而長與黒蠡相似而其鱗斑駮又似鱸魚故兩喻而兼言之也埤雅指為鯽魚失之矣易漢武帝棄輪臺詔曰匃奴縛馬城下易之卦得大過爻有九五案此之謂爻在九五者言大過為所得之卦而九五為用事之爻也九五之繇曰枯楊生華何可乆也故縛馬一事筮史主此一語以為吉㓙之决而曰匃奴困敗不乆也其謂爻在九五者葢主九五一爻為用也然而卦得大過自初至四以及乎六皆不為用而獨九五一爻為用者易法以變者為占在一卦之中何爻適當變初則此之一卦獨主此之一爻也然則何以見其獨變也曰予於易原嘗詳及之矣大過之卦其初爻為偶此之為偶必其揲蓍而必得八八固不變矣及其二三四爻皆為竒則其揲蓍必得七七亦不變也更四爻揲而及五爻則其蓍為九而不為七矣易法九六必變而此之第五爻者在四爻不變之後剏初得九故此爻當為變始也是為用事之爻也若此之五爻既已得九之後九已當變則其爻為用事之爻矣若後來第六爻便更正得六數亦止仍為上六不為上九故爻既遇變後來不復再變也此乃通易一書占筮凢例類皆如此故詳及之若夫九五也者既當變九為六則其以此之變而㑹之六爻則大過之卦轉而為常矣案大過巽下兊上恒則巽下震上葢大過第五爻得九而變為六於是大過九五既變為恒之六五則正卦猶為大過而之卦則遂以為恒也今此漢詔獨言大過而不及恒者武帝方擿占者之不驗故但即大過九五以言而未暇談及恒之六五也非有變爻而無之卦也龍門秦再思記異録曰地誌慈州文城縣搔口本夏禹鑿山通河年年魚化之地也每春大魚並河西上唐人嘗敕禁采捕至仲春後有㸃額不化者傍岸求死終不過富平津浮梁孟州嵗以致貢栁宗元嘗為文刻置禹廟此葢因地之有是魚而禹貢又有龍門之文遂從而為之説曰過門者為龍而其浮死自下者則是不能變化而遭退者也予疑此語乆矣於禹貢論不敢辨正者以龍門之名其來已古而化龍之説世亦信之故付之不辨然終含糊不快也以書類求之導洛自熊耳熊耳者地書以為形似熊耳也其曰似者肖之而已豈其實嘗有熊分耳為山也乎砥柱析城實皆如柱如城而何人建為此柱析為此城無有能言其自者也並類而言則夫龍門也者正以湍峻束狹意象如門而又龍者水行之物故取象以名未知真有魚嘗化龍之事也乎然而其事又有不可不究者四瀆未嘗無魚何為此地獨有大魚暴鰓而下下又不過富平也以予所見葢河魚趂水而上於湍急處産子及其困極故翻腹隨流不能自主富平雖為大河而有浮梁横亘津面魚已困浮又為津梁所約不能潜泳以過人因得乗困而拾取之耳其為㸃額而浮者葢跳躑産子為木石之所撞拉耳非有司其黜陟而㸃額以記如世傳所云也天下事大小有異而理之所在四海一也凡魚産子必並木根草幹戛刮其腹子乃得出出則粘著根莖之上離離如珠然後泥不能淹浪不能漂其子乃得成魚也龍門予所不歴無能驗其的為如何矣此之所云乃在吾鄉而親常目擊者非得之傳聞也魚之戛腹而子得出也則已奮躍勞憊不復更能潜泳則遂仰卧露白浮水而下邊岸之人白手取之不用器械也此乃吾鄉之所嘗見以類明類則龍門之魚可想矣吾鄉小溪淺澗安得試龍之地而鱗鰓亦遭損暴也此其事理可以互相發揮者故詳記之滎澤左傳衛與狄戰於滎澤釋者或以為在河北葢以衛都河北也衛為狄滅乃始東徙渡河野處于漕豈其方渡未至而狄猶攻之故戰其地耶葢滎澤記地也不必戰于滎澤之中也戰國䇿記魏將之與秦攻韓也朱已之説魏王曰韓亡秦盡有鄭地得垣雍决滎澤而水大梁大梁必亡矣案此時秦方逐穰侯則秦昭襄王之世也朱已謂滎澤可决則滎猶不枯也薇詩之言及采薇者甚多即伯夷首陽之所食也説文薇似藿藿豆也豆葉本圓而末尖皮㣲皺澁薇葉正與之肖山中極多吾鄉俗呼苦遮據俗語直言貴易曉味苦以芼火肉最相諧宜其苖春則盛發至秋老硬然不萎死雖雪中亦可采也采薇之詩曰薇亦作止謂春而苖茁也又曰薇亦柔止謂及夏而夭脆也又曰薇亦剛止謂霜露降而苖葉堅勁也朱朱盧盧紹興中年秦檜專國獻佞者至形之文牘謂為聖相郡縣用此意遞相尊尚凡所稱呼皆非其實無名子或為詩曰呼雞作朱朱呼犬作盧盧文官稱學士武官稱大夫聞者莫不大笑案世人呼雞皆曰朱朱呼犬皆曰盧盧不問何地其聲皆同雖是傳習要亦有本神仙傳祝雞翁居尸鄉養雞百數皆有名字呼之輒至人號為祝雞翁朱者祝之訛也事見酉陽雜爼第三卷又寶誌對胡后問國祚曰把粟與雞吃呼朱朱朱朱葢爾朱也則呼雞之為朱朱其來已乆犬呼盧盧别無所見是借韓盧之名與犬為髙耶盧黒也以色言也倍蓰孟子或相倍蓰古書罕有用蓰字者史記周本紀其罰倍灑徐廣曰一作蓰五倍曰蓰孔安國曰倍百為二百鍰也清河晉太和四年桓温自姑孰伐燕引舟師自清水入河水經有桓温清水據此即晉時未有隋汴故自清水入河白紗帽侯景僣立時著白紗帽而尚披青袍舉要三十二宋泰始元年羣臣欲立湘東王遂引入西臺登御座著白紗帽按此即白紗帽乃人主之服故以此為定舉要二十五宋蒼梧王死王敬則取白紗帽加蕭道成首使即阼曰誰敢復動道成不肯勿勿古旗有名勿勿者集衆則用之後人轉為匆匆匆匆者亟遽之辭也杜牧遣興曰浮生長勿勿兒小且嗚嗚杜集四九鼎周慎靚王五年秦惠王欲伐蜀張儀曰親魏善楚下兵三川臨二周之郊據九鼎挾天子以令天下此王業也司馬錯曰周自知失九鼎則必以鼎與楚王弗能止也不如伐蜀按赧王在位五十九年方始入獻其邑上距靚王五年六十一年矣此時九鼎猶在周東坡謂周人沉鼎於泗水以緩禍者非也當時周人以它鼎沉泗耳又通鑑曰楚欲圖周王使東周武公謂楚令尹昭子曰西周之地絶長補短東西不過百里裂其地不足以肥國攻之者名為弑君然而猶有欲攻之者見祭器在焉故也今子欲殘天下之共主居三代之傳器器南則兵至矣於是楚計輟不行按此即九鼎傳器也樂毅入齊臨淄取寶物祭器輸之於燕孟子謂王速出令返其旄倪止其重器即樂毅所取之器也通鑑漢文十六年新垣平言周鼎亡在泗水中今河决通於泗可祠而出之納粟拜爵秦始皇四年令民納粟千石拜爵一級按此即晁錯之所祖效非錯剏意也大家公主者言其嫁時上公主之也今人呼公主為大家則於義無依當是擇婦女中之佳者以自附託耶後漢班彪女嫁曹世叔博學善屬文和帝時召入宫令皇后貴人師事焉號曰大家而冠其夫之姓曰曹大家後世為其文學嘗為皇后貴人所師故公主取之以為稱號亦猶周女姓姬世人貴之故凡婦女不論何姓皆以姬稱之如姬戚姬之類是也罷太守銅魚唐制太守交事皆合銅魚為信周世宗顯德六年以除州自有制書罷銅魚不用實録三闗世宗自滄州北順水而行先降益津闗次瓦橋闗次瀛州以瓦橋闗為雄州以益津闗為霸州瀛州只仍舊名上宮孟子十四孟子之滕館於上宮趙岐曰上宮樓也孟子舎止賔客所館之樓上也詩曰期我乎桑中要我乎上宮漢陳皇后雖廢供奉如法長門無異上宫也通鑑十八爵秦爵凡二十級其第十九爵為闗内侯更上一級即列侯矣此亦即周家五等爵名之下立為此制亦名為爵也於是史凡言賜爵一級者謂秦二十等爵中之一等也自秦及漢初凡有爵者皆得除罪然不得為吏也高紀二年賜民爵臣瓚曰爵者禄位民賜爵有罪得以減是其制也惠帝元年民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡為六萬六萬六十緡也師古曰令出買爵之錢以贖罪不知此之六十緡者官受之耶或許有爵者移賣於人也至惠帝六年始令民得賣爵前此未見豈前此元年之許其買之於官至此乃覺其非而許民自賣所以貴其爵令民有所利也文帝時晁錯説上欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此則富人有爵農民有錢粟有所渫於是文帝從錯之言令民入粟於邊六百石爵上造稍增至四千石為五大夫萬二千石為大庶長此則入粟授爵之槩於是惠帝所許賣爵者其入錢高下以等級為差而晁錯師用其意改易其制而直令民入粟買之於官非買諸得爵之民也至武帝置賞官名曰武功爵即是有功而得爵亦許其移賣秦爵二十等如五夫樂鄉之類是也武帝爵但見諸臣瓚注引茂陵書止十三等當是舉載不盡也既不與惠帝許民戸自賣者同而又更入粟以為緡錢亦不同也而有大不同者舊爵止得用以除罪而武帝即令入官故其制曰諸買武功爵官首官爵名首也者試補吏則遂得以買爵入官矣加卜式為郎則其尤者也故班固謂為吏道雜而多端官職耗廢也汴通鑑景帝時七國反條候㨿滎陽堅壁不出更使弓高侯等將輕騎兵出淮泗口絶吳楚兵後塞其饟道吳糧絶士卒果飢奔壁求戰竟以此敗按淮即今淮水也泗即今謂南清河也此時未有隋汴也吳饟道自淮入泗則轉海而至淮上又自淮遡淮而上清河故條侯既絶淮泗則南船不北上矣以道路言之可見隋汴未有也螢囊沈存中清夜録丁朱崖敗有司籍其家有絳紗籠數十大率如燭籠而無跋無炧不知何用其家曰聚螢囊也詳其此製有火之用無火之熱亦已巧矣然隋煬帝己嘗為之曰大為之囊照耀山谷也丁氏之囊盖其具體而㣲者耳演繁露卷八
