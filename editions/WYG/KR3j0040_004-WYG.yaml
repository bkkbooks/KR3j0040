body:
  text: 演繁露卷四宋程大昌撰如五器卒乃復尚書大𫝊曰古者圭必有冒故瑁圭者天子與諸侯為瑞諸侯執所受圭以朝天子無過者復得以給使之歸國有過者留其圭三年已上御覽八百六案大傳此言必有所本舜典之謂輯五瑞者即此之執圭而朝者也輯者歛之而上乎天子也又謂班瑞于羣后者即此之復與其圭以歸者也第其有過留之三年者不見所出然大傳此言極有理也舜典下文東巡岱宗而贄五玊以朝者即與在朝而輯五瑞者同理也正義曰五瑞本受之堯斂而還之謂如舜新以付改為舜臣與之正新君之始此亦有理然以上下文推之則不通矣四嶽巡狩皆甞斂玊而復授之矣至五器之斂復即是輯班之異名矣今獨於正月在都時所班者為舜賜則巡狩之所如所復在已受新賜之後何用再班也耶以此知大傳所言有理蓋分還留兩端以為賞罰也者其說有理也飴􅄳􅄳徐盈反飴與之反一也楚辭曰粔籹蜜餌有餦音張餭音皇案􅄳飴餦餭皆一物也而小有異説文曰飴米蘖煎也􅄳和饊也釋名曰􅄳餅也煑米消爛洋洋然也飴小弱於􅄳形怡怡然也方言曰􅄳謂之張皇注云即乾飴也飴謂之該􅄳謂之餹凡飴謂之􅄳自關而東通語也今人名為白糖者是也以其雜米蘖為之也飴即􅄳之融液而可以入之食飲中者也後漢明徳馬后謂含飴弄孫者是也唐世所食􅄳粥是其類也張衡七辨曰沙飴石蜜逺國貢儲即今沙糖也唐𤣥奘西域記以西域石蜜來詢知其法用蔗汁蒸造太宗令人製之味色皆踰其初即中國有沙糖之始耶然南史已載糖蟹曰蟹之將糖躁擾彌甚豈其以白糖淹之耶白糖文見上父之稱呼漢魏以前凡人子稱父則直曰父若為文言則曰大人後世呼父不為父而轉其音曰爺又曰爹低邪反雖宫禁稱呼亦同其音故竇懐正為國爺是其事也唐人草檄亦曰致赤子之流離自朱耶之板蕩也案唐韻爹羌人呼父也陟耶反則其讀若遮與今俗所呼不同不知以遮為音者自何世始也案通鑑徳宗正元六年回紇可汗謝其次相曰惟仰食於阿多固不敢預也史釋之曰虜呼父為阿多則是正名為多不名為爺也今人不以貴賤呼父皆為耶蓋傳襲已久矣詔黃石林言制敕用黃紙始髙宗時非也晉恭帝時王韶之遷黃門侍郎凡諸詔黃皆其辭也南史十四則東晉時已用黃紙寫詔矣又南史傳十五卷曰宋明帝時吏部尚書禇彦回就赭圻行選是役也皆先戰授位板檄不供由是有黃紙札則宋世即軍補官賞功又已用黃紙矣沈約永平八年奏彈南郡丞王源曰源官品應黃紙輒奉白簡以聞則是奏彈之文嘗用黃紙矣文選四十又徐羨之召蔡廓為吏部尚書謂黃門已下悉以相委廓聞之曰我不能為徐羨之書紙尾其曰紙尾者黃案之尾也此時選案黃紙錄事尚書與吏部尚書連名故云然也則是宋世已用黃紙為案也至齊世立左右丞書案之制曰白案則右丞書名在上左丞次書黃案則左丞上書右丞下書雖世逺莫知其何者之為白案何者之為黃案所可知者其紙已分黃白兩色决矣南齊東昬侯逰戯無度臺閣案奏或不知所在閹人以紙包裹魚肉還家並是三省黃案然則文書之用黃紙其來已久髙宗朝凡謄寫詔制以下州縣始皆用黃紙耳槩言詔用黃紙始於髙宗不審也儀鸞顯慶四年髙宗因羣臣賀桃株生李上曰隋煬帝世常有野雀集于殿上當上校尉唱云此是鸞鳥有衛士報云田野之中大有此物乃笞衛士奏以為瑞仍名此殿為儀鸞殿至今嗤笑案髙宗所指校尉者乃髙徳儒也一本云馬徳儒髙祖起義執徳儒數之曰汝指野鳥為鸞以欺人主取髙官遂斬之夫髙祖斬徳儒以為妄髙宗以指鸞為詐而儀鸞殿所制之儀鸞司者迄今不改樂其名美不究其由也大業雜記所指為鸞者孔雀也七牢百牢僖十五年卷五秦改館晉侯饋七牢焉注云牛羊豕各一為一牢呉責晉饋百牢亦累此數而言之也牛羊豕具為太牢但有羊豕而無牛則為少牢今人獨以太牢名牛失之矣太廟先於階下西向拜凡行禮太廟執事行事官皆未登階先於階下望西再拜雖人主親祠亦與羣臣同拜相傳此禮名為㕘神案徐鍇嵗時廣記記東漢人主上陵禮曰乘輿自東廂下太常導出西向拜山陵旋升阼階引謝承書曰蔡邕為司徒掾從公到陵問上陵之禮或曰昔京師在長安時其禮不可盡聞也光武即是始𦵏乃剙是禮即邕此記而參求之是謂西漢諸陵皆在長安光武始𦵏東都故明帝之上光武陵也必先望西致敬乃敢次及光武此説差有理耳然唐㑹要載太宗拜陵亦先向西兩拜案太宗時唐家方有五陵獻懿皆𦵏趙州趙州自在長安東北固不應向西而拜矣景帝神堯𦵏于三原三原漢池陽地又在長安正北亦不應西拜也獨元帝陵在咸陽咸陽亦在長安西北固不為正西矣且使尊此而先之凡此五陵其四在北其一在西何由獨尊其一耶然則太宗西拜其不獨向元陵亦已明矣予案漢郊祀志東方神明之舎西方神明之墓也故凡事鬼必以西為尊也太祖之廟獨為東向蓋據西以臨東即其事也向西之拜其殆即謂神墓在西也不專為一代之陵而設也秸服禹貢五百里甸服甸服之賦専納秸服杜佑曰甸者為天子治田也自百里至五百里以遠近差為五等而輕重之則五服之凡也然則其制有可疑者焉三百里之比四百里五百里則近矣而納秸者純為藁秸以價計之則比納粟納米反為輕少此其為制何宿也杜佑曰服者服藁役其説是也凡因秸而服其役則納秸雖輕而服役則重用相補除而輕重迺得適平也秸之為用多矣祭之席地人之藉寢皆以秸為質齋牛駕馬皆以秸為食凡其編列供收就加飼秣皆供役者當之故甸内五百里地田王田者其賦入之物不粟不米不總不銍専以供秸為賦為其賈雖賤而所供之役則費反重也佑嘗參攷周制見其㕓郊甸縣所賦髙下相絶或有十而取二者或有二十而取五者其差或過數等殊乖十一之則遂總為之説曰周税輕近重逺近者多役也以輕賦而補多役使之適平則秸輕役重正以求及乎中也此古人深意也更㸃一夜分五更者以五夜更易為名也顔之推曰五夜謂以甲乙丙丁戊記其次第也㸃者則以下漏滴水為名每一更又分為五㸃也張衡賦曰衛以嚴更之直凡史家記事謂乙夜丙夜之類次而言之自甲至戊五易其序則為五更已顔之推家訓所載次第是矣五夜相次擊皷為節南史謂紞如打五皷是也五夜又分二十五㸃每㸃又擊㸃以記唐六典具載其事以故文人作文茍及更㸃皆以鐘皷為言也南史景陽樓有鐘專記曉漏不為記㸃之用也特不知一更又分五㸃起自何世耳水經洛陽有金墉城城東有豐置一鐘以和皷漏又南齊宫城有却敵樓樓上施皷持夜以應更唱髙帝以皷多警眠遂改用鐡磬疑記㸃以鐘皷制當始乎此通典二十三秉心塞淵馬三千衛文公秉心塞淵騋牝三千心何預焉而著以為效也是與思無邪思馬斯徂正同一理也凡為人上而存心審當則遇事無不曲至畜牧至末事亦遂賴此心以之孳息故馬亦蕃庶也是蓋莊周履豨之論也豨豕也豕之一身難肥者莫過於蹢也踐踏豕足而見其豐肥則知其通身無有不肥也矣此由末觀本之論也若直曰此心可以感動乎馬則是虚談無實也晉郭展為太僕留心於養生而廏馬充多征呉得以濟事潘尼為太僕箴敘列其事皆推養生而致之於馬即其説有本矣莊子曰百里奚爵禄不入於心故飯牛而牛肥孔子嘗為乘田而牛羊茁壯長皆一理也堯典談厯而鳥獸之孶革毨氄應時無爽伊尹明言烈祖之徳而曰鳥獸魚鼈咸若是皆舉末明本以見無細不及也寢廟㳺衣冠古不墓祭祭必於廟廟皆有寢故也凡廟列諸寢前寢則位乎廟後以象人君之前朝後寢也凡寢之有衣冠几杖象生之具者即在廟之寢也髙廟衣冠月一出㳺者㳺其廟寢之衣冠也秦人始於墓側立寢漢世因之諸陵皆有園寢又有宫人隨皷漏理枕且盥水陳嚴具則又推廟寢之制以及陵寢者也陵寢亦如廟寢其衣冠月一㳺之諸侯王表曰太常孔臧坐衣冠稿壊失侯是其事也然則魏武置宫人銅雀臺令月朝十五日望陵上食其來有自矣通鑑四十九陸機作文以譏切之但知搜剔其過不復審諦其自也頌琴左氏襄二年穆姜擇美檟自為頌琴杜預曰琴名也猶言雅琴案周禮有頌笙頌磬予常疑之若謂此之二器以寫頌為名則大小雅亦嘗在數矣而其器獨不記於周禮也因閲杜語乃悟頌云者乃其笙磬之名也唐李勉所寳之琴有二一名響泉一名韻磬其義亦取此乎折俎享有體薦體者牲之全體也薦進也謂舉全體以進也宴有折俎俎者所以盛肉也折者解牲體而析之但供其肉不供全體矣周亞夫傳獨寘大胾而無切肉又不設箸本是以此為戯不令得食耳若究其實即似古之體薦矣今列郡㑹客有不供食饌而凖價以餉者書辭例云折俎誤也折俎之折音舌言破碎也今之折價而餉者其讀如浙言價與饌相當也黃麻白麻唐世王言之别有七其一為册書次為制書又次為勞慰又次為發日敕册書惟除拜王公將相則用白麻紙書封付閣門閣門集朝士拆封宣讀宣已付有司書諸竹簡是為册已所謂擇日備禮册命者即以此麻入之竹册而涓吉臨軒以授其人者也自制書已下至發日勅則用黃麻紙書之老杜所謂黃麻似六經者也若降敕㫖諭事及敕牒則用黃藤紙其禮又降於黃麻矣六典魚袋今之魚袋本唐制也六典符寳即隨身魚符之制曰所以明貴賤應宣召左二右一其飾有玉金銀三等其符題云某位姓名案此之謂符者初用一本對中書其人官位姓名書已乃析而二之右付其人所謂右一者是也左則藏之於内或有宣召即内出左契以與右合㕘驗而同乃始得入其在古制則官得通籍禁中者至入宫門案牒省驗其人年貌官位皆同乃入者也武后時改魚為龜故崔神慶曰今五品以上佩龜者為别敕宣召恐有詐妄故内出龜合之然後應命通鑑二百十即此制也隨身魚符其用蓋如此也今世之制但襲唐舊案官品而授之使得佩帶為飾焉耳而合符之制不復舉用也於是案今制以求古則魚袋之上設為魚形者唐謂以玊金銀為飾者也魚飾之下有黒韋渾裹方木附身以垂者唐制謂書其官姓名於木而中分為二者也服章有紫朱黒三異而魚飾之下盛符之囊皆用黒韋者明其為用而不為飾也唐制左符乃遂有二或其人在外則出半符為信召之使來也或此符已徃而其人聞命先至則尚有一符可以為驗也此其所以右一而左二也宣召太子則用玊契事起武后時亦崔神慶所建也此之剙建玊契制亦本於隨身魚袋也通鑑二百十蝗江南無蝗其有蝗者皆是北地飛來也吾鄉徽州稻初成窠常苦蟲害其形如蠶而其色縹青既飡苗葉又能吐絲牽漫稻頂如蠶在簇然稻之花穗皆不得伸最為農害俗呼橫䖝橫音户孟反記得紹興庚申汪彦章典鄉郡有投牒訴此蟲名為橫彦章謂曰日有㫖令恤蟲災第言徽州蝻䖝為害不呼為橫也案唐韻蝗一音橫去聲則俗呼為橫不為無本也演繁露卷四
