body:
  text: 演繁露卷七宋程大昌撰黄銀唐太宗賜房𤣥齡黄銀帶欲及杜如晦而如晦已不在帝曰世傳黄銀鬼神畏之更取金帶遣𤣥齡送其家夫不賜黄銀而别賜金帶則改賜之帶必為黄金無疑矣然則先賜之帶命為黄銀者果何物也世有鍮石者質實為銅而色如黄金特差淡耳則太宗之謂黄銀者其殆鍮石也已鍮金屬也而附石為字者為其不皆天然自生亦有用盧甘石煑鍊而成者故兼舉兩物而合為之名也説文無鍮字玉篇唐韻集韻遂皆有之豈前乎漢者未知以石煑銅故其名不附石也耶諺言真鍮不博金甚言其可貴也夫天然自生者既名真鍮則盧甘石所煑者决為假鍮矣元和郡縣志曰太原出赤銅夫不直言出銅而特言赤銅似是鍮石矣而史無明據不敢堅斷隋髙祖時辛公義守并州州嘗大水流出黄銀以上于朝此之黄銀即太宗用以飾帶而槩賜房杜者矣今世之言鍮石者太原所産為最而太原即并州也則公義并州所得葢自然之鍮不經盧甘石煑煉者也故公義所上不云赤銅而云黄銀也黄銀云者其貴重可以比銀而色又特黄也是故兼銀黄兩名而命其美也且又有可驗者鬼神畏銅古有傳矣佩玉之音其中商律也皆去之不用而廟樂之聲為商者亦闕之不奏即是太宗畏鬼之論所從出也然則黄銀之不為銀而為銅此尤可證也渾儀渾象堯世已有渾儀璿璣玉衡是也晉世陸績始造渾象其晷度與渾儀同而形模與渾儀反沈存中嘗譏世人混兩為一而未嘗明著其説故見者未能豁然也二器之寫天度皆以渾天家為主而古人形容渾天最能明的者惟葛洪雞子之論也洪之説曰天形如雞子地形如雞子中黄是為天包地外而地在天中也渾儀也者設為四游儀寫日月星宿於天盤之上而包括乎厚地正如雞子之殻也是為寫肖本形而順以求之者也至於渾象也者設為圎毬而撫擬天度以日星傅寘毬上毬固可轉而人遂俯觀則天盤反在人下是為殊形詭制而合於理也若即其狀而詳言之則如權衡之上詳刻銖兩鈞斤而人遂可俯首以觀者也是如翻倒天度傅之於外而人立天外以行省視者也儀與象異者制葢如此也至陶𢎞景又出新意造渾天象高三尺許地居中央天轉而地不動悉與天㑹此則兼采儀象而兩用之矣然天中雖立厚地而元無所資於窺測又不如四游儀專撫天度而日星半隠地下者其制自具也則其制稍贅而不如渾象之切用無欠無餘也煙脂古者婦人妝飾欲紅則塗朱欲白則傅粉故曰施朱太赤施粉太白此時未有煙脂故但施朱為紅也煙脂出自邊地習鑿齒與燕王書云山下有紅藍足下先知否北方人採取其染花緋黄挼取其上英鮮者作煙脂婦人用為顔色今始知為紅藍後當致其種匈奴名妻閼氏今可音煙支想足下先亦不作此讀漢書也按習氏此言則是采藍花以為煙支法本出自邊地其已審矣習氏所指之山即天山也蓋呼天為祁連故也史記匃奴傳霍去病出隴西過居延攻祁連山索隠曰西河舊事天山在張掖酒泉二界上東西二百餘里南北百餘里有美木水草宜畜牧匃奴既失二山二山為祁連山燕支山也乃歌云亡我祁連山使我六畜不蕃息失我燕支山使我婦女無顔色祁連一名天山也燕支山正書為燕支則必在祁連二百里内也即此推之紅藍最初根種必出此山也采造已成紅色而名曰煙脂取閼氏為況極其國所貴重者而稱之也行香沈存中叙行香謂當以香末散撒乃為行香畢仲荀元豐三年作幙府燕閒録曰國忌行香起於後魏江左齊梁間每然香熏手或以香末散行謂之行香予案南史王僧逹好鷹犬何尚之設八闗齋集朝士自行香次至僧逹曰願郎且放鷹犬其謂行香次及僧逹者即釋教之謂行道燒香者也行道者主齋之人親自周行道塲之中燒香者􅅡之於爐也東魏靜帝嘗設法㑹乗輦行香髙歡執香爐步從鞠躬屏氣按凡云行香者步進前而周匝道塲仍自炷香為禮也靜帝人君也故以輦代步不自執爐而使髙歡代執也以此可見行香只是行道燒香無撒香之事也又案唐人盧氏雜説載旌節之制曰旌用銅龍寘之竿首用紫絹袋盛油囊垂之寺觀行香袋與旌畧同案此即凡主齋行道之人必執此袋導道衆以行而燒香自是一事非取香於袋而旋加燒然也唐㑹要五十曰天寶十七年敕華同等州僧尼道士國忌日各就龍興寺行道散齋至貞元五年處州奏當州不在行香之數乞同衢婺等州行香有㫖依案下文處州之乞行香其上文承行道設齋之下知其行香者為行道燒香也其它如畢仲荀所記謂唐髙宗時李義府為太子設齋詔五品以上行香不空三藏為神堯以下忌辰行香恐亦只是行道燒香無撒香之事國朝自有景靈宫後每遇國忌不復即寺觀行香而移其供設於景靈東西兩宫每大忌宰執率百寮至宫行香其法僧道皆集所忌殿廡之下僧左道右執事者執香盤中香圎子隨宰執往僧道立處人授一圎齋已收之不􅅡也此之散授猶存撒香之説耶印書智者剏物雖則云剏其實必有因藉以發其智也古未有字科斗鳥迹實發制字之智也蔡邕雖曰能書若無堊帚亦無以發其飛白之智吾獨怪夫刻石為碑蠟墨為字逺自秦漢而至于唐張參軰於九經字様皆已立板傳本乃無人推廣其事以槩經史其故何也後唐長興三年始詔用西京石經本雇匠雕印廣頒天下宰臣馮道等奏曰請依石經文字刻九經印板則其發智之端可驗矣詔在五代㑹要八放牛租通鑑記周太祖放免租牛五代㑹要十五晉天福四年尸部己申放矣駢脇晉文公出亡至曹曹共公聞其駢脇欲觀其祼浴薄而觀之注駢脇合幹也幹者脇肋骨也駢云者脇骨之生兩兩相並也莊子駢拇枝指拇大指也枝小指也駢拇即大拇根而兩岐也枝指是小指兩出也左氏六兜鍪為突厥後周書曰突厥之先臣於茹茹居金山之陽為茹茹鐡工金山形似兜鍪其俗謂兜鍪為突厥因以為號海不波溢韓詩外傳曰越裳来獻白雉謂周公曰乆矣天之不迅風疾雨也海之不波溢也中國殆有聖人今人用瀛海無波皆本此御覽四百一方寸徐庶母為人所執曰方寸亂矣古今謂方寸為心似始乎此然而列子已嘗曰吾見子之心矣方寸之地虚矣方冊張蒼傳主柱下方書如淳曰方版也中庸曰文武之政布在方冊方冊云者書之於版亦或書之竹簡也通版為方聨簡為冊近者太學課試嘗出文武之政在方冊賦試者皆謂冊為今之書冊不知今之書冊乃唐世葉子古未有是也端午綵索裴𤣥新語曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黒為之四面黄居中央名曰襞方綴之於複此字擬是􅃭字以示婦人養蠶之工也傳聲者誤以為辟兵予案此即今人五月綵索也今索合五色線為之此之所言乃自用繒其曰四色為之四面即是裁色繒為方片各案四色位而安之於衣而黄繒居四色繒之中以此綴諸衣上以表蠶工之成故名襞方襞者積而㑹之也方者各案其方以其色配之也今人用綵線繋臂益文也御覽八百十繒厚帛也蔡邕女誡曰繒貴厚而色尚深為其堅韌也案此即厚帛乃始名繒其著色深也同前端疋左氏昭六年豐賈以幣錦二兩遺子猶注云二丈為一端一端為一兩所謂疋也二兩者二疋也御覽八百十五錦纒頭唐書代宗詔許大臣燕郭子儀于其第魚朝恩出錦三十疋為纒頭之費舊俗賞歌舞人以錦綵置之頭上謂之纒頭宴饗加惠借以為詞御覽八百十五唐人行卷唐人舉進士必行卷者為緘軸録其所著文以獻主司也其式見李義山集新書序卷七曰治紙工率一幅以墨為邊準今俗呼解行也用十六行式言一幅解為墨邊十六行也率一行不過十一字此式至本朝不用水土斤兩重輕世傳水之好者比它水升斗同而銖兩多故宣州漏水有秤為此也杜牧罪言曰幽并二州程其水土與河南等常重十二然則不獨水有輕重土亦然也東臺西臺南臺趙璘因話録曰高宗朝改門下省為東臺中書省為西臺尚書省為文昌臺故御史呼南臺南朝亦同又曰武后朝御史有左右肅政之號當時亦謂之左臺右臺則憲府未曽有東臺西臺之稱也惟俗呼在京為西臺東都為東臺按此言之御史為一臺别自因事加東西南三稱為别耳其謂俗呼在京為西臺者唐都長安於洛陽為西而洛陽亦有留臺故長安名西臺而洛陽為東臺也因話録正色間色流黄環濟要畧曰正色五謂青赤黄白黒也間色五謂紺紅縹紫流黄御覽八百十四孟子曰惡紫恐其亂朱葢以正色為尚間色為卑也流黄不知何物古詩曰中婦織流黄魯直詩曰明於機上之流黄則流黄者織絲之色也染絲而織惟錦為然今專言流黄恐是黄繭之絲也馬後樂今郡守馬後樂即古鼓吹也古今樂録曰後漢以給邊將萬人將軍得之劉熙釋名曰横吹麾幢皆大將所有班超為將兵長史故假鼔吹幢麾也班超傳其謂假者超未為大將止為長史故許借大將鼓吹幢麾而用之也涼州梁州樂府所傳大曲惟涼州最先出會要曰自晉播遷内地古樂遂分散不存苻堅滅涼始得漢魏清商之樂傳于前後二秦及宋武定闗中收之入于江南隋平陳獲之隋文曰此華夏正聲也乃置清商署總謂之清樂至煬帝乃立清樂西涼等九部武后朝猶有六十三曲如公莫巴渝明君子夜等皆是也後遂訛為梁州絹一疋唐食貨志曰開元八年頒庸調法于天下闊者一尺八寸長者四丈麪一斗天寶元載敇麪今後以三斤四兩為斗大斗大尺開元九年敕度以十寸為尺尺二寸為大尺量以十升為斗斗三升為大斗此謂十寸而尺十升而斗者皆秬黍為定也鍾律冠冕湯藥皆用之此外官私悉用大者則黍尺一尺外更増二寸黍量一斗更増三升也唐志租絹長四丈二尺肩輿百官得於寓京乗轎自揚州始後遂不復乗馬惟從駕則乘之祖宗時臣僚雖在外亦不許乗轎也唐會要三十黎曰開成五年黎植奏朝官出使自合乗驛馬不合更乗檐子自此請不限高卑不得輒乗檐子如疾病即任所在陳牒申中書門下及御史臺其檐夫自出錢雇其宰相至僕射致仕官疾病者許乗之進士試徹夜五代會要二十一曰清泰二年禮部奏奉長興二年敇進士引試早入晩出今請依舊例試雜文並㸃門入省經宿就試唐試連夜以燭三條為限白樂天集曰試許燒木燭三條燭盡不許更續至此因禮部奏乃始逹旦也堨栁文永州袁家堨書作渇音曷渇者堨也堨者遏也遏水使不通行也栁葢疑此堨字非古故更書為渇而又自為之音曰讀當為曷案水經榖水著千金堨之制曰堨葢遏榖水使東流者也其書堨正為堨字子厚豈疑其來不古而遂以書渇為雅也水經十六稜觚音孤觚者削木為之或六面或八面面皆可書學者之牘也急就章曰急就竒觚與衆異竒觚好觚也班固兩都賦曰掍建章而外屬設璧門之鳯闕上稜觚而棲金爵金爵者金為鳯凰也建章宮之外闕其上立有稜之觚觚上立金鑄之鳯夫是以謂為鳯闕也文選一急就章一洪州石為城龍圗張存守洪州纍石為城明年大水淹及城半頼石為捍城以堅全朱興仲歸田録石城至今尚存霓裳樂天和元㣲之霓裳羽衣歌畧曰移領錢塘第二年始有心情問絲竹玲瓏箜篌附好筝教得霓裳一曲成前後秪應三度案聞道而今各星散今年五月至蘇州忽憶霓裳無處問聞君部内多樂徒問有霓裳舞者無元答云七州十萬戸無人知有霓裳舞惟寄長歌與我來題作霓裳羽衣譜案此乃樂天守杭日自教官妓玲瓏習為霓裳舞至樂天鎮蘇時習舞者已皆不存元㣲之為越守樂天求此舞人於越而越中無之但寄得霓裳歌以為之譜耳元白距明皇不逺此時此曲已自無傳況今日乎馬人退之上廣帥詩曰上日馬人來傳燈録曰富那夜奢昔為毗舎利國王其國有一類人如馬倮露王運神力分身為蠶彼乃得衣王後復生中印度馬人感戀悲鳴因號馬鳴大士案中印度在西域西域地與廣近豈唐時嘗有中印度人來至廣境耶退之與佛異趣而此馬人乃出佛典當是佛教已通中國馬人已來亦同民庶赴上日衙集耶故退之得而記之也荀子蠶賦曰此夫身女好而頭馬首者歟今蠶頭實不似馬而卿乃云爾則蠶為馬類古有其傳矣周禮禁原蠶為妨馬也今術家末僵蠶塗傅馬齒馬輒不能齓草則蠶馬同類信矣傳燈之説固專尊佛而自周禮以及荀子皆在佛教未入中國之前其説已如此殆古來已有此傳矣然蠶背悉有黒紫迹對出宛如馬蹄而頭實不似也章臺漢章臺即秦章臺也地在渭南而秦咸陽乃在渭北通鑑秦昭王六年楚懐王為秦所詐入秦至咸陽朝章臺如藩臣禮則秦之章臺乃在咸陽渭北也耶以予攷之葢秦之咸陽跨渭而南北焉故武庫章臺雖在長安亦統之咸陽非正在渭北之咸陽也通鑑舉要周鼎武王伐商遷九鼎于洛邑故洛陽南面有定鼎門及郟鄏陌此之九鼎乃夏鼎也既嘗自夏入商又遂自商入周也春秋時世與之相近所記必不誤也史記言周王入秦獻其九鼎則是鼎嘗入闗矣然自漢以後不聞闗中有鼎不知已入闗後竟復何在也史記始皇二十八年過彭城使千人沒泗水求周鼎不得東坡曰此周人懲問鼎之禍沉之泗水以緩禍此説非也泗水屬彭城彭城非商都亦非周都何縁周鼎可沒此水也或是周别有鼎而人誤傳耶持節舉要漢武天漢二年遣直指繡衣使者暴勝之等逐捕盗賊以軍興從事得擅斬二千石以下案舊制凡衘帶使持節者得擅斬殺其制自漢世已有之矣霸陵折栁黄圗曰霸橋跨霸水為橋也漢人送客至此橋折栁為别故李白樂府曰年年栁色霸橋傷别而王維亦曰渭城朝雨浥輕塵客舎青青栁色新勸君更盡一杯酒西出陽闗無故人審求其地則在渭北葢漢分秦咸陽置縣名渭城也若霸陵則在渭南不在渭北矣維之所餞者其人出戍陽闗而賦詩之地廼在渭北仍援折栁為詞則仍用霸陵故事也頌繋通典刑法門百六十二景帝詔頌禁注頌讀曰容容寛不桎梏蘇塗通典東夷馬韓祭鬼神立蘇塗建大木以垂鈴鼔注蘇塗有似浮塗案浮塗即浮圗浮圗即塔也謎古無謎字若其意制即伍舉東方朔謂之為隠者是也隠者藏匿事情不使暴露也至鮑照集則有井謎矣玉篇亦収謎字釋云隠也即後世之謎也鮑之井謎曰一八五八飛泉仰流飛泉仰流也者垂綆取水而上之故曰仰流也一八者井字八角也五八者析井字而四之則其字為十者四也四十即五八也凡謎皆倣此秬鬯大祭祀必用鬱鬯鬱鬯也者釀秬黍以為質而資鬱金草以為之色故詩人形容其狀則曰黄流也黄流者用以灌地而求神最重之禮也天子自祭則以圭柄之勺酌鬯而灌書謂王入太室裸者是成王親行灌鬯之禮也方成王未自至洛而先命周公告之文武則其文曰予以秬鬯二卣周公以其禮之重也故得之而不敢更宿即禋于文王武王則用鬯之禮乃如此其重也耶禮記曰天子賜珪瓚然後為鬯未賜則資鬯於天子文侯之命曰錫爾珪瓚秬鬯一卣此則初賜珪瓚未及自為之鬯即并鬯以賜使歸告之也召虎之詩亦曰釐爾圭瓚秬鬯一卣告于文人也人字疑侯演繁露卷七
