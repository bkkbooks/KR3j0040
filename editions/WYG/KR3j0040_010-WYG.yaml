body:
  text: 演繁露卷十宋程大昌撰白板天子國璽傳注引蕭子顯齊書輿服志云晉亂國璽沒北人號晉諸帝為白板天子白板如今板授之官無詔敕也魏晉至梁陳授官有板長一尺二寸厚一寸闊七寸授官之辭在於板上為鵠頭書白板天子言不得璽如無告命官也襘領之交㑹也五行志引昭公十年叔向言衣有襘視不過袺襘之中視下言徐鎗御覽鐺門笑林云太原人夜失火欲出銅鎗誤出熨斗曰異事火未至已燒失脚白日衣繡風俗通義江夏張遼為兖州太守以二千石尊過鄉里白日衣繡榮羡如此御覽九百五十二齊鼓盆瓮為樂晏子春秋曰景公飲酒數自去冠被裳自鼓盆瓮召晏子至請去禮晏子不可乃糞洒席召衣冠以逆晏子按此則鼓盆佐樂不止秦人齊亦有之矣易曰不鼓􅇲而歌則大耋之嗟凶地圖一寸折百里正元十一年賈眈進華夷圖廣三丈率以一寸折百里太平廣記羽檄魏武奏事曰有急以雞羽揷木檄謂之羽檄説文曰檄以木簡為書長尺二寸光武紀注太公丹書大戴禮曰武王問有藏約可以為子孫者乎師尚父曰在丹書王齋三日尚父端冕奉書而入則負屏而立王堂下南面而立受之曰敬勝怠者吉怠勝敬者滅太平五百九十白接籬竇華酒譜白接籬巾也龜符張鸑朝野僉載漢發兵用銅虎符唐初為銀符以為符瑞也又以鯉魚為符瑞遂為銅魚符以佩之至偽周武姓也𤣥武龜也又以銅為龜符又云上元中令九品以上佩刀礪筭袋仍為魚形結帛作之取魚之衆鯉之强兆也至偽周乃絕景雲唐復興又準前結帛為飾金吾揚子雲執金吾箴吾臣司金敢告執璜則知金吾者以金飾其兩末也今管軍官入朝所執之杖皆金釦其末也漢志謂金吾為馬非也羲和山海經海外有女名羲和浴日於甘泉胡牀隋髙祖意在忌胡器物涉胡言者咸令改之其胡牀曰交牀胡荽曰香荽胡𤓰曰黄𤓰然江都執帝者乃令狐行達也趙毅大業畧記秦得䜟書言亡秦者胡乃起長城以扞胡不知亡秦者廼胡亥也百丈南史朱超石傳宋武北伐超石前鋒入河軍人縁河南岸牽百丈有漂度北岸者杜詩上蜀多言百丈也鄣扇諸王鄣扇不得雉尾義恭傳螭魚螭魚四足長尾鱗成五色頭似龍無角南詔録金馬碧雞祠二髙山東有碧雞西為金馬者云漢武使王褒祠二神於彼其地當在西蜀在彼者恐未真也鳳棲梨陜州有棠樹正觀中有鳳止其上結實香脆其色赤黄號鳳棲梨洛中記異碧落觀絳州碧落觀龍朔中刺史李諶為母太妃追薦所造神人所篆洛中記異旌表門閭冊府元龜石晉天福二年閏七月壬申尚書户部奏李自倫義居七世準敕旌表門閭先有登州義門王仲昭六代同居其旌表有㕔事步欄前列屏樹烏頭正門閥閱一丈二尺二柱相去一丈柱端安瓦桶墨染號為烏頭築雙闕一丈在烏頭之南三丈七尺夾街十有五步槐栁成列今舉此為例則令式不該詔王仲昭正㕔烏頭門等事不載令文又無敕命既非故事難黷大倫宜從令式只表門閭於李自倫所居之前量地之宜髙其外門門安綽楔門外左右各建一臺髙一丈二尺廣狹方正稱臺之形圬以白泥四隅染赤其行列樹植隨其事力其同籍課役一凖令式鍾釜晏子曰齊其歸陳氏矣公棄其民而歸於陳齊舊四量豆區釜鍾四升為豆自其四以登於釜注四豆為區區斗六升也四區為釜釜六斗四升也釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣明皇孝經𤣥宗開元中親注孝經并製序八分書之立于國學以層樓覆之秦再思洛中記異黄屋左纛黄屋者天子車葢以黄為裏也左纛者以氂牛尾為之大如斗在最後左騑馬鬃上也繁纓在馬膺前如索裠即馬纓也獨斷犀車韓子國有法術賞罰若陸行之有犀車良馬殺青劉向列子序皆殺青書注謂汗簡刮去青皮也尋常八尺為尋倍尋為常神道碑裴子野葬湘東王為墓誌銘陳于藏内邵陵王又立墓誌堙于羡道道列誌自此始墓石南史宋張永開冢内得銅威斗有一石銘大司徒甄邯之墓石室黄瓊曰陛下宜開石室按河洛外命史官條上災異注云石室藏書之府三尺杜周曰三尺安出哉注以三尺竹簡書法律也獲生人亦為級衛青傳斬三千七百級師古曰本以斬敵一首拜爵一級故謂一首為一級因復名生獲一人為一級也此意與車稱兩馬稱匹同栭栗詩皇矣其檿其栵音栵為列或為例陸徳明音云舍人注爾雅云江淮之間呼小栗為栭栗吾鄉有小栗叢生其外蓬中實皆與栗同但具體而微耳故名栭栗栭猶兒鐵劵形似半破小木甑子曲處著肚上有四孔穿縚處其文於外面鐫陷金辛齊炅玉堂新制八投王莽傳平原女子遲昭平能説經博以八投服䖍曰博奕經以八箭投之齊斧易喪其齊斧應劭曰齊利也莽傳銅柱楚王馬希範既破羣蠻自以為伏波之後以銅五千斤鑄柱高丈二尺入地六尺銘誓狀於上立之溪州古貝唐環王傳出古貝古貝草也緝其花為布粗曰貝精曰㲲按今吉貝亦緝花為之而古吉二字不同豈訛名耶抑兩物銅作兵食貨志賈誼言收銅勿布以作兵器注古以銅為兵按此則漢猶以銅為兵也飛子武帝時募民田南夷入粟縣官而内受錢於都内注入􅂖外縣而受錢於京師主藏者按此則國初入中之法漢有之矣亦唐人飛子錢之類飛子見唐㑹要籟莊周天地人皆言籟説文曰三孔籥也大者謂之笙中者謂之籟小者謂之箹瓊説文瓊赤玉也詩有瓊琚玊佩左氏楚子為瓊弁玊纓玉與瓊皆對别言之若等為一玉不分言也今人用瓊比梅雪皆誤夷玉説文珣玗璂皆醫無閭玉周書所謂夷玉也球玉磬也追鋒車魏志髙貴鄉公注云帝與司馬朢王沈裴秀鍾㑹等講宴於東堂帝性急請召欲速秀等在内職到得及時以朢在外特給追鋒車毎有集㑹朢輒奔馳而至酺音蒲文帝賜天下酺五日文頴曰漢律三人以上無故羣飲酒罰金四兩今詔賜得令聚㑹飲食五日也此即周羣飲汝勿佚文紀箏鼓絃竹身樂也按今箏未有以竹為之者箋表識書也鄭箋毛詩崔豹釋説甚多至謂毛公嘗為鄭康成郡守故不同它書直注釋之其云箋者猶上箋之義尊之其説雖無害義而迂曲不徑如許氏所説則直以簡隨本文表識其義猶曰鄭氏簡之云耳史以􅁽書祝曰􅁽祝後人以聨簡著古書曰某人編其義一也説文㱾攺二字重出殳類釋㱾曰㱾大剛卯也以逐精鬼从殳亥聲攴類釋攺曰攺大剛卯以逐鬼鬽也音義如魅从攴已聲讀若已剛卯豈王莽時所鑄此時攺而大之以為禳祟之物耶二物同用設有二聲止合附著一類不應兩出先馬荀子正論天子乘大路諸侯持輪挾輿先馬注先馬導馬也後世太子洗馬釋者曰洗先也亦此先馬之義也天子出則有先驅太子則有洗馬言騎而為太子儀衛之先也屋楹數王盈孫傳僖宗還蜀議立太廟盈孫議曰故廟十一室二十三楹楹十一梁垣墉廣袤稱之禮記兩楹知其為兩柱之間矣然楹者柱也自其奠廟之所而言兩楹則間于廟兩柱之中於義易曉後人記屋室以若干楹言之其將通數一柱為一楹耶抑以柱之一列為一楹也此無辨者據盈孫此議則以柱之一列為一楹也葉子古書皆卷至唐始為葉子今書冊也壓角裴廷裕東觀奏記云令狐綯主裴坦知制誥裴休拒之不勝命既行諸政事謁謝丞相故事謝畢便於本院上事四輔送之施一榻壓角而坐坦廵謝至休休曰此乃首台謬選非休力也肩輿便出不與之坐按此即壓角故事乃是執政送上不與舎人均禮故設榻隅坐名為壓角鐵甲仲長統昌言政損益篇云古者以兵車戰而甲無鐵札之制今誠以革甲當强弩亦必喪師亡國也按此即後漢時甲有鐵札矣未知前漢如何黎明史記吕后紀黎明孝恵還徐廣曰黎猶比也将明之時也此説非也犂黎古字通黎黑也黑與明相雜欲曉未曉之交也猶曰昧爽也昧暗也爽明也亦明暗相雜也遲明即未及乎明也厥明質明則已曉也犬戎雞林章僚回程至海州長㳅縣東北百餘里船巫祭小青山神巫具餅餌先作擊擊之聲復撒米一把彼俗云雞林之地祭先皆以米或云雞林本雞種也髙麗不烹雞云如烹即家有禍按此與犬戎諱犬同霜月皇極日歸田録漢韓明府修孔子廟碑云永壽二年嵗在涒灘霜月之靈皇極之日永壽桓帝年號霜月極日恐是九月五日束帛又端疋玉壺清話胡旦云古義束脩謂脯十挺即為一束束帛則卷為二端五疋表王者屈折隠淪之道拜稽首哀十七年公㑹齊侯于䝉孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首二十一年公及齊侯邾子盟于顧齊責稽首因歌之曰魯人之臯數年不覺使我髙蹈注言魯人臯緩數年不知荅齊稽首故使來髙蹈唯其儒書以為二國憂注二國齊邾也言魯據周禮不肯荅稽首令齊邾逺至平衡曰拜下衡曰稽首至地曰稽顙注平衡謂罄折頭與腰如衡之平禮記平衡與此義殊大畧宰木拱秦襲鄭百里奚與蹇叔諌秦伯怒曰若爾之年者宰上之木拱矣注云宰冢也拱可以手對抱公羊僖二十三年對抱者以兩大指圜合之也與拱把之桐梓同也箯漢張敖傳箯輿注家雖得其義不詳其制之所來公羊文十五年齊人歸公孫敖之喪脅我而歸之筍将而來也何休注筍者竹箯一名編輿齊魯以北名之曰筍將送也為叔姬淫惡魯類故取其尸置編輿中傳送而來案竹筍也編箯皆以竹篾編比而成輿也古有車車以轅繫馬而行已而有輦輦者設杠以人肩之故皇甫謐曰桀為無道以人駕車是步輦之始也既有輦則以竹爲輿智起於是矣淮南王安曰輿轎而入領始名轎也郛郭城之外更有遮衛其名為郛亦為郭郭猶棺之外又有槨也公羊文十五年齊侯伐曹入其郛郛者何恢郭也注恢大也郭城外郭故揚子雲曰天地之為萬物郭五經之為衆説郛揚子雲於名數不茍也揖公羊僖二年晉謀伐郭荀息進獻公揖而進之注以手通指曰揖又文六年晉靈公望見趙盾愬而再拜盾北面再拜稽首注頭至地曰稽首頭至手曰拜手據此即今俗名乂手是也亦拱手之義也拜首則身屈矣首不至地稽首則首至地矣笄僖九年婦人許嫁字而笄之注笄者簪也所以繋持髮象男子飾也時臺公羊荘三十一年注天子有靈臺以候天地諸侯有時臺以候四時臺榭左氏哀元年子西曰今聞夫差次有臺榭陂池焉注積土髙曰臺有木曰榭言徒土則為臺上有架造則為榭呉牛喘月風俗通曰呉牛望見月而喘使之苦於日見月怖喘矣御覽月門世説亦載滿奮云臣猶呉牛見月而喘韋弦西門豹性急佩韋以自緩董安于性緩佩弦以自急韓子養和李泌訪隐選異采怪木蟠枝以隐背號曰養和人至今效之乃為養和以獻太平廣記演繁露卷十
