body:
  text: 演繁露續集卷六宋程大昌撰談助殿下蕭梁之制諸侯王之言曰今境內稱之曰殿下南朝人皆稱其國王為殿下社公勾龍周棄為社稷故日食伐鼓於社責上公也今俗猶言社公者上公之義也杜佑駮之云公者尊稱以人尊社故曰社公王肅言社公為上公俗言天公雷公豈上公乎豆粉餈周禮籩人羞籩之實糗餌粉餈注粉稻米黍米合蒸之為餌今之米粉果也餅之則為餈音粢即今人書為恐餌餈粘故粉大豆以傅之糗熬大豆也即今人以豆粉傅餈也脾析牛百葉也同上百葉既為牛脾而片片分析故云脾析也同上醢掌薦兵厨設㕔設厨今人謂公庫酒為兵厨酒言公庫之酒因犒軍而醖也太守正㕔為設㕔公厨為設厨皆以此也漢有步兵校尉掌上林苑屯兵晉阮籍聞步兵厨營人善釀有貯酒三百斛乃求為之則亦兵厨之祖也土山頭韋述兩京記省郎有不歷員外郎而拜省郎者謂之土山頭果毅果毅兵官也言從兵士便作兵官也唐有不歷員外而徑為省郎者或嘲之曰誰言粉省裏却有土山頭用此謔也其為外郎者酬之曰錦帳隨時設金爐任意熏惟慚員外置不應列星文蕭寺國史補曰梁武帝造寺令蕭子雲飛帛大書蕭字至今一字猶在李約竭産自江南買之並洛建水亭目曰蕭齊按此則蕭寺者乃因蕭字而名也劉禹錫集二十九送如智法師曰前日過蕭寺看師上法筵則是槩以僧寺為蕭寺恐不然也今人亦多誤用保長韓延壽守東海置正伍長師古曰正若今之鄉正里正也伍長同伍之中置一人為長也呂溱呂溱舉進士為天下第一涑水記聞云歙人也汪彥章亦云然歐陽公記溱父士元墓乃曰江陵人歐陽煜歐陽煜文忠之叔也乃教文忠讀書者六一文二十七孫明復石介為弟子孔道輔見孫明復介執杖屨侍左右先生坐則立升降拜則扶之魯人由是始識弟子禮字以表德西京雜記四卷曰梁孝王子賈從朝年少竇太后強欲冠之王謝曰禮二十而冠冠而字字以表德安可強勉之哉後漢傳亦以字為表德竄名王莽傳哀章作銅匱書莽大臣八人又取令名王興王盛章因自竄姓名凡十一人師古曰竄謂側著也本無其名而私置名其中也今人以列名歌詩文記者亦用竄名字恐不美也韓退之則曰辭列三王之右有榮耀焉潢匠祕書省吏有裝潢匠廣韻引釋名云染紙也又音潢惟師曽是百年人唐天寶間有真上人者至杜牧之時其人年已近百嵗故題其寺曰清羸已近百年身古寺風煙又一春寰海自成戎馬地惟師曽是太平人此意最逺不言其道行獨以其年多嘗見天寶時事也元祐間東坡典外制有百嵗得官者曰繄此百年之故老曽為四世之遺民與此意合而皆有味杜外集拜許叔重曰拜首至地也甘棠勿剪勿拜三章皆曰勿剪剪者斷也勿拜則不止不剪且不敢屈其枝而垂之敬之至也孟子論天下易事曰為長者折枝即肢體之肢與木枝一義則拜者折枝之謂也悔東坡奏議十四卷論知定州不得上殿曰自古英睿之君勇於立事未有不悔者景帝之悔速故變而復安武帝之悔遲故幾至於亂雖遲速安危小異然比之常靜無心終始不悔如孝文帝者不可同語矣蒸餅釋名曰餅併也溲麥使合并也蒸餅湯餅之屬隨形而名之束晳餅賦曰起溲牢九何曽蒸餅不折作十字不喫蕭子顯齊書曰詔太廟四時祭薦宣皇帝麵起餅起者入教麵中俗書教為醇令鬆鬆然也本朝讀蒸為炊以蒸字近仁宗御諱故也下馬錢令狐楚傳始汴鄆帥每至以州錢二百萬入私藏楚獨卻不取案此即今世郡守下馬錢也回面避家妓宋顔師伯豪貴王琨過之傳酒行炙皆悉內妓琨以男女無親傳授每至令置牀上回面避之然後取南史十三庶姓作揚州王景文彧領揚州刺史辭明帝曰庶姓作揚州徐千木輩皆處之不辭祕書有競王敬洪之子恢之召為祕書郎敬洪令求為奉朝請與書曰彼祕書有限故有競朝請無限故無競吾欲使汝處不競之地文帝許之十四鈴下威儀晉書楊方為郡鈴下威儀諸葛恢待以門人之禮案鈴下威儀殆今典客之吏耶覽四百四十三被受今人受朝命者或曰備受備言有司登載事目備具而吾得之也或曰備當為被非備也此說有本南海尉任囂召趙他被書行南海尉事杜佑曰被受也通鑑百十八樂天知蘇州久方開宴白樂天集二十一蘇州郡宴呈同僚曰下車已二月開筵始今晨以樂天風流詩酒而閲兩月方燕飲可謂知本末也已李娟李義山詩曰隨宜教李娟樂天集二十霓裳詩曰妍媸優劣寧相遠大都只在人擡舉李娟張態君莫嫌亦擬隨宜教歌舞注娟態蘇妓也下檐得替例物介父送王介知湖州詩曰遙想郡人迎下檐下檐猶古之下車也㑹要六十九曰大中五年奏刺史交割及初到任下檐得替後資裝天下州郡自有規制自今後應刺史下檐什物及除替後資送錢物但不率斂官吏不科配百姓一任各守州郡舊例磔棄市漢景帝罷磔曰棄市止令就死於市不磔磔者陳其尸通典刑法弔服溫公著論士夫弔喪可服公服案孔子謂羔裘𤣥冠不以弔則恐公服之說未穩北魏太和中文明太后崩齊遣裴昭明往弔欲以朝服行事孝文遣成淹論執昭明言不聽朝服行禮義出何典淹言羔裘𤣥冠不以弔童孺共聞昭明說屈乃借衣幍以申國命則夫吉服而弔似與夫子之說異也不識草書唐傳二十七李𤣥道佐王君廓𤣥道寄書於房𤣥齡君廓發其書不識草字疑其謀已遂反𤣥道坐是流筠州唐憲銜使頭使下唐世節度觀察等使辟置官屬許理年轉入臺官至侍御史止其御史中丞須有軍功乃得轉入已上皆名憲銜所帶憲銜者得按本道州縣出李夷簡傳百二故宇文融括田多假御史以張其威出本傳其曰假者以貞觀元年嘗有㫖見任御史不得奏請任使故假其名以威所部也唐世既許在外為使者兼帶憲銜故化外諸國世襲爵封者仍不廢削為其習見不容驟削也是以交趾加恩至今猶帶御史大夫是其例也又唐制有使下御史謂仕於使幕之下亦猶帶郎中而為使屬如杜甫在嚴武幕為參謀而帶檢校工部員外郎是為使下郎官也其又仕在使幕之下者既名使下故謂之使者名為使頭也大中五年敕如聞江淮之間多有水陸兩路或使頭陸路即隨從船行或使頭乘舟即隨從登陸一道牒劵兩處支供用今以後委出使郎官御史覺察唐㑹要六十一御史周官也其初但掌天子所御之書故曰御史至秦漢為糾察之任秦以御史監郡漢叔孫通新定禮儀以御史執法舉不如儀者輒引去是也通典二十四惠帝初遣御史監三輔郡又置監御史出同上漢官儀曰侍御史出督州郡盜賊還漕軍糧言督軍糧御史同上武帝之置侍御繡衣直指者出討姦猾理大獄而不常置隋煬帝始置監察御史十六員掌出使檢校唐㑹要七十八貞觀元年敕中書門下兩省供奉官御史臺見任郎官御史更不得奏請任使通典七十八乾元二年敕令御史大夫充彍騎使令御史充判官唐傳一百二髙元裕傳故事三司監院帶御史者號外臺得察風俗舉不法元和中李夷簡因請按察本道州是後益不職元裕請監院御史𨽻本臺得專督察詔可開成元年中書門下奏淮太和七年敕諸道節度使下都押衙都虞候轉押衙兵馬使其序遷止於侍御史其御史中丞以上官並須因立戰功方得奏請諸道團練已下萬人以上軍所奏請不得過殿中侍御史未有戰功者不在奏限㫖依開成二年中書門下奏淮貞元二年敕諸道節度觀察團練使不得奏請見任御史淳熙丁未髙廟上仙有赴總護使司辟命者堂帖稱使下某官一日㑹沈德遠德遠舉似大笑之為今世俗之語以僕使為使下故也豫曰此固行帖者欲並古以為之稱然唐時實有此制通奏檄皆嘗用之非今創也案唐㑹要六十一曰大中五年敕如聞江淮之間多有水陸兩路近日乘劵牒兩處祗供此銜使頭使下之文聚著一處者也若其他言使下者甚多蓋使頭銜使之人也首也使下者為某使所辟而𨽻屬其下者也取其事之顯者而言之節度使者今之安撫使也安撫之屬有御史有郎官故朝列文移明曰使下御史或曰使下郎官以别於在朝之御史郎官也既嘗命使屬以為使下故後人因緣命使下為僕從如今人以僕從為僕射及軍長為司徒之類水精宫奏天樂遂州蕭翰林家乳母初生遭亂父母棄之有飼以松柏露者遂活能飛後因其父母以果栗食之與俱來之兒唱曰水精宫奏天樂可聽否踴欲飛又墮於地羣兒曰喫了俗物不能升矣遂為乳母張君房逸史語訛難容州人去知無良縣容州加南字以其在南也無良縣饒州浮梁縣也難容無良皆不循謹之名也樂府雜録瑟中有賀若乃文宗時賀若夷善琴也矢貫左右目王建將秦承厚攻西縣矢貫左目達于右目鏃不出建自䑛其創膿潰鏃出外舅母之兄弟為舅妻之父為舅謂我舅者吾謂之甥鄭𤣥牛識字白樂天詩鄭牛識字吾常歎注云諺云鄭𤣥家牛觸牆成八字五十六㑹心處不在遠簡文謂華林園曰翳然林水便有濠濮間想正朝酒從小起李膺家録膺坐黨事與杜密荀翊同繫獄時嵗日引杯曰正朝酒從小起膺曰死人所惡子無吝色跋先父文簡公嘗著演繁露一書泉南郡博士刋于泮宫嵗久字漫覃侍伯仲氏家居遂以所藏繕本刻於家孰先父晚得閒寓里復為續編近方鋟木覃自惟材謭識陋不能仰紹先世致知格物之學手澤滿前徒泚顙流涕耳覃將指餉師敬攜是板留諸京口總所嘉定庚辰十月既望男覃敬書演繁露續集卷六
