body:
  text: 演繁露卷十六宋程大昌撰爰契我龜綿之詩曰爰始爰謀爰契我龜毛鄭皆以契為開非也古卜卜人令龜已遂預取吉兆墨畫其上然後灼之灼文適順其畫是為食墨者吉其兆不應墨則云不食不食則龜不從也故洛誥曰我卜河朔黎水我卜澗水東瀍水西惟洛食是龜之所食者畫洛之兆而河朔黎水之兆不食也古公亶父之改居經始而謀度之未敢以為可居也以墨令龜而兆與墨同故曰契契者合也以謀與龜協合也上言爰始爰謀以我合龜也曰止曰行龜之語我者可以止可以行也鐵劵唐代宗紀功臣皆賜鐵劵藏名太廟畫像凌煙閣錢鏐家在五季世嘗得之而唐文粹有賜王武俊鐵劵文今世遂無其制亦古事之缺者也豫按唐辛齊炅玉堂新制鐵劵半缺形如小木甑上有四竅可以穿絛凸面鐫字陷金以煥之從齊炅所記以想其制是劵也鐵質金字本形正圓而空虛其中鐫勒制文於外已乃用古傳别法中分其器而二之一以藏官一以授諸得劵之人故今存於世者形如半甑正與契劵兩别之理相應也周禮少宰聽稱責以傳别二鄭謂大書於一札中字别之兩家各得一者是其證也周之傳别主市易要約故其札以木老氏所謂如執左契者是也後世鐵劵要之取録功堅久之義故以鐵為之其謂形如半甑者正是一札而兩分之也是命以鐵為劵無有辨其所始者按漢高帝紀與功臣剖符作誓冊書鐵劵金匱石室藏之宗廟其殆鐵劵所始耶至功臣表所載山河帶礪等語乃鐵劵丹書文也漢曰契後世曰劵皆結約之謂也六州歌頭六州歌頭本鼓吹曲也近世好事者倚其聲為弔古詞如秦亡草昧劉項起吞併者是也音調悲壯又以古興亡事實之聞其歌使人悵慨良不與豔辭同科誠可喜也本朝鼓吹止有四曲十二時導引降仙臺并六州為曲每大禮宿齊或行幸遇夜每更三奏名為警場真宗至自幸亳親饗太廟登歌始作聞奏嚴遂詔自今行禮罷乃奏政和七年詔六州改名崇明祀然天下仍謂之六州其稱謂已熟也今前輩集中大祀大恤皆有此詞檢檢校函檢皆從木今從手非是唐韻謂撿乃斂字非檢字是也急就章曰簡札檢署槧牘家顔師古曰檢之言禁也削木施於物上所以禁閉之使不得輒開露也署謂題書其上也古制如此其字從木審也以顔言推之則檢之者以木為函納書文其中而簽題其上自唐及今匭檢皆其物也木蘭樂府有木蘭乃女子代父征戍十年而歸不受爵賞人為作詩然不著何代人獨詩中有可汗大㸃兵語知其生世非隋即唐也女子能為許事其義且武在緹縈上或者疑為寓言然白樂天題木蘭花云怪得獨饒脂粉態木蘭曽作女郎來又杜牧有題木蘭廟詩曰彎弓征戰作男兒夢裏曽經與畫眉幾度思歸還把酒拂雲堆上祝明妃既有廟貌又曽作女郎則誠有其人矣亦異哉鼎子今衛士扈駕清道者其著籍名為等子誤矣東方朔傳夏育為鼎官顔籀注曰夏育衛人力舉千鈞鼎官今殿前舉鼎者也然則今之衛士以力選而誰何犯蹕者當為鼎子不應為等子也若謂等為差等之等而取其軀幹中尺寸則凡今軍人不以長短率中等乃得刺補何以獨於此曹名等子也歟九卿漢制九卿今侍從也然九卿侍從為九史無明制獨可即當時話言以求其何者為卿尚可追論顧又雜出甚多其數不止於九也汲黯為主爵都尉傳言列於九卿張湯為廷尉傳言列九卿取接天下名士大夫鄭當時至九卿為右內史杜鄴曰陳咸為少府在九卿高第王溫舒尹齊更迭為中尉義縱為右內史王言三人以急刻為九卿劉更生元帝初為宗正尋免官復為中郎韋𤣥成劉更生前為九卿馮野王為大鴻臚有司奏王舅不宜備九卿張敞為京兆尹亡命天子召敞敞上書言臣前得備列卿待罪京兆張禹謂子宏官至太常列於九卿尹翁歸守右扶風滿年為真傳言其在公卿之間清潔自守蕭望之為光祿勛繫獄石顯使史高言之元帝下九卿大夫獄汲黯過大行李息曰御史大夫湯拒諫飾非公為九卿不早言之何上官桀反大司農楊敞不敢發其事傳謂以九卿不輒言故不得侯顔異以大農議皮幣微反脣張湯奏異當九卿見今不入言而腹非毋將隆為執金吾哀帝制詔毋將隆位九卿無以正朝廷之不逮按此即主爵都尉廷尉右內史少府中尉宗正大鴻臚京兆尹太常右扶風光祿勛御史大夫大司農執金吾凡十四職者實皆正為列卿矣而時人所舉獨以九卿為言故難曉也百官公卿表第列公卿位行凡十四等自丞相以至列將軍自不與九卿交雜矣至從奉常數之以至左右內史凡十品每一品中又有數更其名者總而數之又為二十六名則其十品二十六名者又不與九數相應愈益難解又如奉常之與太常廷尉之與大理本一職也而名稱前後不一則猶可謂其兩出至宗正與治粟內史水衛之與右扶風同列一等則職位殊不相入只如左馮翊可與京兆內史參附而又不與右扶風相屬如此之類殆不可以意推定之也蓋嘗反而求之則班固嘗明列九卿矣百官公卿表曰少師少傅少保是為孤卿與六卿為九是固之立九卿總目也而十品二十六名者族而㑹之悉卿列於卿則數距止九哉然班固雖本漢語而達之周制雜數三孤六卿以為九卿而周制實不然也周官固嘗列孤於卿矣如曰孤卿特揖孤卿位於棘是嘗比而同之矣然此其謂為孤卿者蓋朝廷位於棘是著所列取其降於三公一等而下與六卿同位故連文以為之稱本無三孤六卿絫數以為九卿之文也若曰三孤已行卿事而得絫絫言之則三公未嘗不為冢宰如周公為師而位冢宰正百官是公亦為卿何以獨孤於卿而并為九名九哉則固語亦未愜又豫嘗質之遷史而得其歸也遷之傳張湯而及趙禹曰禹為少府比九卿夫比之為言猶視也五嶽視三公非三公矣而品秩得與之同故曰比曰視明非本品特比附之耳夫少府既非九卿而得比九卿則九卿本九後不啻九何足疑也固書率多因遷而務在簡文故其傳禹直曰禹為少府九卿刋一比字而漢世非卿比卿之制遂不可推尋至其列表以志公卿亦自雜數無别也乃知夏五郭公聖人不肯加損其有深意也哉今世二府本取府第東西對立以為稱謂後雖宰相執政絫多至七八人亦止以二府目之則漢之列卿數溢於九而槩以九卿命之亦語例交熟自無他說也建康新亭今建康新亭在朱雀航西五里許南傍小山北枕小浦俗呼為鵝項鵝項者蓋江水分𣲖而下以與秦淮㑹于城外者也蕭衍之入建康也東昏命李居士屯新亭拒曹景宗居士既為景宗所敗請燒南岸邑屋以開戰場自大航以西新亭以北皆盡據此則曹景宗自上流而下李居士出據新亭拒之新亭固當在建康之西矣然其請燒南岸邑屋以開戰場而新亭以北皆盡則新亭之北當大有邑屋乃與之應今之新亭北據鵝項鵝項之外去大江絶不逺縱江堧流漲古今稍有不同而大江正𣲖未之有改鵝項之外即皆漲沙漲沙之外即是大江安得更有邑屋以此考審晉之新亭計當在長干寺南不當在鵝項河側矣又按晉劉氏世說新亭吳之舊基先已淪隳隆安中丹陽尹司馬恢之徒創今地夫晉時指謂今地者乃王導正色言尅復神州處此時亭址已非吳舊則今亭又異於晉其更革固不足怪也六帖白樂天取凡書精語可備賦詞制文采用者各以門目類粹而總名其書為六帖白既不自釋所以名後人亦無辨者偶閲唐制其時取士凡六科科别其所試條件每一事名一帖其多者明經試至十帖而說文極於六帖白之書為應科第設則以帖為名其取此矣白書不止六類而帖之取數止於用六者說文小學也試小學又試之小者也取極其嚴而名其書者兼取其少也度古帝王必用度量後世所傳商尺周漢尺不相參同蓋世異而制殊無足怪也今雖國有定度俗不一制曰官尺者與浙尺同僅比淮尺十八而京尺者又多淮尺十二公私隨事致用元無定則豫嘗怪之蓋見唐制而知其來久矣金部定度以北方秬黍中者為則凡橫度及百黍即為一尺此自其一代之法不須較古今同異也然此尺既定而尺加二寸别名大尺又因著為之令曰鍾律冠冕之類則用秬尺內外官司悉用大尺則國立之制明為二體其與古人同度量之義乖矣唐帛每四丈為一匹用大尺凖之蓋秬尺四十八尺也秬尺長短不知合今何尺然今官帛亦以四丈為匹而官帛乃今官尺四十八尺凖以淮尺正其四丈也國朝事多本唐豈今之省尺即用唐秬尺為定耶不然何為官府通用省尺而繒帛特用淮尺也魚袋六典符寶即載隨身魚符之制左二右一太子以玉親王以金庶官以銀佩以金飾刻姓名者去官而納焉不刻者傅而佩之注云符上皆題云某位姓名其官止一貪者不著姓名並以袋盛其袋三品以上飾以金五品以上飾以銀六品以下守五品以上不佩若在家非時及出使别敕召檢校并領兵在外者不别給符契若須回改處分者勘符同然後承府按此而言即今之魚袋雖沿唐制但存形模全無其用今之用玊金銀為魚形附著其上者特其飾耳今用黑韋方直附身者始是唐始世所用以貯魚符者是之謂袋袋中實有符契即右一而與左二合者也凡有召或使令即從中出半契合驗以防詐僞故不别給符契者憑袋中半符為信本朝命令多用敕書罕有用契即所給魚袋特存遺制以為品服之别耳其飾魚者固為以文而革韋之不復有契但以木楦滿充其中人亦不復能明其何用何象也然唐制有二種有隨身符即以給其人者故書其人姓名及其致仕即以納官有傳符即不刻某官姓名但言某司符契大典注文所謂皆須遞相付十月內申禮部是也白樂天嘗暫為拾遺佩銀魚已而不為此官則不佩故其詩曰親朋相見問何如物色恩光盡反初無奈嬌癡三嵗女繞腰啼哭覔銀魚即六典謂六品以下守五品以上不佩者而白雖暫借尋亦歸之於官也黃翻綽服緋無魚故取獺尾垂著腰上作俳語謂明皇曰賜緋毛魚袋毛語反即無為也帝喻其意以言卻止之曰魚袋者五品以上入閣合符即用之汝何可得六典非五品不佩又敕召不别給契止用魚符為契皆典之合也又按趙上交云自武德時正員帶闕官始得佩而添置員外試判檢校官皆不得佩其後隨事許佩增益滋多垂拱中以給都督刺史則非京官亦佩神龍元年刑部王嗣玊景龍三年特進皆許佩金則散職亦佩開元九年用中書令張嘉正奏而致仕及以理去官皆許仍佩朱紫因之亦益以多麒麟古有麒麟非馬也其字亦不從馬魯詩有麒說文云青驪文如博棊也類篇有麟引爾雅為說曰青麒麟驒馬之斑文也是古雖有麒麟字皆以其毛色命之至淮南子始曰應龍生建馬建馬生麒麟麒麟生庶獸凡毛者皆生於庶獸則漢世已用馬之上品配麟龍而加馬其旁矣故唐廄遂以祥麟院為名老杜詩近聞下詔宣都邑肯使麒麟地上行是用天上石麒麟為事則正以騏驎為麒麟矣天鹿辟邪烏弋有挑拔孟康曰挑拔一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪西域傳嶓冢漢書誤以嘉陵江為西漢豫於禹貢論詳辨之矣嘉陵既不為漢則秦雅二州及葭萌金牛有山皆名嶓冢者不待辨而知其誤也豫先著論姑以意定謂嶓冢當在漢中發源之北而不能指其為何地何山每一思之意終昧昧然也水經以為漢中之漢源出武都東狼谷山豫嘗詢諸經行其地者曰由漢中而西有水焉發源之地距興元不一二百里源既近流水又狹秋冬間僅勝一二十石舟而經之所次漢上有沔沔上有漾禹貢有一二百里間該載三名如此其詳也歟豫按地書褒水與斜谷分山南口曰褒北口曰斜漢中北距斜口自八九百里而褒水發源是為衙嶺又逺在褒口西北角八九百里之上則其源流亦既甚長矣漢時張湯嘗創治褒水以通于斜而受山東嵗漕則豈枝流曲港之比哉禹方叙著水源自不應舍大取小如此不倫古今雖異而人情可以通推也況有可驗者禹貢水例凡其流徑所及每以易向則别名方面以識其變如河之自龍門而轉南以流華隂則書曰南至于華隂而改東以及砥柱則又書曰東至于砥柱是其隨向書方之例也今漾漢之文曰嶓冢導漾東流為漢則是漾源本未流東至其折東而後始得為漢也然則嶓冢者豈其當在漢中之西也哉水經凡叙狼谷水率皆西出東行而衙嶺褒源悉發北而南行直至南鄭而流委始東始名漢水則與經導漾東流為漢者其方嚮正合也漢人並褒中置縣而命曰褒中吾意褒中一語前世必已久有而漢人采之以名其縣非創為若語也褒中嶓冢二音全相配附得非自虞夏以至戰國世人稱為不的而輒相訛易也乎然豫論禹貢不敢確證者為其褒之名國已先乎秦不容輕小議焉耳然地名因聲近而訛古多有之如春秋之邾雖偏小無足言然人民社稷儼然得自名國不可誣矣孟子之去春秋為年絶不逺而變邾為鄒漢儒已不能究則褒僻且險自嶓冢而訛為褒中安得冢志而暇詳載矣乎豫終欲主所意見而未得的據姑書其槩以待詳考立仗馬司率進馬六人舊儀每日尚乘以廄馬八匹分左右廂立于正殿側宫門外候仗下即散天寶八載李林甫罷十二載楊國忠復銅柱銅柱南方處處有之皆言馬援所立唐史南蠻傳林邑國南大浦存五銅柱漢馬援所立也南詔傳𤣥宗詔何履先以兵定南詔取安寧城復立馬援銅柱乃還援雖征蠻未嘗渡海而林邑於唐為環王地在交州南海行三千里乃至豈援之所嘗至耶意者蠻人古有銅柱中間援因其故制立之以堅蠻信耶兩漢闕史記髙帝八年蕭丞相營作未央宫立東闕北闕前殿十年宫成司馬索隱云無西南二闕者厭勝之法也秦家舊宫皆在渭北而立東闕北闕取其便也豫以為厭勝之說無據謂秦舊宫在北而立北闕以便於事理有之也東闕雖於渭北方鄉不相干凡漢之朝貢自闕東來者多則謂立東闕以便事是也其後武帝大治甘泉宫在長安西故立鳯闕髙二十餘丈於其東南北西三面無見焉亦便事之義也後漢都洛有南宫北宫兩宫相沓四隅各自立闕其曰朱雀𤣥武蒼龍白虎者兩宫四面皆有而亦同名不復如前漢虛方不設者矣洛陽故宫名所載於南宫四闕之外更添坎闕曰此南宫北面之闕豫疑其誤也按漢蔡質漢官典職曰南宫至北宫相去七里以十里之逺中間各容雙闕則南宫之𤣥武自應與北宫之朱雀對起或者見兩宫中間有雙闕者二疑其重復故以南宫之𤣥武為其宫北闕而忘其北闕已名𤣥武不當復出矣玉食本草陶隱居授仙經服穀玉搗如米粒乃以苦酒輩消令如泥亦有令為漿者祥符中尚藥嘗用陶法屑成米豆粒竟不供御蘇頌因謂難以服食恐不詳古來服玉本㫖也書以玊食對威福言之則玊食云者惟王者得用示一隆而無二禮如古扆用斧後世御衣獨用赭黃之類不可但從飲食滋味中求義惟玉府王齊則供食玉若非齊恐不常服也齊而玉食其齊必變食之義乎此禮之尊無二上者也而可求諸滋味之間歟玉亦未必可服或於齊時用玉為器如灌鬯以瓚取玉氣為用耶護駕豹尾以前比省中尚書侍郎御史令史皆執注以督整車騎所謂護駕也演繁露卷十六
